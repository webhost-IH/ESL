d broken things quietly, and left after sunset. Ben spent a week following Mr. Lin's schedule and taking notes. The essay described small moments: the way he straightened a crooked picture frame, the way he swept the steps in the rain. The teacher read it aloud without saying whose it was. The class was very quiet at the end.","zh":"班上被要求寫一篇關於他們欽佩的人的一頁短文。大多數學生選擇了運動員或名人。Ben選擇了學校的管理員林先生，他每天日出前到達，靜靜地修好壞掉的東西，日落後才離開。Ben花了一週時間跟著林先生的行程並記筆記。文章描述了細小的時刻：他把歪斜的相框扶正的方式，他在雨中打掃台階的方式。老師沒有說是誰寫的就大聲朗讀了它。班上在最後非常安靜。"},{"title":"#100","vocab":["notebook","poems","hesitated","silently","audience"],"en":"Zoe had kept a secret for three years: a small notebook filled with poems written in both Chinese and English. No one had ever read them. One afternoon, Zoe's English teacher asked students to bring in a piece of their own writing. Zoe hesitated at home that evening, then packed the notebook. The teacher read one poem silently, then looked up and said, \"May I share this with the class?\" Zoe nodded. The room was very still when the last line was read. Afterward, three classmates quietly asked Zoe to write something for them. Some things find their audience when the time is right.","zh":"Zoe保守了一個秘密三年：一個裝滿中英雙語詩歌的小筆記本。從未有人讀過它們。一天下午，Zoe的英語老師請學生帶來自己的一篇文章。Zoe那天晚上在家猶豫了，然後把筆記本裝進了包。老師默默地讀了一首詩，然後抬起頭說：「我可以和班上分享嗎？」Zoe點了點頭。最後一行被讀出時，教室非常安靜。事後，三個同學悄悄地請Zoe為他們寫點什麼。有些東西在時機成熟時自然會找到它的讀者。"}]},"6":{"1":[{"title":"#1","vocab":["elementary","ordinary","shaping","significant","argument"],"en":"On the last day of elementary school, Ren sat alone in the classroom for a few minutes after everyone had left. Six years had passed in this room. Ren thought about the first day — the nervous feeling of not knowing anyone, the strange smell of new textbooks, the way the teacher had written everyone's name on the board in colored chalk. So much had changed since then. Ren had failed a math test, lost a best friend over a silly argument, cried during a school play, and laughed until tears came during a class trip. None of it had seemed significant at the time. But sitting there now in the quiet, Ren understood that each of those small, ordinary moments had been quietly shaping the person now walking out the door.","zh":"小學最後一天，Ren在所有人都離開後獨自在教室裡坐了幾分鐘。六年在這個房間裡過去了。Ren想起了第一天——不認識任何人的緊張感，新課本奇特的氣味，老師用彩色粉筆把每個人的名字寫在黑板上的樣子。從那以後一切都改變了太多。Ren數學考試不及格，為了一件蠢事失去了最好的朋友，在學校話劇中哭泣，在班級郊遊時笑到流淚。當時每一件事看起來都不重要。但現在坐在安靜中，Ren明白了，每一個細小而平凡的時刻都在悄悄地塑造著現在走出門的那個人。"},{"title":"#2","vocab":["ceremony","perseverance","obvious","principal","attention"],"en":"Three weeks before graduation, Amy was asked to write a speech for the ceremony. The topic was: what did elementary school teach you that cannot be found in a textbook? Amy stared at the blank page for a long time. The obvious answers — friendship, effort, perseverance — felt too simple. Amy thought about the afternoon when the whole class had stayed late to help a classmate finish a project. No one had been asked to stay. No one had been given extra marks for staying. They had simply stayed because it was the right thing to do. That was the story Amy told at the ceremony. When the speech ended, several parents were wiping their eyes. The principal whispered to the English teacher, \"Where did that come from?\" The teacher smiled and said, \"From six years of paying attention.\"","zh":"畢業前三週，Amy被要求為典禮寫一篇演講。主題是：小學教了你什麼是課本裡找不到的？Amy對著空白的紙盯了很長時間。顯而易見的答案——友誼、努力、堅持——感覺太簡單了。Amy想到了那個整個班留下來幫助一個同學完成專題的下午。沒有人被要求留下。沒有人因為留下而得到額外的分數。他們只是留了下來，因為這是對的事。這就是Amy在典禮上講述的故事。演講結束時，幾位家長在擦眼淚。校長悄聲對英語老師說：「這是哪裡來的？」老師微笑說：「來自六年的用心。」"},{"title":"#3","vocab":["organized","research","unexpected","hardship","lifetime"],"en":"In the final semester, the school organized a project called \"Roots.\" Each student had to research their family's history and present it to the class. Leo had always thought of family history as boring — dates and names on a page. But when Leo sat down with Grandpa and asked him about his childhood, something unexpected happened. Grandpa began to cry, quietly, while describing how he had walked three hours to school as a boy because there was no bus. \"We didn't think of it as hardship,\" Grandpa said. \"We just thought of it as morning.\" Leo wrote that sentence down immediately. At the presentation, Leo read it aloud. Several classmates asked if they could write it down too. Some truths, Leo discovered, are so simple that they take a lifetime to understand.","zh":"最後一學期，學校組織了一個名為「根」的專題。每個學生必須研究家族歷史並向全班展示。Leo一直認為家族歷史很無聊——紙上的日期和名字。但當Leo坐下來問爺爺他的童年時，出乎意料的事情發生了。爺爺開始默默地哭泣，描述他小時候因為沒有巴士而步行三個小時去上學的情況。「我們沒有把它當作艱辛，」爺爺說。「我們只是把它當作早晨。」Leo立刻把這句話寫了下來。在展示時，Leo大聲朗讀了它。幾個同學問他們是否也能把它寫下來。有些真理，Leo發現，是如此簡單，以至於需要一輩子才能理解。"},{"title":"#4","vocab":["landscape","philosophical","journey","pineapple","mountains"],"en":"The summer before junior high school, Emma traveled alone on a train for the first time, visiting a cousin in Jiufen. The journey took four hours. Emma had brought a book but never opened it. Instead, Emma watched the landscape change outside the window — rice fields giving way to mountains, mountains giving way to coast. A grandmother sitting nearby offered Emma a slice of pineapple cake and asked, \"Are you going somewhere or coming from somewhere?\" Emma thought about the question for the rest of the journey. \"Both,\" Emma finally decided. \"I think it's always both.\" It was the most philosophical Emma had ever felt on a Tuesday afternoon.","zh":"國中入學前的暑假，Emma第一次獨自乘火車，去Jiufen拜訪一個表親。旅程花了四小時。Emma帶了一本書，但始終沒有打開。相反，Emma看著窗外的風景變化——稻田讓位給山脈，山脈讓位給海岸。一位坐在旁邊的奶奶給Emma一片鳳梨酥，問：「你是要去某個地方，還是從某個地方回來？」Emma在接下來的旅程中一直在思考這個問題。「兩者都是，」Emma最後決定。「我想它永遠都是兩者。」這是Emma在一個星期二下午有過的最富哲理的感受。"},{"title":"#5","vocab":["assigned","staffroom","comments","witness","drafts"],"en":"Sam spent the last month of elementary school writing letters to each teacher — not because it was assigned, but because Sam wanted to. The hardest one to write was to the English teacher, Mr. Chen. He had never given Sam top marks, but had left comments like \"almost\" and \"try again\" on every paper. At first those words had felt unkind. Now, looking back, Sam realized those two words had done more for Sam's English than any perfect score ever could have. The letter took four drafts to get right. Mr. Chen read it twice in the staffroom and folded it carefully into his jacket pocket. Sam never saw him read it, but heard from a classmate who had. Some things are better received without a witness.","zh":"Sam在小學的最後一個月花時間給每一位老師寫信——不是因為被要求，而是因為Sam想這樣做。最難寫的是給英語老師陳老師的信。他從未給過Sam最高分，但在每份作業上留下「幾乎了」和「再試試」這樣的評語。起初，這些話感覺不親切。現在回想起來，Sam意識到這兩個詞對Sam的英文的幫助，比任何完美分數都要多。這封信花了四稿才寫好。陳老師在教職員室讀了兩遍，小心地把它折起來放進了夾克口袋。Sam從未親眼看到他讀它，但從一個同學那裡聽說了。有些事在沒有見證者的情況下被接受，是更好的。"},{"title":"#6","vocab":["capsule","ceremony","archive","accurate","document"],"en":"A week before graduation, Coco's class held a time capsule ceremony. Each student placed an object inside a wooden box that would be sealed and stored in the school's archive for twenty years. Coco chose to put in a hand-drawn map of the school — not how it looked officially, but how Coco had experienced it: the corner near the water fountain where secrets were told, the classroom window that faced the mountains, the small garden no one was supposed to enter but everyone had. The map was not accurate. It was true. When the lid was hammered shut, Coco thought: in twenty years, whoever opens this will find not a document but a feeling — and that, Coco decided, was the most honest thing a person can leave behind.","zh":"畢業前一週，Coco的班舉行了時光膠囊典禮。每個學生把一件物品放入一個木箱，這個木箱將被密封，在學校的檔案館保存二十年。Coco選擇放入一張手繪的學校地圖——不是官方的樣子，而是Coco所體驗的：飲水機旁分享秘密的角落，朝著山脈的教室窗戶，那個不允許任何人進入但所有人都進過的小花園。這張地圖並不準確，但它是真實的。當蓋子被鎚下去時，Coco想：二十年後，打開這個的人會找到的不是一份文件，而是一種感覺——而Coco決定，這是一個人能留下的最誠實的東西。"},{"title":"#7","vocab":["workbooks","handwriting","unsteady","certain","distance"],"en":"The night before the last day of school, Tim could not sleep. Not from excitement, but from a strange quiet feeling that was hard to name. Tim got up and walked to the desk where all the old workbooks were stacked. Grade one, grade two, all the way to grade six. Tim opened the grade one book and looked at the handwriting inside — round, unsteady letters, pressing too hard on the pencil. Then Tim opened the grade six book and saw the handwriting there: lighter, faster, more certain. It was still the same hand. But the distance between those two pages felt like a country Tim had crossed without a map, one small step at a time, and had somehow arrived.","zh":"上學最後一天的前一晚，Tim睡不著。不是因為興奮，而是一種難以命名的奇怪平靜感。Tim起身走到桌旁，那裡疊放著所有的舊作業本。一年級、二年級，一直到六年級。Tim打開一年級的作業本，看著裡面的字跡——圓潤、不穩定的字母，鉛筆按得太用力。然後Tim打開六年級的作業本，看著那裡的字跡：更輕、更快、更確定。還是同一雙手。但那兩頁之間的距離感覺像是Tim在沒有地圖的情況下橫跨過的一個國家，每次一小步，卻不知怎麼地到達了。"},{"title":"#8","vocab":["assigned","community","presence","ritual","elderly"],"en":"Two months before graduation, Mei was assigned a community service project. Most students chose something organized and safe. Mei chose to spend twelve Saturday mornings at a care home for the elderly in Hsinchu. The first visit was awkward — Mei did not know what to say or do. An old woman named Mrs. Huang asked Mei to sit and simply stay. \"Old people don't need activity,\" she said. \"We need presence.\" Mei came back the next Saturday, and the next. By the final visit, Mei and Mrs. Huang had developed a ritual: Mei would read the weather report aloud, and she would say whether she believed it. It was a small ritual. It was also, Mei understood by then, a form of love.","zh":"畢業前兩個月，Mei被分配了一個社區服務專題。大多數學生選擇了有組織且安全的事情。Mei選擇在Hsinchu的一家老人護理院度過十二個星期六的早晨。第一次拜訪很尷尬——Mei不知道說什麼或做什麼。一位名叫黃奶奶的老太太請Mei坐下，只要陪著就好。「老人不需要活動，」她說。「我們需要陪伴。」Mei下個星期六又回來了，然後又回來了。到最後一次拜訪時，Mei和黃奶奶建立了一個習慣：Mei大聲讀天氣預報，她說她是否相信。這是個小習慣。但到那時Mei明白了，這也是一種愛的形式。"},{"title":"#9","vocab":["unusual","immigrated","conclusion","interview","assignment"],"en":"Near the end of sixth grade, Ben's teacher gave the class an unusual assignment: interview someone who had done something they were afraid to do, and write about what they learned. Ben chose to interview a neighbor who had immigrated to Taiwan from Vietnam twenty years ago, speaking no Chinese and knowing no one. The neighbor described arriving at the airport with one bag and an address written on a piece of paper. \"Were you afraid?\" Ben asked. \"Completely,\" the neighbor said. \"And then I wasn't.\" Ben asked what had changed. The neighbor smiled: \"I just did the next thing. And then the next.\" Ben wrote those words at the top of the report and could not find a better conclusion. Sometimes the entire answer fits in one short sentence.","zh":"六年級快結束時，Ben的老師給班上布置了一項不尋常的作業：採訪一個做過他們害怕做的事情的人，並寫下他們學到了什麼。Ben選擇採訪了一個二十年前從越南移民到台灣的鄰居，當時他不會說中文，也不認識任何人。鄰居描述了帶著一個包和一張寫著地址的紙條到達機場的情景。「你害怕嗎？」Ben問。「非常害怕，」鄰居說。「然後我就不害怕了。」Ben問是什麼改變了。鄰居微笑：「我只是做了下一件事，然後再下一件。」Ben把這些話寫在報告的最上面，找不到更好的結語。有時候，整個答案只需要一個短句。"},{"title":"#10","vocab":["personally","paused","certain","weight","continued"],"en":"It was the last English class of elementary school. The teacher asked everyone to write one sentence — just one — that described what English meant to them personally. The room was quiet for a long time. Some students wrote about travel, some about music, some about games. Zoe wrote: \"English is the door I didn't know I wanted to open until it was already open.\" The teacher read all the sentences without names. When she read Zoe's, she paused for a moment before continuing. After class, she told Zoe quietly, \"Keep writing.\" Zoe did not know exactly what that meant yet. But walking out of the school for the last time, Zoe felt the weight of those two words in a pocket, small and certain, like a key.","zh":"這是小學最後一堂英語課。老師請每個人寫一句話——只一句——描述英文對他們個人的意義。教室安靜了很長時間。有些學生寫了旅行，有些寫了音樂，有些寫了遊戲。Zoe寫道：「英文是那扇我在打開之前不知道自己想打開的門。」老師沒有說名字就讀了所有的句子。當她讀到Zoe的那句時，她停頓了一下才繼續。課後，她悄悄告訴Zoe：「繼續寫。」Zoe還不確切知道這是什麼意思。但最後一次走出學校時，Zoe感受到那兩個字在口袋裡的重量，細小而確定，像一把鑰匙。"},{"title":"#11","vocab":["elementary","ordinary","shaping","significant","argument"],"en":"On the last day of elementary school, Jack sat alone in the classroom for a few minutes after everyone had left. Six years had passed in this room. Jack thought about the first day — the nervous feeling of not knowing anyone, the strange smell of new textbooks, the way the teacher had written everyone's name on the board in colored chalk. So much had changed since then. Jack had failed a math test, lost a best friend over a silly argument, cried during a school play, and laughed until tears came during a class trip. None of it had seemed significant at the time. But sitting there now in the quiet, Jack understood that each of those small, ordinary moments had been quietly shaping the person now walking out the door.","zh":"小學最後一天，Jack在所有人都離開後獨自在教室裡坐了幾分鐘。六年在這個房間裡過去了。Jack想起了第一天——不認識任何人的緊張感，新課本奇特的氣味，老師用彩色粉筆把每個人的名字寫在黑板上的樣子。從那以後一切都改變了太多。Jack數學考試不及格，為了一件蠢事失去了最好的朋友，在學校話劇中哭泣，在班級郊遊時笑到流淚。當時每一件事看起來都不重要。但現在坐在安靜中，Jack明白了，每一個細小而平凡的時刻都在悄悄地塑造著現在走出門的那個人。"},{"title":"#12","vocab":["ceremony","perseverance","obvious","principal","attention"],"en":"Three weeks before graduation, Nina was asked to write a speech for the ceremony. The topic was: what did elementary school teach you that cannot be found in a textbook? Nina stared at the blank page for a long time. The obvious answers — friendship, effort, perseverance — felt too simple. Nina thought about the afternoon when the whole class had stayed late to help a classmate finish a project. No one had been asked to stay. No one had been given extra marks for staying. They had simply stayed because it was the right thing to do. That was the story Nina told at the ceremony. When the speech ended, several parents were wiping their eyes. The principal whispered to the English teacher, \"Where did that come from?\" The teacher smiled and said, \"From six years of paying attention.\"","zh":"畢業前三週，Nina被要求為典禮寫一篇演講。主題是：小學教了你什麼是課本裡找不到的？Nina對著空白的紙盯了很長時間。顯而易見的答案——友誼、努力、堅持——感覺太簡單了。Nina想到了那個整個班留下來幫助一個同學完成專題的下午。沒有人被要求留下。沒有人因為留下而得到額外的分數。他們只是留了下來，因為這是對的事。這就是Nina在典禮上講述的故事。演講結束時，幾位家長在擦眼淚。校長悄聲對英語老師說：「這是哪裡來的？」老師微笑說：「來自六年的用心。」"},{"title":"#13","vocab":["organized","research","unexpected","hardship","lifetime"],"en":"In the final semester, the school organized a project called \"Roots.\" Each student had to research their family's history and present it to the class. Ruby had always thought of family history as boring — dates and names on a page. But when Ruby sat down with Grandpa and asked him about his childhood, something unexpected happened. Grandpa began to cry, quietly, while describing how he had walked three hours to school as a boy because there was no bus. \"We didn't think of it as hardship,\" Grandpa said. \"We just thought of it as morning.\" Ruby wrote that sentence down immediately. At the presentation, Ruby read it aloud. Several classmates asked if they could write it down too. Some truths, Ruby discovered, are so simple that they take a lifetime to understand.","zh":"最後一學期，學校組織了一個名為「根」的專題。每個學生必須研究家族歷史並向全班展示。Ruby一直認為家族歷史很無聊——紙上的日期和名字。但當Ruby坐下來問爺爺他的童年時，出乎意料的事情發生了。爺爺開始默默地哭泣，描述他小時候因為沒有巴士而步行三個小時去上學的情況。「我們沒有把它當作艱辛，」爺爺說。「我們只是把它當作早晨。」Ruby立刻把這句話寫了下來。在展示時，Ruby大聲朗讀了它。幾個同學問他們是否也能把它寫下來。有些真理，Ruby發現，是如此簡單，以至於需要一輩子才能理解。"},{"title":"#14","vocab":["landscape","philosophical","journey","pineapple","mountains"],"en":"The summer before junior high school, Kai traveled alone on a train for the first time, visiting a cousin in Yilan. The journey took four hours. Kai had brought a book but never opened it. Instead, Kai watched the landscape change outside the window — rice fields giving way to mountains, mountains giving way to coast. A grandmother sitting nearby offered Kai a slice of pineapple cake and asked, \"Are you going somewhere or coming from somewhere?\" Kai thought about the question for the rest of the journey. \"Both,\" Kai finally decided. \"I think it's always both.\" It was the most philosophical Kai had ever felt on a Tuesday afternoon.","zh":"國中入學前的暑假，Kai第一次獨自乘火車，去Yilan拜訪一個表親。旅程花了四小時。Kai帶了一本書，但始終沒有打開。相反，Kai看著窗外的風景變化——稻田讓位給山脈，山脈讓位給海岸。一位坐在旁邊的奶奶給Kai一片鳳梨酥，問：「你是要去某個地方，還是從某個地方回來？」Kai在接下來的旅程中一直在思考這個問題。「兩者都是，」Kai最後決定。「我想它永遠都是兩者。」這是Kai在一個星期二下午有過的最富哲理的感受。"},{"title":"#15","vocab":["assigned","staffroom","comments","witness","drafts"],"en":"Tom spent the last month of elementary school writing letters to each teacher — not because it was assigned, but because Tom wanted to. The hardest one to write was to the English teacher, Mr. Chen. He had never given Tom top marks, but had left comments like \"almost\" and \"try again\" on every paper. At first those words had felt unkind. Now, looking back, Tom realized those two words had done more for Tom's English than any perfect score ever could have. The letter took four drafts to get right. Mr. Chen read it twice in the staffroom and folded it carefully into his jacket pocket. Tom never saw him read it, but heard from a classmate who had. Some things are better received without a witness.","zh":"Tom在小學的最後一個月花時間給每一位老師寫信——不是因為被要求，而是因為Tom想這樣做。最難寫的是給英語老師陳老師的信。他從未給過Tom最高分，但在每份作業上留下「幾乎了」和「再試試」這樣的評語。起初，這些話感覺不親切。現在回想起來，Tom意識到這兩個詞對Tom的英文的幫助，比任何完美分數都要多。這封信花了四稿才寫好。陳老師在教職員室讀了兩遍，小心地把它折起來放進了夾克口袋。Tom從未親眼看到他讀它，但從一個同學那裡聽說了。有些事在沒有見證者的情況下被接受，是更好的。"},{"title":"#16","vocab":["capsule","ceremony","archive","accurate","document"],"en":"A week before graduation, Lily's class held a time capsule ceremony. Each student placed an object inside a wooden box that would be sealed and stored in the school's archive for twenty years. Lily chose to put in a hand-drawn map of the school — not how it looked officially, but how Lily had experienced it: the corner near the water fountain where secrets were told, the classroom window that faced the mountains, the small garden no one was supposed to enter but everyone had. The map was not accurate. It was true. When the lid was hammered shut, Lily thought: in twenty years, whoever opens this will find not a document but a feeling — and that, Lily decided, was the most honest thing a person can leave behind.","zh":"畢業前一週，Lily的班舉行了時光膠囊典禮。每個學生把一件物品放入一個木箱，這個木箱將被密封，在學校的檔案館保存二十年。Lily選擇放入一張手繪的學校地圖——不是官方的樣子，而是Lily所體驗的：飲水機旁分享秘密的角落，朝著山脈的教室窗戶，那個不允許任何人進入但所有人都進過的小花園。這張地圖並不準確，但它是真實的。當蓋子被鎚下去時，Lily想：二十年後，打開這個的人會找到的不是一份文件，而是一種感覺——而Lily決定，這是一個人能留下的最誠實的東西。"},{"title":"#17","vocab":["workbooks","handwriting","unsteady","certain","distance"],"en":"The night before the last day of school, Max could not sleep. Not from excitement, but from a strange quiet feeling that was hard to name. Max got up and walked to the desk where all the old workbooks were stacked. Grade one, grade two, all the way to grade six. Max opened the grade one book and looked at the handwriting inside — round, unsteady letters, pressing too hard on the pencil. Then Max opened the grade six book and saw the handwriting there: lighter, faster, more certain. It was still the same hand. But the distance between those two pages felt like a country Max had crossed without a map, one small step at a time, and had somehow arrived.","zh":"上學最後一天的前一晚，Max睡不著。不是因為興奮，而是一種難以命名的奇怪平靜感。Max起身走到桌旁，那裡疊放著所有的舊作業本。一年級、二年級，一直到六年級。Max打開一年級的作業本，看著裡面的字跡——圓潤、不穩定的字母，鉛筆按得太用力。然後Max打開六年級的作業本，看著那裡的字跡：更輕、更快、更確定。還是同一雙手。但那兩頁之間的距離感覺像是Max在沒有地圖的情況下橫跨過的一個國家，每次一小步，卻不知怎麼地到達了。"},{"title":"#18","vocab":["assigned","community","presence","ritual","elderly"],"en":"Two months before graduation, Mia was assigned a community service project. Most students chose something organized and safe. Mia chose to spend twelve Saturday mornings at a care home for the elderly in Kaohsiung. The first visit was awkward — Mia did not know what to say or do. An old woman named Mrs. Huang asked Mia to sit and simply stay. \"Old people don't need activity,\" she said. \"We need presence.\" Mia came back the next Saturday, and the next. By the final visit, Mia and Mrs. Huang had developed a ritual: Mia would read the weather report aloud, and she would say whether she believed it. It was a small ritual. It was also, Mia understood by then, a form of love.","zh":"畢業前兩個月，Mia被分配了一個社區服務專題。大多數學生選擇了有組織且安全的事情。Mia選擇在Kaohsiung的一家老人護理院度過十二個星期六的早晨。第一次拜訪很尷尬——Mia不知道說什麼或做什麼。一位名叫黃奶奶的老太太請Mia坐下，只要陪著就好。「老人不需要活動，」她說。「我們需要陪伴。」Mia下個星期六又回來了，然後又回來了。到最後一次拜訪時，Mia和黃奶奶建立了一個習慣：Mia大聲讀天氣預報，她說她是否相信。這是個小習慣。但到那時Mia明白了，這也是一種愛的形式。"},{"title":"#19","vocab":["unusual","immigrated","conclusion","interview","assignment"],"en":"Near the end of sixth grade, Alex's teacher gave the class an unusual assignment: interview someone who had done something they were afraid to do, and write about what they learned. Alex chose to interview a neighbor who had immigrated to Taiwan from Vietnam twenty years ago, speaking no Chinese and knowing no one. The neighbor described arriving at the airport with one bag and an address written on a piece of paper. \"Were you afraid?\" Alex asked. \"Completely,\" the neighbor said. \"And then I wasn't.\" Alex asked what had changed. The neighbor smiled: \"I just did the next thing. And then the next.\" Alex wrote those words at the top of the report and could not find a better conclusion. Sometimes the entire answer fits in one short sentence.","zh":"六年級快結束時，Alex的老師給班上布置了一項不尋常的作業：採訪一個做過他們害怕做的事情的人，並寫下他們學到了什麼。Alex選擇採訪了一個二十年前從越南移民到台灣的鄰居，當時他不會說中文，也不認識任何人。鄰居描述了帶著一個包和一張寫著地址的紙條到達機場的情景。「你害怕嗎？」Alex問。「非常害怕，」鄰居說。「然後我就不害怕了。」Alex問是什麼改變了。鄰居微笑：「我只是做了下一件事，然後再下一件。」Alex把這些話寫在報告的最上面，找不到更好的結語。有時候，整個答案只需要一個短句。"},{"title":"#20","vocab":["personally","paused","certain","weight","continued"],"en":"It was the last English class of elementary school. The teacher asked everyone to write one sentence — just one — that described what English meant to them personally. The room was quiet for a long time. Some students wrote about travel, some about music, some about games. Anna wrote: \"English is the door I didn't know I wanted to open until it was already open.\" The teacher read all the sentences without names. When she read Anna's, she paused for a moment before continuing. After class, she told Anna quietly, \"Keep writing.\" Anna did not know exactly what that meant yet. But walking out of the school for the last time, Anna felt the weight of those two words in a pocket, small and certain, like a key.","zh":"這是小學最後一堂英語課。老師請每個人寫一句話——只一句——描述英文對他們個人的意義。教室安靜了很長時間。有些學生寫了旅行，有些寫了音樂，有些寫了遊戲。Anna寫道：「英文是那扇我在打開之前不知道自己想打開的門。」老師沒有說名字就讀了所有的句子。當她讀到Anna的那句時，她停頓了一下才繼續。課後，她悄悄告訴Anna：「繼續寫。」Anna還不確切知道這是什麼意思。但最後一次走出學校時，Anna感受到那兩個字在口袋裡的重量，細小而確定，像一把鑰匙。"},{"title":"#21","vocab":["elementary","ordinary","shaping","significant","argument"],"en":"On the last day of elementary school, Ren sat alone in the classroom for a few minutes after everyone had left. Six years had passed in this room. Ren thought about the first day — the nervous feeling of not knowing anyone, the strange smell of new textbooks, the way the teacher had written everyone's name on the board in colored chalk. So much had changed since then. Ren had failed a math test, lost a best friend over a silly argument, cried during a school play, and laughed until tears came during a class trip. None of it had seemed significant at the time. But sitting there now in the quiet, Ren understood that each of those small, ordinary moments had been quietly shaping the person now walking out the door.","zh":"小學最後一天，Ren在所有人都離開後獨自在教室裡坐了幾分鐘。六年在這個房間裡過去了。Ren想起了第一天——不認識任何人的緊張感，新課本奇特的氣味，老師用彩色粉筆把每個人的名字寫在黑板上的樣子。從那以後一切都改變了太多。Ren數學考試不及格，為了一件蠢事失去了最好的朋友，在學校話劇中哭泣，在班級郊遊時笑到流淚。當時每一件事看起來都不重要。但現在坐在安靜中，Ren明白了，每一個細小而平凡的時刻都在悄悄地塑造著現在走出門的那個人。"},{"title":"#22","vocab":["ceremony","perseverance","obvious","principal","attention"],"en":"Three weeks before graduation, Amy was asked to write a speech for the ceremony. The topic was: what did elementary school teach you that cannot be found in a textbook? Amy stared at the blank page for a long time. The obvious answers — friendship, effort, perseverance — felt too simple. Amy thought about the afternoon when the whole class had stayed late to help a classmate finish a project. No one had been asked to stay. No one had been given extra marks for staying. They had simply stayed because it was the right thing to do. That was the story Amy told at the ceremony. When the speech ended, several parents were wiping their eyes. The principal whispered to the English teacher, \"Where did that come from?\" The teacher smiled and said, \"From six years of paying attention.\"","zh":"畢業前三週，Amy被要求為典禮寫一篇演講。主題是：小學教了你什麼是課本裡找不到的？Amy對著空白的紙盯了很長時間。顯而易見的答案——友誼、努力、堅持——感覺太簡單了。Amy想到了那個整個班留下來幫助一個同學完成專題的下午。沒有人被要求留下。沒有人因為留下而得到額外的分數。他們只是留了下來，因為這是對的事。這就是Amy在典禮上講述的故事。演講結束時，幾位家長在擦眼淚。校長悄聲對英語老師說：「這是哪裡來的？」老師微笑說：「來自六年的用心。」"},{"title":"#23","vocab":["organized","research","unexpected","hardship","lifetime"],"en":"In the final semester, the school organized a project called \"Roots.\" Each student had to research their family's history and present it to the class. Leo had always thought of family history as boring — dates and names on a page. But when Leo sat down with Grandpa and asked him about his childhood, something unexpected happened. Grandpa began to cry, quietly, while describing how he had walked three hours to school as a boy because there was no bus. \"We didn't think of it as hardship,\" Grandpa said. \"We just thought of it as morning.\" Leo wrote that sentence down immediately. At the presentation, Leo read it aloud. Several classmates asked if they could write it down too. Some truths, Leo discovered, are so simple that they take a lifetime to understand.","zh":"最後一學期，學校組織了一個名為「根」的專題。每個學生必須研究家族歷史並向全班展示。Leo一直認為家族歷史很無聊——紙上的日期和名字。但當Leo坐下來問爺爺他的童年時，出乎意料的事情發生了。爺爺開始默默地哭泣，描述他小時候因為沒有巴士而步行三個小時去上學的情況。「我們沒有把它當作艱辛，」爺爺說。「我們只是把它當作早晨。」Leo立刻把這句話寫了下來。在展示時，Leo大聲朗讀了它。幾個同學問他們是否也能把它寫下來。有些真理，Leo發現，是如此簡單，以至於需要一輩子才能理解。"},{"title":"#24","vocab":["landscape","philosophical","journey","pineapple","mountains"],"en":"The summer before junior high school, Emma traveled alone on a train for the first time, visiting a cousin in Penghu. The journey took four hours. Emma had brought a book but never opened it. Instead, Emma watched the landscape change outside the window — rice fields giving way to mountains, mountains giving way to coast. A grandmother sitting nearby offered Emma a slice of pineapple cake and asked, \"Are you going somewhere or coming from somewhere?\" Emma thought about the question for the rest of the journey. \"Both,\" Emma finally decided. \"I think it's always both.\" It was the most philosophical Emma had ever felt on a Tuesday afternoon.","zh":"國中入學前的暑假，Emma第一次獨自乘火車，去Penghu拜訪一個表親。旅程花了四小時。Emma帶了一本書，但始終沒有打開。相反，Emma看著窗外的風景變化——稻田讓位給山脈，山脈讓位給海岸。一位坐在旁邊的奶奶給Emma一片鳳梨酥，問：「你是要去某個地方，還是從某個地方回來？」Emma在接下來的旅程中一直在思考這個問題。「兩者都是，」Emma最後決定。「我想它永遠都是兩者。」這是Emma在一個星期二下午有過的最富哲理的感受。"},{"title":"#25","vocab":["assigned","staffroom","comments","witness","drafts"],"en":"Sam spent the last month of elementary school writing letters to each teacher — not because it was assigned, but because Sam wanted to. The hardest one to write was to the English teacher, Mr. Chen. He had never given Sam top marks, but had left comments like \"almost\" and \"try again\" on every paper. At first those words had felt unkind. Now, looking back, Sam realized those two words had done more for Sam's English than any perfect score ever could have. The letter took four drafts to get right. Mr. Chen read it twice in the staffroom and folded it carefully into his jacket pocket. Sam never saw him read it, but heard from a classmate who had. Some things are better received without a witness.","zh":"Sam在小學的最後一個月花時間給每一位老師寫信——不是因為被要求，而是因為Sam想這樣做。最難寫的是給英語老師陳老師的信。他從未給過Sam最高分，但在每份作業上留下「幾乎了」和「再試試」這樣的評語。起初，這些話感覺不親切。現在回想起來，Sam意識到這兩個詞對Sam的英文的幫助，比任何完美分數都要多。這封信花了四稿才寫好。陳老師在教職員室讀了兩遍，小心地把它折起來放進了夾克口袋。Sam從未親眼看到他讀它，但從一個同學那裡聽說了。有些事在沒有見證者的情況下被接受，是更好的。"},{"title":"#26","vocab":["capsule","ceremony","archive","accurate","document"],"en":"A week before graduation, Coco's class held a time capsule ceremony. Each student placed an object inside a wooden box that would be sealed and stored in the school's archive for twenty years. Coco chose to put in a hand-drawn map of the school — not how it looked officially, but how Coco had experienced it: the corner near the water fountain where secrets were told, the classroom window that faced the mountains, the small garden no one was supposed to enter but everyone had. The map was not accurate. It was true. When the lid was hammered shut, Coco thought: in twenty years, whoever opens this will find not a document but a feeling — and that, Coco decided, was the most honest thing a person can leave behind.","zh":"畢業前一週，Coco的班舉行了時光膠囊典禮。每個學生把一件物品放入一個木箱，這個木箱將被密封，在學校的檔案館保存二十年。Coco選擇放入一張手繪的學校地圖——不是官方的樣子，而是Coco所體驗的：飲水機旁分享秘密的角落，朝著山脈的教室窗戶，那個不允許任何人進入但所有人都進過的小花園。這張地圖並不準確，但它是真實的。當蓋子被鎚下去時，Coco想：二十年後，打開這個的人會找到的不是一份文件，而是一種感覺——而Coco決定，這是一個人能留下的最誠實的東西。"},{"title":"#27","vocab":["workbooks","handwriting","unsteady","certain","distance"],"en":"The night before the last day of school, Tim could not sleep. Not from excitement, but from a strange quiet feeling that was hard to name. Tim got up and walked to the desk where all the old workbooks were stacked. Grade one, grade two, all the way to grade six. Tim opened the grade one book and looked at the handwriting inside — round, unsteady letters, pressing too hard on the pencil. Then Tim opened the grade six book and saw the handwriting there: lighter, faster, more certain. It was still the same hand. But the distance between those two pages felt like a country Tim had crossed without a map, one small step at a time, and had somehow arrived.","zh":"上學最後一天的前一晚，Tim睡不著。不是因為興奮，而是一種難以命名的奇怪平靜感。Tim起身走到桌旁，那裡疊放著所有的舊作業本。一年級、二年級，一直到六年級。Tim打開一年級的作業本，看著裡面的字跡——圓潤、不穩定的字母，鉛筆按得太用力。然後Tim打開六年級的作業本，看著那裡的字跡：更輕、更快、更確定。還是同一雙手。但那兩頁之間的距離感覺像是Tim在沒有地圖的情況下橫跨過的一個國家，每次一小步，卻不知怎麼地到達了。"},{"title":"#28","vocab":["assigned","community","presence","ritual","elderly"],"en":"Two months before graduation, Mei was assigned a community service project. Most students chose something organized and safe. Mei chose to spend twelve Saturday mornings at a care home for the elderly in Jiufen. The first visit was awkward — Mei did not know what to say or do. An old woman named Mrs. Huang asked Mei to sit and simply stay. \"Old people don't need activity,\" she said. \"We need presence.\" Mei came back the next Saturday, and the next. By the final visit, Mei and Mrs. Huang had developed a ritual: Mei would read the weather report aloud, and she would say whether she believed it. It was a small ritual. It was also, Mei understood by then, a form of love.","zh":"畢業前兩個月，Mei被分配了一個社區服務專題。大多數學生選擇了有組織且安全的事情。Mei選擇在Jiufen的一家老人護理院度過十二個星期六的早晨。第一次拜訪很尷尬——Mei不知道說什麼或做什麼。一位名叫黃奶奶的老太太請Mei坐下，只要陪著就好。「老人不需要活動，」她說。「我們需要陪伴。」Mei下個星期六又回來了，然後又回來了。到最後一次拜訪時，Mei和黃奶奶建立了一個習慣：Mei大聲讀天氣預報，她說她是否相信。這是個小習慣。但到那時Mei明白了，這也是一種愛的形式。"},{"title":"#29","vocab":["unusual","immigrated","conclusion","interview","assignment"],"en":"Near the end of sixth grade, Ben's teacher gave the class an unusual assignment: interview someone who had done something they were afraid to do, and write about what they learned. Ben chose to interview a neighbor who had immigrated to Taiwan from Vietnam twenty years ago, speaking no Chinese and knowing no one. The neighbor described arriving at the airport with one bag and an address written on a piece of paper. \"Were you afraid?\" Ben asked. \"Completely,\" the neighbor said. \"And then I wasn't.\" Ben asked what had changed. The neighbor smiled: \"I just did the next thing. And then the next.\" Ben wrote those words at the top of the report and could not find a better conclusion. Sometimes the entire answer fits in one short sentence.","zh":"六年級快結束時，Ben的老師給班上布置了一項不尋常的作業：採訪一個做過他們害怕做的事情的人，並寫下他們學到了什麼。Ben選擇採訪了一個二十年前從越南移民到台灣的鄰居，當時他不會說中文，也不認識任何人。鄰居描述了帶著一個包和一張寫著地址的紙條到達機場的情景。「你害怕嗎？」Ben問。「非常害怕，」鄰居說。「然後我就不害怕了。」Ben問是什麼改變了。鄰居微笑：「我只是做了下一件事，然後再下一件。」Ben把這些話寫在報告的最上面，找不到更好的結語。有時候，整個答案只需要一個短句。"},{"title":"#30","vocab":["personally","paused","certain","weight","continued"],"en":"It was the last English class of elementary school. The teacher asked everyone to write one sentence — just one — that described what English meant to them personally. The room was quiet for a long time. Some students wrote about travel, some about music, some about games. Zoe wrote: \"English is the door I didn't know I wanted to open until it was already open.\" The teacher read all the sentences without names. When she read Zoe's, she paused for a moment before continuing. After class, she told Zoe quietly, \"Keep writing.\" Zoe did not know exactly what that meant yet. But walking out of the school for the last time, Zoe felt the weight of those two words in a pocket, small and certain, like a key.","zh":"這是小學最後一堂英語課。老師請每個人寫一句話——只一句——描述英文對他們個人的意義。教室安靜了很長時間。有些學生寫了旅行，有些寫了音樂，有些寫了遊戲。Zoe寫道：「英文是那扇我在打開之前不知道自己想打開的門。」老師沒有說名字就讀了所有的句子。當她讀到Zoe的那句時，她停頓了一下才繼續。課後，她悄悄告訴Zoe：「繼續寫。」Zoe還不確切知道這是什麼意思。但最後一次走出學校時，Zoe感受到那兩個字在口袋裡的重量，細小而確定，像一把鑰匙。"},{"title":"#31","vocab":["elementary","ordinary","shaping","significant","argument"],"en":"On the last day of elementary school, Jack sat alone in the classroom for a few minutes after everyone had left. Six years had passed in this room. Jack thought about the first day — the nervous feeling of not knowing anyone, the strange smell of new textbooks, the way the teacher had written everyone's name on the board in colored chalk. So much had changed since then. Jack had failed a math test, lost a best friend over a silly argument, cried during a school play, and laughed until tears came during a class trip. None of it had seemed significant at the time. But sitting there now in the quiet, Jack understood that each of those small, ordinary moments had been quietly shaping the person now walking out the door.","zh":"小學最後一天，Jack在所有人都離開後獨自在教室裡坐了幾分鐘。六年在這個房間裡過去了。Jack想起了第一天——不認識任何人的緊張感，新課本奇特的氣味，老師用彩色粉筆把每個人的名字寫在黑板上的樣子。從那以後一切都改變了太多。Jack數學考試不及格，為了一件蠢事失去了最好的朋友，在學校話劇中哭泣，在班級郊遊時笑到流淚。當時每一件事看起來都不重要。但現在坐在安靜中，Jack明白了，每一個細小而平凡的時刻都在悄悄地塑造著現在走出門的那個人。"},{"title":"#32","vocab":["ceremony","perseverance","obvious","principal","attention"],"en":"Three weeks before graduation, Nina was asked to write a speech for the ceremony. The topic was: what did elementary school teach you that cannot be found in a textbook? Nina stared at the blank page for a long time. The obvious answers — friendship, effort, perseverance — felt too simple. Nina thought about the afternoon when the whole class had stayed late to help a classmate finish a project. No one had been asked to stay. No one had been given extra marks for staying. They had simply stayed because it was the right thing to do. That was the story Nina told at the ceremony. When the speech ended, several parents were wiping their eyes. The principal whispered to the English teacher, \"Where did that come from?\" The teacher smiled and said, \"From six years of paying attention.\"","zh":"畢業前三週，Nina被要求為典禮寫一篇演講。主題是：小學教了你什麼是課本裡找不到的？Nina對著空白的紙盯了很長時間。顯而易見的答案——友誼、努力、堅持——感覺太簡單了。Nina想到了那個整個班留下來幫助一個同學完成專題的下午。沒有人被要求留下。沒有人因為留下而得到額外的分數。他們只是留了下來，因為這是對的事。這就是Nina在典禮上講述的故事。演講結束時，幾位家長在擦眼淚。校長悄聲對英語老師說：「這是哪裡來的？」老師微笑說：「來自六年的用心。」"},{"title":"#33","vocab":["organized","research","unexpected","hardship","lifetime"],"en":"In the final semester, the school organized a project called \"Roots.\" Each student had to research their family's history and present it to the class. Ruby had always thought of family history as boring — dates and names on a page. But when Ruby sat down with Grandpa and asked him about his childhood, something unexpected happened. Grandpa began to cry, quietly, while describing how he had walked three hours to school as a boy because there was no bus. \"We didn't think of it as hardship,\" Grandpa said. \"We just thought of it as morning.\" Ruby wrote that sentence down immediately. At the presentation, Ruby read it aloud. Several classmates asked if they could write it down too. Some truths, Ruby discovered, are so simple that they take a lifetime to understand.","zh":"最後一學期，學校組織了一個名為「根」的專題。每個學生必須研究家族歷史並向全班展示。Ruby一直認為家族歷史很無聊——紙上的日期和名字。但當Ruby坐下來問爺爺他的童年時，出乎意料的事情發生了。爺爺開始默默地哭泣，描述他小時候因為沒有巴士而步行三個小時去上學的情況。「我們沒有把它當作艱辛，」爺爺說。「我們只是把它當作早晨。」Ruby立刻把這句話寫了下來。在展示時，Ruby大聲朗讀了它。幾個同學問他們是否也能把它寫下來。有些真理，Ruby發現，是如此簡單，以至於需要一輩子才能理解。"},{"title":"#34","vocab":["landscape","philosophical","journey","pineapple","mountains"],"en":"The summer before junior high school, Kai traveled alone on a train for the first time, visiting a cousin in Taipei. The journey took four hours. Kai had brought a book but never opened it. Instead, Kai watched the landscape change outside the window — rice fields giving way to mountains, mountains giving way to coast. A grandmother sitting nearby offered Kai a slice of pineapple cake and asked, \"Are you going somewhere or coming from somewhere?\" Kai thought about the question for the rest of the journey. \"Both,\" Kai finally decided. \"I think it's always both.\" It was the most philosophical Kai had ever felt on a Tuesday afternoon.","zh":"國中入學前的暑假，Kai第一次獨自乘火車，去Taipei拜訪一個表親。旅程花了四小時。Kai帶了一本書，但始終沒有打開。相反，Kai看著窗外的風景變化——稻田讓位給山脈，山脈讓位給海岸。一位坐在旁邊的奶奶給Kai一片鳳梨酥，問：「你是要去某個地方，還是從某個地方回來？」Kai在接下來的旅程中一直在思考這個問題。「兩者都是，」Kai最後決定。「我想它永遠都是兩者。」這是Kai在一個星期二下午有過的最富哲理的感受。"},{"title":"#35","vocab":["assigned","staffroom","comments","witness","drafts"],"en":"Tom spent the last month of elementary school writing letters to each teacher — not because it was assigned, but because Tom wanted to. The hardest one to write was to the English teacher, Mr. Chen. He had never given Tom top marks, but had left comments like \"almost\" and \"try again\" on every paper. At first those words had felt unkind. Now, looking back, Tom realized those two words had done more for Tom's English than any perfect score ever could have. The letter took four drafts to get right. Mr. Chen read it twice in the staffroom and folded it carefully into his jacket pocket. Tom never saw him read it, but heard from a classmate who had. Some things are better received without a witness.","zh":"Tom在小學的最後一個月花時間給每一位老師寫信——不是因為被要求，而是因為Tom想這樣做。最難寫的是給英語老師陳老師的信。他從未給過Tom最高分，但在每份作業上留下「幾乎了」和「再試試」這樣的評語。起初，這些話感覺不親切。現在回想起來，Tom意識到這兩個詞對Tom的英文的幫助，比任何完美分數都要多。這封信花了四稿才寫好。陳老師在教職員室讀了兩遍，小心地把它折起來放進了夾克口袋。Tom從未親眼看到他讀它，但從一個同學那裡聽說了。有些事在沒有見證者的情況下被接受，是更好的。"},{"title":"#36","vocab":["capsule","ceremony","archive","accurate","document"],"en":"A week before graduation, Lily's class held a time capsule ceremony. Each student placed an object inside a wooden box that would be sealed and stored in the school's archive for twenty years. Lily chose to put in a hand-drawn map of the school — not how it looked officially, but how Lily had experienced it: the corner near the water fountain where secrets were told, the classroom window that faced the mountains, the small garden no one was supposed to enter but everyone had. The map was not accurate. It was true. When the lid was hammered shut, Lily thought: in twenty years, whoever opens this will find not a document but a feeling — and that, Lily decided, was the most honest thing a person can leave behind.","zh":"畢業前一週，Lily的班舉行了時光膠囊典禮。每個學生把一件物品放入一個木箱，這個木箱將被密封，在學校的檔案館保存二十年。Lily選擇放入一張手繪的學校地圖——不是官方的樣子，而是Lily所體驗的：飲水機旁分享秘密的角落，朝著山脈的教室窗戶，那個不允許任何人進入但所有人都進過的小花園。這張地圖並不準確，但它是真實的。當蓋子被鎚下去時，Lily想：二十年後，打開這個的人會找到的不是一份文件，而是一種感覺——而Lily決定，這是一個人能留下的最誠實的東西。"},{"title":"#37","vocab":["workbooks","handwriting","unsteady","certain","distance"],"en":"The night before the last day of school, Max could not sleep. Not from excitement, but from a strange quiet feeling that was hard to name. Max got up and walked to the desk where all the old workbooks were stacked. Grade one, grade two, all the way to grade six. Max opened the grade one book and looked at the handwriting inside — round, unsteady letters, pressing too hard on the pencil. Then Max opened the grade six book and saw the handwriting there: lighter, faster, more certain. It was still the same hand. But the distance between those two pages felt like a country Max had crossed without a map, one small step at a time, and had somehow arrived.","zh":"上學最後一天的前一晚，Max睡不著。不是因為興奮，而是一種難以命名的奇怪平靜感。Max起身走到桌旁，那裡疊放著所有的舊作業本。一年級、二年級，一直到六年級。Max打開一年級的作業本，看著裡面的字跡——圓潤、不穩定的字母，鉛筆按得太用力。然後Max打開六年級的作業本，看著那裡的字跡：更輕、更快、更確定。還是同一雙手。但那兩頁之間的距離感覺像是Max在沒有地圖的情況下橫跨過的一個國家，每次一小步，卻不知怎麼地到達了。"},{"title":"#38","vocab":["assigned","community","presence","ritual","elderly"],"en":"Two months before graduation, Mia was assigned a community service project. Most students chose something organized and safe. Mia chose to spend twelve Saturday mornings at a care home for the elderly in Yilan. The first visit was awkward — Mia did not know what to say or do. An old woman named Mrs. Huang asked Mia to sit and simply stay. \"Old people don't need activity,\" she said. \"We need presence.\" Mia came back the next Saturday, and the next. By the final visit, Mia and Mrs. Huang had developed a ritual: Mia would read the weather report aloud, and she would say whether she believed it. It was a small ritual. It was also, Mia understood by then, a form of love.","zh":"畢業前兩個月，Mia被分配了一個社區服務專題。大多數學生選擇了有組織且安全的事情。Mia選擇在Yilan的一家老人護理院度過十二個星期六的早晨。第一次拜訪很尷尬——Mia不知道說什麼或做什麼。一位名叫黃奶奶的老太太請Mia坐下，只要陪著就好。「老人不需要活動，」她說。「我們需要陪伴。」Mia下個星期六又回來了，然後又回來了。到最後一次拜訪時，Mia和黃奶奶建立了一個習慣：Mia大聲讀天氣預報，她說她是否相信。這是個小習慣。但到那時Mia明白了，這也是一種愛的形式。"},{"title":"#39","vocab":["unusual","immigrated","conclusion","interview","assignment"],"en":"Near the end of sixth grade, Alex's teacher gave the class an unusual assignment: interview someone who had done something they were afraid to do, and write about what they learned. Alex chose to interview a neighbor who had immigrated to Taiwan from Vietnam twenty years ago, speaking no Chinese and knowing no one. The neighbor described arriving at the airport with one bag and an address written on a piece of paper. \"Were you afraid?\" Alex asked. \"Completely,\" the neighbor said. \"And then I wasn't.\" Alex asked what had changed. The neighbor smiled: \"I just did the next thing. And then the next.\" Alex wrote those words at the top of the report and could not find a better conclusion. Sometimes the entire answer fits in one short sentence.","zh":"六年級快結束時，Alex的老師給班上布置了一項不尋常的作業：採訪一個做過他們害怕做的事情的人，並寫下他們學到了什麼。Alex選擇採訪了一個二十年前從越南移民到台灣的鄰居，當時他不會說中文，也不認識任何人。鄰居描述了帶著一個包和一張寫著地址的紙條到達機場的情景。「你害怕嗎？」Alex問。「非常害怕，」鄰居說。「然後我就不害怕了。」Alex問是什麼改變了。鄰居微笑：「我只是做了下一件事，然後再下一件。」Alex把這些話寫在報告的最上面，找不到更好的結語。有時候，整個答案只需要一個短句。"},{"title":"#40","vocab":["personally","paused","certain","weight","continued"],"en":"It was the last English class of elementary school. The teacher asked everyone to write one sentence — just one — that described what English meant to them personally. The room was quiet for a long time. Some students wrote about travel, some about music, some about games. Anna wrote: \"English is the door I didn't know I wanted to open until it was already open.\" The teacher read all the sentences without names. When she read Anna's, she paused for a moment before continuing. After class, she told Anna quietly, \"Keep writing.\" Anna did not know exactly what that meant yet. But walking out of the school for the last time, Anna felt the weight of those two words in a pocket, small and certain, like a key.","zh":"這是小學最後一堂英語課。老師請每個人寫一句話——只一句——描述英文對他們個人的意義。教室安靜了很長時間。有些學生寫了旅行，有些寫了音樂，有些寫了遊戲。Anna寫道：「英文是那扇我在打開之前不知道自己想打開的門。」老師沒有說名字就讀了所有的句子。當她讀到Anna的那句時，她停頓了一下才繼續。課後，她悄悄告訴Anna：「繼續寫。」Anna還不確切知道這是什麼意思。但最後一次走出學校時，Anna感受到那兩個字在口袋裡的重量，細小而確定，像一把鑰匙。"},{"title":"#41","vocab":["elementary","ordinary","shaping","significant","argument"],"en":"On the last day of elementary school, Ren sat alone in the classroom for a few minutes after everyone had left. Six years had passed in this room. Ren thought about the first day — the nervous feeling of not knowing anyone, the strange smell of new textbooks, the way the teacher had written everyone's name on the board in colored chalk. So much had changed since then. Ren had failed a math test, lost a best friend over a silly argument, cried during a school play, and laughed until tears came during a class trip. None of it had seemed significant at the time. But sitting there now in the quiet, Ren understood that each of those small, ordinary moments had been quietly shaping the person now walking out the door.","zh":"小學最後一天，Ren在所有人都離開後獨自在教室裡坐了幾分鐘。六年在這個房間裡過去了。Ren想起了第一天——不認識任何人的緊張感，新課本奇特的氣味，老師用彩色粉筆把每個人的名字寫在黑板上的樣子。從那以後一切都改變了太多。Ren數學考試不及格，為了一件蠢事失去了最好的朋友，在學校話劇中哭泣，在班級郊遊時笑到流淚。當時每一件事看起來都不重要。但現在坐在安靜中，Ren明白了，每一個細小而平凡的時刻都在悄悄地塑造著現在走出門的那個人。"},{"title":"#42","vocab":["ceremony","perseverance","obvious","principal","attention"],"en":"Three weeks before graduation, Amy was asked to write a speech for the ceremony. The topic was: what did elementary school teach you that cannot be found in a textbook? Amy stared at the blank page for a long time. The obvious answers — friendship, effort, perseverance — felt too simple. Amy thought about the afternoon when the whole class had stayed late to help a classmate finish a project. No one had been asked to stay. No one had been given extra marks for staying. They had simply stayed because it was the right thing to do. That was the story Amy told at the ceremony. When the speech ended, several parents were wiping their eyes. The principal whispered to the English teacher, \"Where did that come from?\" The teacher smiled and said, \"From six years of paying attention.\"","zh":"畢業前三週，Amy被要求為典禮寫一篇演講。主題是：小學教了你什麼是課本裡找不到的？Amy對著空白的紙盯了很長時間。顯而易見的答案——友誼、努力、堅持——感覺太簡單了。Amy想到了那個整個班留下來幫助一個同學完成專題的下午。沒有人被要求留下。沒有人因為留下而得到額外的分數。他們只是留了下來，因為這是對的事。這就是Amy在典禮上講述的故事。演講結束時，幾位家長在擦眼淚。校長悄聲對英語老師說：「這是哪裡來的？」老師微笑說：「來自六年的用心。」"},{"title":"#43","vocab":["organized","research","unexpected","hardship","lifetime"],"en":"In the final semester, the school organized a project called \"Roots.\" Each student had to research their family's history and present it to the class. Leo had always thought of family history as boring — dates and names on a page. But when Leo sat down with Grandpa and asked him about his childhood, something unexpected happened. Grandpa began to cry, quietly, while describing how he had walked three hours to school as a boy because there was no bus. \"We didn't think of it as hardship,\" Grandpa said. \"We just thought of it as morning.\" Leo wrote that sentence down immediately. At the presentation, Leo read it aloud. Several classmates asked if they could write it down too. Some truths, Leo discovered, are so simple that they take a lifetime to understand.","zh":"最後一學期，學校組織了一個名為「根」的專題。每個學生必須研究家族歷史並向全班展示。Leo一直認為家族歷史很無聊——紙上的日期和名字。但當Leo坐下來問爺爺他的童年時，出乎意料的事情發生了。爺爺開始默默地哭泣，描述他小時候因為沒有巴士而步行三個小時去上學的情況。「我們沒有把它當作艱辛，」爺爺說。「我們只是把它當作早晨。」Leo立刻把這句話寫了下來。在展示時，Leo大聲朗讀了它。幾個同學問他們是否也能把它寫下來。有些真理，Leo發現，是如此簡單，以至於需要一輩子才能理解。"},{"title":"#44","vocab":["landscape","philosophical","journey","pineapple","mountains"],"en":"The summer before junior high school, Emma traveled alone on a train for the first time, visiting a cousin in Hsinchu. The journey took four hours. Emma had brought a book but never opened it. Instead, Emma watched the landscape change outside the window — rice fields giving way to mountains, mountains giving way to coast. A grandmother sitting nearby offered Emma a slice of pineapple cake and asked, \"Are you going somewhere or coming from somewhere?\" Emma thought about the question for the rest of the journey. \"Both,\" Emma finally decided. \"I think it's always both.\" It was the most philosophical Emma had ever felt on a Tuesday afternoon.","zh":"國中入學前的暑假，Emma第一次獨自乘火車，去Hsinchu拜訪一個表親。旅程花了四小時。Emma帶了一本書，但始終沒有打開。相反，Emma看著窗外的風景變化——稻田讓位給山脈，山脈讓位給海岸。一位坐在旁邊的奶奶給Emma一片鳳梨酥，問：「你是要去某個地方，還是從某個地方回來？」Emma在接下來的旅程中一直在思考這個問題。「兩者都是，」Emma最後決定。「我想它永遠都是兩者。」這是Emma在一個星期二下午有過的最富哲理的感受。"},{"title":"#45","vocab":["assigned","staffroom","comments","witness","drafts"],"en":"Sam spent the last month of elementary school writing letters to each teacher — not because it was assigned, but because Sam wanted to. The hardest one to write was to the English teacher, Mr. Chen. He had never given Sam top marks, but had left comments like \"almost\" and \"try again\" on every paper. At first those words had felt unkind. Now, looking back, Sam realized those two words had done more for Sam's English than any perfect score ever could have. The letter took four drafts to get right. Mr. Chen read it twice in the staffroom and folded it carefully into his jacket pocket. Sam never saw him read it, but heard from a classmate who had. Some things are better received without a witness.","zh":"Sam在小學的最後一個月花時間給每一位老師寫信——不是因為被要求，而是因為Sam想這樣做。最難寫的是給英語老師陳老師的信。他從未給過Sam最高分，但在每份作業上留下「幾乎了」和「再試試」這樣的評語。起初，這些話感覺不親切。現在回想起來，Sam意識到這兩個詞對Sam的英文的幫助，比任何完美分數都要多。這封信花了四稿才寫好。陳老師在教職員室讀了兩遍，小心地把它折起來放進了夾克口袋。Sam從未親眼看到他讀它，但從一個同學那裡聽說了。有些事在沒有見證者的情況下被接受，是更好的。"},{"title":"#46","vocab":["capsule","ceremony","archive","accurate","document"],"en":"A week before graduation, Coco's class held a time capsule ceremony. Each student placed an object inside a wooden box that would be sealed and stored in the school's archive for twenty years. Coco chose to put in a hand-drawn map of the school — not how it looked officially, but how Coco had experienced it: the corner near the water fountain where secrets were told, the classroom window that faced the mountains, the small garden no one was supposed to enter but everyone had. The map was not accurate. It was true. When the lid was hammered shut, Coco thought: in twenty years, whoever opens this will find not a document but a feeling — and that, Coco decided, was the most honest thing a person can leave behind.","zh":"畢業前一週，Coco的班舉行了時光膠囊典禮。每個學生把一件物品放入一個木箱，這個木箱將被密封，在學校的檔案館保存二十年。Coco選擇放入一張手繪的學校地圖——不是官方的樣子，而是Coco所體驗的：飲水機旁分享秘密的角落，朝著山脈的教室窗戶，那個不允許任何人進入但所有人都進過的小花園。這張地圖並不準確，但它是真實的。當蓋子被鎚下去時，Coco想：二十年後，打開這個的人會找到的不是一份文件，而是一種感覺——而Coco決定，這是一個人能留下的最誠實的東西。"},{"title":"#47","vocab":["workbooks","handwriting","unsteady","certain","distance"],"en":"The night before the last day of school, Tim could not sleep. Not from excitement, but from a strange quiet feeling that was hard to name. Tim got up and walked to the desk where all the old workbooks were stacked. Grade one, grade two, all the way to grade six. Tim opened the grade one book and looked at the handwriting inside — round, unsteady letters, pressing too hard on the pencil. Then Tim opened the grade six book and saw the handwriting there: lighter, faster, more certain. It was still the same hand. But the distance between those two pages felt like a country Tim had crossed without a map, one small step at a time, and had somehow arrived.","zh":"上學最後一天的前一晚，Tim睡不著。不是因為興奮，而是一種難以命名的奇怪平靜感。Tim起身走到桌旁，那裡疊放著所有的舊作業本。一年級、二年級，一直到六年級。Tim打開一年級的作業本，看著裡面的字跡——圓潤、不穩定的字母，鉛筆按得太用力。然後Tim打開六年級的作業本，看著那裡的字跡：更輕、更快、更確定。還是同一雙手。但那兩頁之間的距離感覺像是Tim在沒有地圖的情況下橫跨過的一個國家，每次一小步，卻不知怎麼地到達了。"},{"title":"#48","vocab":["assigned","community","presence","ritual","elderly"],"en":"Two months before graduation, Mei was assigned a community service project. Most students chose something organized and safe. Mei chose to spend twelve Saturday mornings at a care home for the elderly in Penghu. The first visit was awkward — Mei did not know what to say or do. An old woman named Mrs. Huang asked Mei to sit and simply stay. \"Old people don't need activity,\" she said. \"We need presence.\" Mei came back the next Saturday, and the next. By the final visit, Mei and Mrs. Huang had developed a ritual: Mei would read the weather report aloud, and she would say whether she believed it. It was a small ritual. It was also, Mei understood by then, a form of love.","zh":"畢業前兩個月，Mei被分配了一個社區服務專題。大多數學生選擇了有組織且安全的事情。Mei選擇在Penghu的一家老人護理院度過十二個星期六的早晨。第一次拜訪很尷尬——Mei不知道說什麼或做什麼。一位名叫黃奶奶的老太太請Mei坐下，只要陪著就好。「老人不需要活動，」她說。「我們需要陪伴。」Mei下個星期六又回來了，然後又回來了。到最後一次拜訪時，Mei和黃奶奶建立了一個習慣：Mei大聲讀天氣預報，她說她是否相信。這是個小習慣。但到那時Mei明白了，這也是一種愛的形式。"},{"title":"#49","vocab":["unusual","immigrated","conclusion","interview","assignment"],"en":"Near the end of sixth grade, Ben's teacher gave the class an unusual assignment: interview someone who had done something they were afraid to do, and write about what they learned. Ben chose to interview a neighbor who had immigrated to Taiwan from Vietnam twenty years ago, speaking no Chinese and knowing no one. The neighbor described arriving at the airport with one bag and an address written on a piece of paper. \"Were you afraid?\" Ben asked. \"Completely,\" the neighbor said. \"And then I wasn't.\" Ben asked what had changed. The neighbor smiled: \"I just did the next thing. And then the next.\" Ben wrote those words at the top of the report and could not find a better conclusion. Sometimes the entire answer fits in one short sentence.","zh":"六年級快結束時，Ben的老師給班上布置了一項不尋常的作業：採訪一個做過他們害怕做的事情的人，並寫下他們學到了什麼。Ben選擇採訪了一個二十年前從越南移民到台灣的鄰居，當時他不會說中文，也不認識任何人。鄰居描述了帶著一個包和一張寫著地址的紙條到達機場的情景。「你害怕嗎？」Ben問。「非常害怕，」鄰居說。「然後我就不害怕了。」Ben問是什麼改變了。鄰居微笑：「我只是做了下一件事，然後再下一件。」Ben把這些話寫在報告的最上面，找不到更好的結語。有時候，整個答案只需要一個短句。"},{"title":"#50","vocab":["personally","paused","certain","weight","continued"],"en":"It was the last English class of elementary school. The teacher asked everyone to write one sentence — just one — that described what English meant to them personally. The room was quiet for a long time. Some students wrote about travel, some about music, some about games. Zoe wrote: \"English is the door I didn't know I wanted to open until it was already open.\" The teacher read all the sentences without names. When she read Zoe's, she paused for a moment before continuing. After class, she told Zoe quietly, \"Keep writing.\" Zoe did not know exactly what that meant yet. But walking out of the school for the last time, Zoe felt the weight of those two words in a pocket, small and certain, like a key.","zh":"這是小學最後一堂英語課。老師請每個人寫一句話——只一句——描述英文對他們個人的意義。教室安靜了很長時間。有些學生寫了旅行，有些寫了音樂，有些寫了遊戲。Zoe寫道：「英文是那扇我在打開之前不知道自己想打開的門。」老師沒有說名字就讀了所有的句子。當她讀到Zoe的那句時，她停頓了一下才繼續。課後，她悄悄告訴Zoe：「繼續寫。」Zoe還不確切知道這是什麼意思。但最後一次走出學校時，Zoe感受到那兩個字在口袋裡的重量，細小而確定，像一把鑰匙。"},{"title":"#51","vocab":["elementary","ordinary","shaping","significant","argument"],"en":"On the last day of elementary school, Jack sat alone in the classroom for a few minutes after everyone had left. Six years had passed in this room. Jack thought about the first day — the nervous feeling of not knowing anyone, the strange smell of new textbooks, the way the teacher had written everyone's name on the board in colored chalk. So much had changed since then. Jack had failed a math test, lost a best friend over a silly argument, cried during a school play, and laughed until tears came during a class trip. None of it had seemed significant at the time. But sitting there now in the quiet, Jack understood that each of those small, ordinary moments had been quietly shaping the person now walking out the door.","zh":"小學最後一天，Jack在所有人都離開後獨自在教室裡坐了幾分鐘。六年在這個房間裡過去了。Jack想起了第一天——不認識任何人的緊張感，新課本奇特的氣味，老師用彩色粉筆把每個人的名字寫在黑板上的樣子。從那以後一切都改變了太多。Jack數學考試不及格，為了一件蠢事失去了最好的朋友，在學校話劇中哭泣，在班級郊遊時笑到流淚。當時每一件事看起來都不重要。但現在坐在安靜中，Jack明白了，每一個細小而平凡的時刻都在悄悄地塑造著現在走出門的那個人。"},{"title":"#52","vocab":["ceremony","perseverance","obvious","principal","attention"],"en":"Three weeks before graduation, Nina was asked to write a speech for the ceremony. The topic was: what did elementary school teach you that cannot be found in a textbook? Nina stared at the blank page for a long time. The obvious answers — friendship, effort, perseverance — felt too simple. Nina thought about the afternoon when the whole class had stayed late to help a classmate finish a project. No one had been asked to stay. No one had been given extra marks for staying. They had simply stayed because it was the right thing to do. That was the story Nina told at the ceremony. When the speech ended, several parents were wiping their eyes. The principal whispered to the English teacher, \"Where did that come from?\" The teacher smiled and said, \"From six years of paying attention.\"","zh":"畢業前三週，Nina被要求為典禮寫一篇演講。主題是：小學教了你什麼是課本裡找不到的？Nina對著空白的紙盯了很長時間。顯而易見的答案——友誼、努力、堅持——感覺太簡單了。Nina想到了那個整個班留下來幫助一個同學完成專題的下午。沒有人被要求留下。沒有人因為留下而得到額外的分數。他們只是留了下來，因為這是對的事。這就是Nina在典禮上講述的故事。演講結束時，幾位家長在擦眼淚。校長悄聲對英語老師說：「這是哪裡來的？」老師微笑說：「來自六年的用心。」"},{"title":"#53","vocab":["organized","research","unexpected","hardship","lifetime"],"en":"In the final semester, the school organized a project called \"Roots.\" Each student had to research their family's history and present it to the class. Ruby had always thought of family history as boring — dates and names on a page. But when Ruby sat down with Grandpa and asked him about his childhood, something unexpected happened. Grandpa began to cry, quietly, while describing how he had walked three hours to school as a boy because there was no bus. \"We didn't think of it as hardship,\" Grandpa said. \"We just thought of it as morning.\" Ruby wrote that sentence down immediately. At the presentation, Ruby read it aloud. Several classmates asked if they could write it down too. Some truths, Ruby discovered, are so simple that they take a lifetime to understand.","zh":"最後一學期，學校組織了一個名為「根」的專題。每個學生必須研究家族歷史並向全班展示。Ruby一直認為家族歷史很無聊——紙上的日期和名字。但當Ruby坐下來問爺爺他的童年時，出乎意料的事情發生了。爺爺開始默默地哭泣，描述他小時候因為沒有巴士而步行三個小時去上學的情況。「我們沒有把它當作艱辛，」爺爺說。「我們只是把它當作早晨。」Ruby立刻把這句話寫了下來。在展示時，Ruby大聲朗讀了它。幾個同學問他們是否也能把它寫下來。有些真理，Ruby發現，是如此簡單，以至於需要一輩子才能理解。"},{"title":"#54","vocab":["landscape","philosophical","journey","pineapple","mountains"],"en":"The summer before junior high school, Kai traveled alone on a train for the first time, visiting a cousin in Kaohsiung. The journey took four hours. Kai had brought a book but never opened it. Instead, Kai watched the landscape change outside the window — rice fields giving way to mountains, mountains giving way to coast. A grandmother sitting nearby offered Kai a slice of pineapple cake and asked, \"Are you going somewhere or coming from somewhere?\" Kai thought about the question for the rest of the journey. \"Both,\" Kai finally decided. \"I think it's always both.\" It was the most philosophical Kai had ever felt on a Tuesday afternoon.","zh":"國中入學前的暑假，Kai第一次獨自乘火車，去Kaohsiung拜訪一個表親。旅程花了四小時。Kai帶了一本書，但始終沒有打開。相反，Kai看著窗外的風景變化——稻田讓位給山脈，山脈讓位給海岸。一位坐在旁邊的奶奶給Kai一片鳳梨酥，問：「你是要去某個地方，還是從某個地方回來？」Kai在接下來的旅程中一直在思考這個問題。「兩者都是，」Kai最後決定。「我想它永遠都是兩者。」這是Kai在一個星期二下午有過的最富哲理的感受。"},{"title":"#55","vocab":["assigned","staffroom","comments","witness","drafts"],"en":"Tom spent the last month of elementary school writing letters to each teacher — not because it was assigned, but because Tom wanted to. The hardest one to write was to the English teacher, Mr. Chen. He had never given Tom top marks, but had left comments like \"almost\" and \"try again\" on every paper. At first those words had felt unkind. Now, looking back, Tom realized those two words had done more for Tom's English than any perfect score ever could have. The letter took four drafts to get right. Mr. Chen read it twice in the staffroom and folded it carefully into his jacket pocket. Tom never saw him read it, but heard from a classmate who had. Some things are better received without a witness.","zh":"Tom在小學的最後一個月花時間給每一位老師寫信——不是因為被要求，而是因為Tom想這樣做。最難寫的是給英語老師陳老師的信。他從未給過Tom最高分，但在每份作業上留下「幾乎了」和「再試試」這樣的評語。起初，這些話感覺不親切。現在回想起來，Tom意識到這兩個詞對Tom的英文的幫助，比任何完美分數都要多。這封信花了四稿才寫好。陳老師在教職員室讀了兩遍，小心地把它折起來放進了夾克口袋。Tom從未親眼看到他讀它，但從一個同學那裡聽說了。有些事在沒有見證者的情況下被接受，是更好的。"},{"title":"#56","vocab":["capsule","ceremony","archive","accurate","document"],"en":"A week before graduation, Lily's class held a time capsule ceremony. Each student placed an object inside a wooden box that would be sealed and stored in the school's archive for twenty years. Lily chose to put in a hand-drawn map of the school — not how it looked officially, but how Lily had experienced it: the corner near the water fountain where secrets were told, the classroom window that faced the mountains, the small garden no one was supposed to enter but everyone had. The map was not accurate. It was true. When the lid was hammered shut, Lily thought: in twenty years, whoever opens this will find not a document but a feeling — and that, Lily decided, was the most honest thing a person can leave behind.","zh":"畢業前一週，Lily的班舉行了時光膠囊典禮。每個學生把一件物品放入一個木箱，這個木箱將被密封，在學校的檔案館保存二十年。Lily選擇放入一張手繪的學校地圖——不是官方的樣子，而是Lily所體驗的：飲水機旁分享秘密的角落，朝著山脈的教室窗戶，那個不允許任何人進入但所有人都進過的小花園。這張地圖並不準確，但它是真實的。當蓋子被鎚下去時，Lily想：二十年後，打開這個的人會找到的不是一份文件，而是一種感覺——而Lily決定，這是一個人能留下的最誠實的東西。"},{"title":"#57","vocab":["workbooks","handwriting","unsteady","certain","distance"],"en":"The night before the last day of school, Max could not sleep. Not from excitement, but from a strange quiet feeling that was hard to name. Max got up and walked to the desk where all the old workbooks were stacked. Grade one, grade two, all the way to grade six. Max opened the grade one book and looked at the handwriting inside — round, unsteady letters, pressing too hard on the pencil. Then Max opened the grade six book and saw the handwriting there: lighter, faster, more certain. It was still the same hand. But the distance between those two pages felt like a country Max had crossed without a map, one small step at a time, and had somehow arrived.","zh":"上學最後一天的前一晚，Max睡不著。不是因為興奮，而是一種難以命名的奇怪平靜感。Max起身走到桌旁，那裡疊放著所有的舊作業本。一年級、二年級，一直到六年級。Max打開一年級的作業本，看著裡面的字跡——圓潤、不穩定的字母，鉛筆按得太用力。然後Max打開六年級的作業本，看著那裡的字跡：更輕、更快、更確定。還是同一雙手。但那兩頁之間的距離感覺像是Max在沒有地圖的情況下橫跨過的一個國家，每次一小步，卻不知怎麼地到達了。"},{"title":"#58","vocab":["assigned","community","presence","ritual","elderly"],"en":"Two months before graduation, Mia was assigned a community service project. Most students chose something organized and safe. Mia chose to spend twelve Saturday mornings at a care home for the elderly in Taipei. The first visit was awkward — Mia did not know what to say or do. An old woman named Mrs. Huang asked Mia to sit and simply stay. \"Old people don't need activity,\" she said. \"We need presence.\" Mia came back the next Saturday, and the next. By the final visit, Mia and Mrs. Huang had developed a ritual: Mia would read the weather report aloud, and she would say whether she believed it. It was a small ritual. It was also, Mia understood by then, a form of love.","zh":"畢業前兩個月，Mia被分配了一個社區服務專題。大多數學生選擇了有組織且安全的事情。Mia選擇在Taipei的一家老人護理院度過十二個星期六的早晨。第一次拜訪很尷尬——Mia不知道說什麼或做什麼。一位名叫黃奶奶的老太太請Mia坐下，只要陪著就好。「老人不需要活動，」她說。「我們需要陪伴。」Mia下個星期六又回來了，然後又回來了。到最後一次拜訪時，Mia和黃奶奶建立了一個習慣：Mia大聲讀天氣預報，她說她是否相信。這是個小習慣。但到那時Mia明白了，這也是一種愛的形式。"},{"title":"#59","vocab":["unusual","immigrated","conclusion","interview","assignment"],"en":"Near the end of sixth grade, Alex's teacher gave the class an unusual assignment: interview someone who had done something they were afraid to do, and write about what they learned. Alex chose to interview a neighbor who had immigrated to Taiwan from Vietnam twenty years ago, speaking no Chinese and knowing no one. The neighbor described arriving at the airport with one bag and an address written on a piece of paper. \"Were you afraid?\" Alex asked. \"Completely,\" the neighbor said. \"And then I wasn't.\" Alex asked what had changed. The neighbor smiled: \"I just did the next thing. And then the next.\" Alex wrote those words at the top of the report and could not find a better conclusion. Sometimes the entire answer fits in one short sentence.","zh":"六年級快結束時，Alex的老師給班上布置了一項不尋常的作業：採訪一個做過他們害怕做的事情的人，並寫下他們學到了什麼。Alex選擇採訪了一個二十年前從越南移民到台灣的鄰居，當時他不會說中文，也不認識任何人。鄰居描述了帶著一個包和一張寫著地址的紙條到達機場的情景。「你害怕嗎？」Alex問。「非常害怕，」鄰居說。「然後我就不害怕了。」Alex問是什麼改變了。鄰居微笑：「我只是做了下一件事，然後再下一件。」Alex把這些話寫在報告的最上面，找不到更好的結語。有時候，整個答案只需要一個短句。"},{"title":"#60","vocab":["personally","paused","certain","weight","continued"],"en":"It was the last English class of elementary school. The teacher asked everyone to write one sentence — just one — that described what English meant to them personally. The room was quiet for a long time. Some students wrote about travel, some about music, some about games. Anna wrote: \"English is the door I didn't know I wanted to open until it was already open.\" The teacher read all the sentences without names. When she read Anna's, she paused for a moment before continuing. After class, she told Anna quietly, \"Keep writing.\" Anna did not know exactly what that meant yet. But walking out of the school for the last time, Anna felt the weight of those two words in a pocket, small and certain, like a key.","zh":"這是小學最後一堂英語課。老師請每個人寫一句話——只一句——描述英文對他們個人的意義。教室安靜了很長時間。有些學生寫了旅行，有些寫了音樂，有些寫了遊戲。Anna寫道：「英文是那扇我在打開之前不知道自己想打開的門。」老師沒有說名字就讀了所有的句子。當她讀到Anna的那句時，她停頓了一下才繼續。課後，她悄悄告訴Anna：「繼續寫。」Anna還不確切知道這是什麼意思。但最後一次走出學校時，Anna感受到那兩個字在口袋裡的重量，細小而確定，像一把鑰匙。"},{"title":"#61","vocab":["elementary","ordinary","shaping","significant","argument"],"en":"On the last day of elementary school, Ren sat alone in the classroom for a few minutes after everyone had left. Six years had passed in this room. Ren thought about the first day — the nervous feeling of not knowing anyone, the strange smell of new textbooks, the way the teacher had written everyone's name on the board in colored chalk. So much had changed since then. Ren had failed a math test, lost a best friend over a silly argument, cried during a school play, and laughed until tears came during a class trip. None of it had seemed significant at the time. But sitting there now in the quiet, Ren understood that each of those small, ordinary moments had been quietly shaping the person now walking out the door.","zh":"小學最後一天，Ren在所有人都離開後獨自在教室裡坐了幾分鐘。六年在這個房間裡過去了。Ren想起了第一天——不認識任何人的緊張感，新課本奇特的氣味，老師用彩色粉筆把每個人的名字寫在黑板上的樣子。從那以後一切都改變了太多。Ren數學考試不及格，為了一件蠢事失去了最好的朋友，在學校話劇中哭泣，在班級郊遊時笑到流淚。當時每一件事看起來都不重要。但現在坐在安靜中，Ren明白了，每一個細小而平凡的時刻都在悄悄地塑造著現在走出門的那個人。"},{"title":"#62","vocab":["ceremony","perseverance","obvious","principal","attention"],"en":"Three weeks before graduation, Amy was asked to write a speech for the ceremony. The topic was: what did elementary school teach you that cannot be found in a textbook? Amy stared at the blank page for a long time. The obvious answers — friendship, effort, perseverance — felt too simple. Amy thought about the afternoon when the whole class had stayed late to help a classmate finish a project. No one had been asked to stay. No one had been given extra marks for staying. They had simply stayed because it was the right thing to do. That was the story Amy told at the ceremony. When the speech ended, several parents were wiping their eyes. The principal whispered to the English teacher, \"Where did that come from?\" The teacher smiled and said, \"From six years of paying attention.\"","zh":"畢業前三週，Amy被要求為典禮寫一篇演講。主題是：小學教了你什麼是課本裡找不到的？Amy對著空白的紙盯了很長時間。顯而易見的答案——友誼、努力、堅持——感覺太簡單了。Amy想到了那個整個班留下來幫助一個同學完成專題的下午。沒有人被要求留下。沒有人因為留下而得到額外的分數。他們只是留了下來，因為這是對的事。這就是Amy在典禮上講述的故事。演講結束時，幾位家長在擦眼淚。校長悄聲對英語老師說：「這是哪裡來的？」老師微笑說：「來自六年的用心。」"},{"title":"#63","vocab":["organized","research","unexpected","hardship","lifetime"],"en":"In the final semester, the school organized a project called \"Roots.\" Each student had to research their family's history and present it to the class. Leo had always thought of family history as boring — dates and names on a page. But when Leo sat down with Grandpa and asked him about his childhood, something unexpected happened. Grandpa began to cry, quietly, while describing how he had walked three hours to school as a boy because there was no bus. \"We didn't think of it as hardship,\" Grandpa said. \"We just thought of it as morning.\" Leo wrote that sentence down immediately. At the presentation, Leo read it aloud. Several classmates asked if they could write it down too. Some truths, Leo discovered, are so simple that they take a lifetime to understand.","zh":"最後一學期，學校組織了一個名為「根」的專題。每個學生必須研究家族歷史並向全班展示。Leo一直認為家族歷史很無聊——紙上的日期和名字。但當Leo坐下來問爺爺他的童年時，出乎意料的事情發生了。爺爺開始默默地哭泣，描述他小時候因為沒有巴士而步行三個小時去上學的情況。「我們沒有把它當作艱辛，」爺爺說。「我們只是把它當作早晨。」Leo立刻把這句話寫了下來。在展示時，Leo大聲朗讀了它。幾個同學問他們是否也能把它寫下來。有些真理，Leo發現，是如此簡單，以至於需要一輩子才能理解。"},{"title":"#64","vocab":["landscape","philosophical","journey","pineapple","mountains"],"en":"The summer before junior high school, Emma traveled alone on a train for the first time, visiting a cousin in Jiufen. The journey took four hours. Emma had brought a book but never opened it. Instead, Emma watched the landscape change outside the window — rice fields giving way to mountains, mountains giving way to coast. A grandmother sitting nearby offered Emma a slice of pineapple cake and asked, \"Are you going somewhere or coming from somewhere?\" Emma thought about the question for the rest of the journey. \"Both,\" Emma finally decided. \"I think it's always both.\" It was the most philosophical Emma had ever felt on a Tuesday afternoon.","zh":"國中入學前的暑假，Emma第一次獨自乘火車，去Jiufen拜訪一個表親。旅程花了四小時。Emma帶了一本書，但始終沒有打開。相反，Emma看著窗外的風景變化——稻田讓位給山脈，山脈讓位給海岸。一位坐在旁邊的奶奶給Emma一片鳳梨酥，問：「你是要去某個地方，還是從某個地方回來？」Emma在接下來的旅程中一直在思考這個問題。「兩者都是，」Emma最後決定。「我想它永遠都是兩者。」這是Emma在一個星期二下午有過的最富哲理的感受。"},{"title":"#65","vocab":["assigned","staffroom","comments","witness","drafts"],"en":"Sam spent the last month of elementary school writing letters to each teacher — not because it was assigned, but because Sam wanted to. The hardest one to write was to the English teacher, Mr. Chen. He had never given Sam top marks, but had left comments like \"almost\" and \"try again\" on every paper. At first those words had felt unkind. Now, looking back, Sam realized those two words had done more for Sam's English than any perfect score ever could have. The letter took four drafts to get right. Mr. Chen read it twice in the staffroom and folded it carefully into his jacket pocket. Sam never saw him read it, but heard from a classmate who had. Some things are better received without a witness.","zh":"Sam在小學的最後一個月花時間給每一位老師寫信——不是因為被要求，而是因為Sam想這樣做。最難寫的是給英語老師陳老師的信。他從未給過Sam最高分，但在每份作業上留下「幾乎了」和「再試試」這樣的評語。起初，這些話感覺不親切。現在回想起來，Sam意識到這兩個詞對Sam的英文的幫助，比任何完美分數都要多。這封信花了四稿才寫好。陳老師在教職員室讀了兩遍，小心地把它折起來放進了夾克口袋。Sam從未親眼看到他讀它，但從一個同學那裡聽說了。有些事在沒有見證者的情況下被接受，是更好的。"},{"title":"#66","vocab":["capsule","ceremony","archive","accurate","document"],"en":"A week before graduation, Coco's class held a time capsule ceremony. Each student placed an object inside a wooden box that would be sealed and stored in the school's archive for twenty years. Coco chose to put in a hand-drawn map of the school — not how it looked officially, but how Coco had experienced it: the corner near the water fountain where secrets were told, the classroom window that faced the mountains, the small garden no one was supposed to enter but everyone had. The map was not accurate. It was true. When the lid was hammered shut, Coco thought: in twenty years, whoever opens this will find not a document but a feeling — and that, Coco decided, was the most honest thing a person can leave behind.","zh":"畢業前一週，Coco的班舉行了時光膠囊典禮。每個學生把一件物品放入一個木箱，這個木箱將被密封，在學校的檔案館保存二十年。Coco選擇放入一張手繪的學校地圖——不是官方的樣子，而是Coco所體驗的：飲水機旁分享秘密的角落，朝著山脈的教室窗戶，那個不允許任何人進入但所有人都進過的小花園。這張地圖並不準確，但它是真實的。當蓋子被鎚下去時，Coco想：二十年後，打開這個的人會找到的不是一份文件，而是一種感覺——而Coco決定，這是一個人能留下的最誠實的東西。"},{"title":"#67","vocab":["workbooks","handwriting","unsteady","certain","distance"],"en":"The night before the last day of school, Tim could not sleep. Not from excitement, but from a strange quiet feeling that was hard to name. Tim got up and walked to the desk where all the old workbooks were stacked. Grade one, grade two, all the way to grade six. Tim opened the grade one book and looked at the handwriting inside — round, unsteady letters, pressing too hard on the pencil. Then Tim opened the grade six book and saw the handwriting there: lighter, faster, more certain. It was still the same hand. But the distance between those two pages felt like a country Tim had crossed without a map, one small step at a time, and had somehow arrived.","zh":"上學最後一天的前一晚，Tim睡不著。不是因為興奮，而是一種難以命名的奇怪平靜感。Tim起身走到桌旁，那裡疊放著所有的舊作業本。一年級、二年級，一直到六年級。Tim打開一年級的作業本，看著裡面的字跡——圓潤、不穩定的字母，鉛筆按得太用力。然後Tim打開六年級的作業本，看著那裡的字跡：更輕、更快、更確定。還是同一雙手。但那兩頁之間的距離感覺像是Tim在沒有地圖的情況下橫跨過的一個國家，每次一小步，卻不知怎麼地到達了。"},{"title":"#68","vocab":["assigned","community","presence","ritual","elderly"],"en":"Two months before graduation, Mei was assigned a community service project. Most students chose something organized and safe. Mei chose to spend twelve Saturday mornings at a care home for the elderly in Hsinchu. The first visit was awkward — Mei did not know what to say or do. An old woman named Mrs. Huang asked Mei to sit and simply stay. \"Old people don't need activity,\" she said. \"We need presence.\" Mei came back the next Saturday, and the next. By the final visit, Mei and Mrs. Huang had developed a ritual: Mei would read the weather report aloud, and she would say whether she believed it. It was a small ritual. It was also, Mei understood by then, a form of love.","zh":"畢業前兩個月，Mei被分配了一個社區服務專題。大多數學生選擇了有組織且安全的事情。Mei選擇在Hsinchu的一家老人護理院度過十二個星期六的早晨。第一次拜訪很尷尬——Mei不知道說什麼或做什麼。一位名叫黃奶奶的老太太請Mei坐下，只要陪著就好。「老人不需要活動，」她說。「我們需要陪伴。」Mei下個星期六又回來了，然後又回來了。到最後一次拜訪時，Mei和黃奶奶建立了一個習慣：Mei大聲讀天氣預報，她說她是否相信。這是個小習慣。但到那時Mei明白了，這也是一種愛的形式。"},{"title":"#69","vocab":["unusual","immigrated","conclusion","interview","assignment"],"en":"Near the end of sixth grade, Ben's teacher gave the class an unusual assignment: interview someone who had done something they were afraid to do, and write about what they learned. Ben chose to interview a neighbor who had immigrated to Taiwan from Vietnam twenty years ago, speaking no Chinese and knowing no one. The neighbor described arriving at the airport with one bag and an address written on a piece of paper. \"Were you afraid?\" Ben asked. \"Completely,\" the neighbor said. \"And then I wasn't.\" Ben asked what had changed. The neighbor smiled: \"I just did the next thing. And then the next.\" Ben wrote those words at the top of the report and could not find a better conclusion. Sometimes the entire answer fits in one short sentence.","zh":"六年級快結束時，Ben的老師給班上布置了一項不尋常的作業：採訪一個做過他們害怕做的事情的人，並寫下他們學到了什麼。Ben選擇採訪了一個二十年前從越南移民到台灣的鄰居，當時他不會說中文，也不認識任何人。鄰居描述了帶著一個包和一張寫著地址的紙條到達機場的情景。「你害怕嗎？」Ben問。「非常害怕，」鄰居說。「然後我就不害怕了。」Ben問是什麼改變了。鄰居微笑：「我只是做了下一件事，然後再下一件。」Ben把這些話寫在報告的最上面，找不到更好的結語。有時候，整個答案只需要一個短句。"},{"title":"#70","vocab":["personally","paused","certain","weight","continued"],"en":"It was the last English class of elementary school. The teacher asked everyone to write one sentence — just one — that described what English meant to them personally. The room was quiet for a long time. Some students wrote about travel, some about music, some about games. Zoe wrote: \"English is the door I didn't know I wanted to open until it was already open.\" The teacher read all the sentences without names. When she read Zoe's, she paused for a moment before continuing. After class, she told Zoe quietly, \"Keep writing.\" Zoe did not know exactly what that meant yet. But walking out of the school for the last time, Zoe felt the weight of those two words in a pocket, small and certain, like a key.",
