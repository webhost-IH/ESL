ll tear from his eye.","zh":"Ruby報名了學校的烹飪比賽。任務是做一道台灣傳統料理。Ruby選擇了爺爺的拿手菜——滷肉飯。兩週來，Ruby每天晚上在家練習食譜。比賽當天，香味瀰漫了整個大廳。評審品嚐後微笑了。Ruby沒有得第一名，但爺爺在後面看著，悄悄擦了擦眼淚。"},{"title":"#53","vocab":["stray","frightened","shelter","volunteer","carrier"],"en":"A stray dog appeared near Kai's school one morning. It was thin and looked frightened. Kai asked the teacher what to do. Together, they contacted the local animal shelter. A volunteer arrived and gently placed the dog in a carrier. \"Animals cannot speak,\" the volunteer said, \"so humans must speak for them.\" Kai thought about those words for a long time and later decided to volunteer at the shelter every other Saturday.","zh":"一天早上，一隻流浪狗出現在Kai的學校附近。牠又瘦又看起來很害怕。Kai問老師該怎麼辦。他們一起聯繫了當地的動物收容所。一位義工到來，輕輕地將狗放入了籠子裡。「動物不會說話，」義工說，「所以人類必須替牠們說話。」Kai思考了這句話很久，後來決定每隔一個星期六去收容所當義工。"},{"title":"#54","vocab":["rooftop","responsible","harvested","patience","teamwork"],"en":"This year, Tom's school started a garden project on the rooftop. Each class was responsible for one section. Tom's class chose to grow tomatoes and sweet potatoes. They learned about soil quality, sunlight, and watering schedules. Three months later, they harvested enough vegetables to cook a meal for the whole class. The teacher said, \"You didn't just grow food. You grew patience, teamwork, and pride.\" Everyone agreed.","zh":"今年，Tom的學校在屋頂啟動了一個花園專題。每個班負責一個區域。Tom的班選擇種植番茄和地瓜。他們學到了關於土壤質量、陽光和澆水時間的知識。三個月後，他們收穫了足夠的蔬菜，為全班做了一頓飯。老師說：「你們不只是種了食物，也培育了耐心、團隊合作和驕傲感。」大家都同意。"},{"title":"#55","vocab":["afraid","announced","rehearsed","conquered","fear"],"en":"Lily had always been afraid of speaking in front of the class. When the teacher announced a speech competition, Lily's heart sank. But a classmate said, \"I'll practice with you every day after school.\" They rehearsed in the park, in the hallway, even during lunch. On competition day, Lily's voice shook at first but grew stronger with each sentence. The class clapped. Lily did not win, but had conquered something far more important: fear.","zh":"Lily一直害怕在班上發言。當老師宣布演講比賽時，Lily心沉了下去。但一個同學說：「我每天放學後都和你練習。」他們在公園裡、走廊上、甚至午餐時間都在排練。比賽那天，Lily的聲音起初顫抖，但每一句話都越來越有力量。全班鼓掌了。Lily沒有贏，但征服了一件更重要的事：恐懼。"},{"title":"#56","vocab":["flooded","donation","blankets","affected","handwritten"],"en":"During a heavy rainstorm, the river near Kenting flooded a small community. Max's class organized a donation drive, collecting clothes, food, and blankets. Max wrote a letter to include with each package: \"We don't know you, but we care about you.\" A month later, a class from the affected area sent a handwritten thank-you card. Max framed it and hung it above the desk. Some things are more valuable than any grade.","zh":"一場大暴雨後，Kenting附近的河流淹沒了一個小社區。Max的班組織了捐贈活動，收集了衣服、食物和毛毯。Max寫了一封信附在每個包裹裡：「我們不認識你，但我們關心你。」一個月後，受災地區的一個班寄來了一張手寫感謝卡。Max把它裱起來，掛在書桌上方。有些東西比任何成績都更有價值。"},{"title":"#57","vocab":["Japanese","illustrations","translated","international","treasures"],"en":"Mia discovered that the school library had books in Japanese, French, and Arabic. Curious, Mia checked out a simple Japanese picture book. Although Mia could not read the words, the illustrations told a clear story about a lonely moon. Mia showed it to the librarian, who translated a few lines. From that day, Mia visited the international section every week, slowly collecting words from different languages like rare treasures.","zh":"Mia發現學校圖書館有日文、法文和阿拉伯文的書。出於好奇，Mia借了一本簡單的日文圖畫書。雖然Mia看不懂文字，但插圖清楚地講述了一個關於孤獨月亮的故事。Mia把它給圖書館員看，圖書館員翻譯了幾行。從那天起，Mia每週都去國際書區，慢慢地收集不同語言的詞彙，就像珍稀的寶藏一樣。"},{"title":"#58","vocab":["struggling","hesitation","groceries","praise","audience"],"en":"One winter morning, Alex found an elderly neighbor struggling to carry groceries up the stairs. Without hesitation, Alex helped carry every bag. The old man said, \"Young people today don't stop to help.\" Alex smiled and said nothing. That evening at dinner, Mom said, \"I heard what you did.\" Alex felt a quiet warmth — not from praise, but from knowing that kindness given without an audience is the truest kind.","zh":"一個冬天的早晨，Al ifferent languages like rare treasures.","zh":"Mei發現學校圖書館有日文、法文和阿拉伯文的書。出於好奇，Mei借了一本簡單的日文圖畫書。雖然Mei看不懂文字，但插圖清楚地講述了一個關於孤獨月亮的故事。Mei把它給圖書館員看，圖書館員翻譯了幾行。從那天起，Mei每週都去國際書區，慢慢地收集不同語言的詞彙，就像珍稀的寶藏一樣。"},{"title":"#68","vocab":["struggling","hesitation","groceries","praise","audience"],"en":"One winter morning, Ben found an elderly neighbor struggling to carry groceries up the stairs. Without hesitation, Ben helped carry every bag. The old man said, \"Young people today don't stop to help.\" Ben smiled and said nothing. That evening at dinner, Mom said, \"I heard what you did.\" Ben felt a quiet warmth — not from praise, but from knowing that kindness given without an audience is the truest kind.","zh":"一個冬天的早晨，Ben看到一位年邁的鄰居在樓梯上費力地提著雜貨。Ben毫不猶豫地幫忙提了每一個袋子。老人說：「現在的年輕人不會停下來幫忙了。」Ben微笑著，什麼也沒說。那天晚上吃飯時，媽媽說：「我聽說了你做的事。」Ben感到一陣靜靜的溫暖——不是來自讚美，而是知道不需要觀眾的善意才是最真實的善意。"},{"title":"#69","vocab":["exhibition","inspired","composition","stranger","effective"],"en":"For the art exhibition, Zoe decided to create a painting inspired by Jiufen. Zoe spent three weekends mixing colors and adjusting the composition. On exhibition day, a visitor stopped in front of Zoe's painting for a long time. \"What does this mean to you?\" the visitor asked. Zoe explained, and the visitor listened carefully. \"Art that makes a stranger stop and ask questions is art that works,\" the visitor said. Zoe never forgot those words.","zh":"為了藝術展覽，Zoe決定創作一幅以Jiufen為靈感的畫。Zoe花了三個週末調色和調整構圖。展覽當天，一位訪客在Zoe的畫前停留了很長時間。「這對你意味著什麼？」訪客問。Zoe解釋了，訪客認真地聽著。「能讓陌生人停下來發問的藝術，才是真正有效的藝術，」訪客說。Zoe永遠記住了這句話。"},{"title":"#70","vocab":["cleanup","pollution","proposed","principal","reduced"],"en":"Jack joined an environmental cleanup on the beach near Sun Moon Lake. In two hours, the group collected twelve bags of trash. Jack was shocked by the amount of plastic. Back at school, Jack gave a short presentation about ocean pollution and proposed a \"no single-use plastic\" week for the whole school. The principal agreed to try it. Three months later, the school had reduced its plastic waste by forty percent. One voice, Jack learned, can echo farther than expected.","zh":"Jack參加了在Sun Moon Lake附近海灘進行的環境清潔活動。兩小時內，小組收集了十二袋垃圾。Jack對塑膠的數量感到震驚。回到學校後，Jack做了一個關於海洋汙染的簡短報告，並提議全校進行一週「不使用一次性塑膠」活動。校長同意嘗試。三個月後，學校減少了百分之四十的塑膠廢物。Jack學到了，一個聲音可以傳得比預期的更遠。"},{"title":"#71","vocab":["electricity","experiment","connected","engineer","planted"],"en":"Last month, Nina's class went on a field trip to a science museum in Kaohsiung. The guide showed them how electricity works and let them try a fun experiment. Nina and a partner connected wires to make a small light bulb glow. \"We did it!\" they shouted. On the bus ride home, Nina kept thinking about becoming an engineer someday. That single afternoon had planted a seed that would take years to grow.","zh":"上個月，Nina的班去Kaohsiung的科學博物館進行了一次校外教學。導覽員向他們展示了電是如何運作的，並讓他們嘗試了一個有趣的實驗。Nina和一個夥伴連接電線，讓一個小燈泡發光。「我們做到了！」他們大喊。在回家的巴士上，Nina一直在想著有一天成為一名工程師。那個下午種下了一顆需要多年才能發芽的種子。"},{"title":"#72","vocab":["competition","traditional","specialty","recipe","aroma"],"en":"Ruby signed up for the school cooking competition. The task was to make a traditional Taiwanese dish. Ruby chose to prepare braised pork rice, which was Grandpa's specialty. For two weeks, Ruby practiced the recipe at home every evening. On competition day, the aroma filled the entire hall. The judges tasted it and smiled. Ruby did not win first place, but Grandpa watched from the back and wiped a small tear from his eye.","zh":"Ruby報名了學校的烹飪比賽。任務是做一道台灣傳統料理。Ruby選擇了爺爺的拿手菜——滷肉飯。兩週來，Ruby每天晚上在家練習食譜。比賽當天，香味瀰漫了整個大廳。評審品嚐後微笑了。Ruby沒有得第一名，但爺爺在後面看著，悄悄擦了擦眼淚。"},{"title":"#73","vocab":["stray","frightened","shelter","volunteer","carrier"],"en":"A stray dog appeared near Kai's school one morning. It was thin and looked frightened. Kai asked the teacher what to do. Together, they contacted the local animal shelter. A volunteer arrived and gently placed the dog in a carrier. \"Animals cannot speak,\" the volunteer said, \"so humans must speak for them.\" Kai thought about those words for a long time and later decided to volunteer at the shelter every other Saturday.","zh":"一天早上，一隻流浪狗出現在Kai的學校附近。牠又瘦又看起來很害怕。Kai問老師該怎麼辦。他們一起聯繫了當地的動物收容所。一位義工到來，輕輕地將狗放入了籠子裡。「動物不會說話，」義工說，「所以人類必須替牠們說話。」Kai思考了這句話很久，後來決定每隔一個星期六去收容所當義工。"},{"title":"#74","vocab":["rooftop","responsible","harvested","patience","teamwork"],"en":"This year, Tom's school started a garden project on the rooftop. Each class was responsible for one section. Tom's class chose to grow tomatoes and sweet potatoes. They learned about soil quality, sunlight, and watering schedules. Three months later, they harvested enough vegetables to cook a meal for the whole class. The teacher said, \"You didn't just grow food. You grew patience, teamwork, and pride.\" Everyone agreed.","zh":"今年，Tom的學校在屋頂啟動了一個花園專題。每個班負責一個區域。Tom的班選擇種植番茄和地瓜。他們學到了關於土壤質量、陽光和澆水時間的知識。三個月後，他們收穫了足夠的蔬菜，為全班做了一頓飯。老師說：「你們不只是種了食物，也培育了耐心、團隊合作和驕傲感。」大家都同意。"},{"title":"#75","vocab":["afraid","announced","rehearsed","conquered","fear"],"en":"Lily had always been afraid of speaking in front of the class. When the teacher announced a speech competition, Lily's heart sank. But a classmate said, \"I'll practice with you every day after school.\" They rehearsed in the park, in the hallway, even during lunch. On competition day, Lily's voice shook at first but grew stronger with each sentence. The class clapped. Lily did not win, but had conquered something far more important: fear.","zh":"Lily一直害怕在班上發言。當老師宣布演講比賽時，Lily心沉了下去。但一個同學說：「我每天放學後都和你練習。」他們在公園裡、走廊上、甚至午餐時間都在排練。比賽那天，Lily的聲音起初顫抖，但每一句話都越來越有力量。全班鼓掌了。Lily沒有贏，但征服了一件更重要的事：恐懼。"},{"title":"#76","vocab":["flooded","donation","blankets","affected","handwritten"],"en":"During a heavy rainstorm, the river near Alishan flooded a small community. Max's class organized a donation drive, collecting clothes, food, and blankets. Max wrote a letter to include with each package: \"We don't know you, but we care about you.\" A month later, a class from the affected area sent a handwritten thank-you card. Max framed iet warmth — not from praise, but from knowing that kindness given without an audience is the truest kind.","zh":"一個冬天的早晨，Ben看到一位年邁的鄰居在樓梯上費力地提著雜貨。Ben毫不猶豫地幫忙提了每一個袋子。老人說：「現在的年輕人不會停下來幫忙了。」Ben微笑著，什麼也沒說。那天晚上吃飯時，媽媽說：「我聽說了你做的事。」Ben感到一陣靜靜的溫暖——不是來自讚美，而是知道不需要觀眾的善意才是最真實的善意。"},{"title":"#89","vocab":["exhibition","inspired","composition","stranger","effective"],"en":"For the art exhibition, Zoe decided to create a painting inspired by Penghu. Zoe spent three weekends mixing colors and adjusting the composition. On exhibition day, a visitor stopped in front of Zoe's painting for a long time. \"What does this mean to you?\" the visitor asked. Zoe explained, and the visitor listened carefully. \"Art that makes a stranger stop and ask questions is art that works,\" the visitor said. Zoe never forgot those words.","zh":"為了藝術展覽，Zoe決定創作一幅以Penghu為靈感的畫。Zoe花了三個週末調色和調整構圖。展覽當天，一位訪客在Zoe的畫前停留了很長時間。「這對你意味著什麼？」訪客問。Zoe解釋了，訪客認真地聽著。「能讓陌生人停下來發問的藝術，才是真正有效的藝術，」訪客說。Zoe永遠記住了這句話。"},{"title":"#90","vocab":["cleanup","pollution","proposed","principal","reduced"],"en":"Jack joined an environmental cleanup on the beach near Taidong. In two hours, the group collected twelve bags of trash. Jack was shocked by the amount of plastic. Back at school, Jack gave a short presentation about ocean pollution and proposed a \"no single-use plastic\" week for the whole school. The principal agreed to try it. Three months later, the school had reduced its plastic waste by forty percent. One voice, Jack learned, can echo farther than expected.","zh":"Jack參加了在Taidong附近海灘進行的環境清潔活動。兩小時內，小組收集了十二袋垃圾。Jack對塑膠的數量感到震驚。回到學校後，Jack做了一個關於海洋汙染的簡短報告，並提議全校進行一週「不使用一次性塑膠」活動。校長同意嘗試。三個月後，學校減少了百分之四十的塑膠廢物。Jack學到了，一個聲音可以傳得比預期的更遠。"},{"title":"#91","vocab":["electricity","experiment","connected","engineer","planted"],"en":"Last month, Nina's class went on a field trip to a science museum in Yilan. The guide showed them how electricity works and let them try a fun experiment. Nina and a partner connected wires to make a small light bulb glow. \"We did it!\" they shouted. On the bus ride home, Nina kept thinking about becoming an engineer someday. That single afternoon had planted a seed that would take years to grow.","zh":"上個月，Nina的班去Yilan的科學博物館進行了一次校外教學。導覽員向他們展示了電是如何運作的，並讓他們嘗試了一個有趣的實驗。Nina和一個夥伴連接電線，讓一個小燈泡發光。「我們做到了！」他們大喊。在回家的巴士上，Nina一直在想著有一天成為一名工程師。那個下午種下了一顆需要多年才能發芽的種子。"},{"title":"#92","vocab":["competition","traditional","specialty","recipe","aroma"],"en":"Ruby signed up for the school cooking competition. The task was to make a traditional Taiwanese dish. Ruby chose to prepare braised pork rice, which was Grandpa's specialty. For two weeks, Ruby practiced the recipe at home every evening. On competition day, the aroma filled the entire hall. The judges tasted it and smiled. Ruby did not win first place, but Grandpa watched from the back and wiped a small tear from his eye.","zh":"Ruby報名了學校的烹飪比賽。任務是做一道台灣傳統料理。Ruby選擇了爺爺的拿手菜——滷肉飯。兩週來，Ruby每天晚上在家練習食譜。比賽當天，香味瀰漫了整個大廳。評審品嚐後微笑了。Ruby沒有得第一名，但爺爺在後面看著，悄悄擦了擦眼淚。"},{"title":"#93","vocab":["stray","frightened","shelter","volunteer","carrier"],"en":"A stray dog appeared near Kai's school one morning. It was thin and looked frightened. Kai asked the teacher what to do. Together, they contacted the local animal shelter. A volunteer arrived and gently placed the dog in a carrier. \"Animals cannot speak,\" the volunteer said, \"so humans must speak for them.\" Kai thought about those words for a long time and later decided to volunteer at the shelter every other Saturday.","zh":"一天早上，一隻流浪狗出現在Kai的學校附近。牠又瘦又看起來很害怕。Kai問老師該怎麼辦。他們一起聯繫了當地的動物收容所。一位義工到來，輕輕地將狗放入了籠子裡。「動物不會說話，」義工說，「所以人類必須替牠們說話。」Kai思考了這句話很久，後來決定每隔一個星期六去收容所當義工。"},{"title":"#94","vocab":["rooftop","responsible","harvested","patience","teamwork"],"en":"This year, Tom's school started a garden project on the rooftop. Each class was responsible for one section. Tom's class chose to grow tomatoes and sweet potatoes. They learned about soil quality, sunlight, and watering schedules. Three months later, they harvested enough vege oposed a \"no single-use plastic\" week for the whole school. The principal agreed to try it. Three months later, the school had reduced its plastic waste by forty percent. One voice, Ren learned, can echo farther than expected.","zh":"Ren參加了在Alishan附近海灘進行的環境清潔活動。兩小時內，小組收集了十二袋垃圾。Ren對塑膠的數量感到震驚。回到學校後，Ren做了一個關於海洋汙染的簡短報告，並提議全校進行一週「不使用一次性塑膠」活動。校長同意嘗試。三個月後，學校減少了百分之四十的塑膠廢物。Ren學到了，一個聲音可以傳得比預期的更遠。"}]},"5":{"1":[{"title":"#1","vocab":["debate","technology","opposing","isolated","margin"],"en":"Last spring, Nina's school sent five students to a regional debate competition in Kaohsiung. Nina was one of them. The topic was whether technology does more harm than good. Nina's team argued in favor of technology, using examples from medicine, education, and communication. The opposing team was strong and well-prepared. During the final round, Nina made an unexpected point about how technology helped isolated communities during natural disasters. The judges nodded. Nina's team won by a narrow margin. But more than the trophy, Nina carried home the lesson that a single, well-timed idea can change the direction of an entire argument.","zh":"去年春天，Nina的學校選送了五名學生去Kaohsiung參加地區辯論比賽。Nina是其中之一。主題是科技是否弊大於利。Nina的隊伍支持科技，以醫學、教育和通訊為例。對方隊伍強大且準備充分。在最後一輪，Nina提出了一個意想不到的論點：科技如何在自然災害中幫助了孤立的社區。評審點頭。Nina的隊伍以微弱優勢獲勝。但比起獎盃，Nina更帶回了一個教訓：一個時機恰當的想法，可以改變整個論點的走向。"},{"title":"#2","vocab":["volunteered","restless","distracted","satisfaction","borrowed"],"en":"During the summer holiday, Ruby volunteered at a community library in Taichung that served children from low-income families. Ruby's job was to run a reading hour every Tuesday and Thursday. At first, the children were restless and distracted. Ruby tried reading in different voices, using props, and asking questions. Slowly, the children began to lean in. One boy, who had never checked out a book before, borrowed three on the last day. Ruby walked home that evening feeling something that no exam score had ever produced — a deep, quiet satisfaction that good work had been done.","zh":"暑假期間，Ruby在Taichung一個服務低收入家庭兒童的社區圖書館當義工。Ruby的任務是每週二和週四主持閱讀時間。起初，孩子們坐立不安、心不在焉。Ruby嘗試用不同的聲音朗讀，使用道具，並提問。慢慢地，孩子們開始靠近了。一個從未借過書的男孩在最後一天借了三本。Ruby那天晚上走回家，感受到了任何考試成績都無法帶來的東西——一種深沉、安靜的滿足感，因為做了一件好事。"},{"title":"#3","vocab":["terrifying","hesitated","directions","connected","strangers"],"en":"Kai had been studying English for six years, but speaking to a native speaker still felt terrifying. That changed one afternoon when a tourist in Hsinchu asked Kai for directions to the train station. Kai hesitated, then took a breath and answered slowly but clearly. The tourist smiled and said, \"Your English is great!\" Kai knew that wasn't entirely true — but it didn't matter. In that moment, language had stopped being a subject on a test and had become something alive, something that connected two strangers in the middle of a busy street.","zh":"Kai學英文已經六年了，但和母語使用者說話仍然讓人感到害怕。一天下午，在Hsinchu的一位遊客問Kai去火車站怎麼走，這一切都改變了。Kai猶豫了一下，然後深吸一口氣，慢慢但清楚地回答了。遊客微笑說：「你的英文很好！」Kai知道這並不完全正確——但這並不重要。在那一刻，語言不再是考試的科目，而是成了有生命的東西，讓兩個陌生人在繁忙的街道中間相連。"},{"title":"#4","vocab":["interview","occupation","economic","decades","conclusion"],"en":"For the fifth-grade graduation project, each student had to interview someone in their community and write a report. Tom chose to interview the oldest resident of the neighborhood — a ninety-two-year-old woman who had lived through the Japanese occupation, the post-war years, and Taiwan's rapid economic growth. She spoke quietly, but every sentence carried the weight of decades. Tom listened for three hours and took careful notes. The final report moved the teacher to tears. \"History,\" Tom wrote in the conclusion, \"is not dates in a textbook. It is the memory inside a living person.\"","zh":"為了五年級的畢業專題，每個學生必須採訪社區裡的一個人並寫一份報告。Tom選擇採訪了鄰里中最年長的居民——一位九十二歲的老太太，她經歷了日本殖民統治、戰後歲月和台灣的快速經濟成長。她說話輕聲細語，但每一句話都承載著數十年的分量。Tom聽了三個小時，認真地記了筆記。最終的報告讓老師感動落淚。「歷史，」Tom在結論中寫道，「不是課本上的日期，而是活著的人心中的記憶。」"},{"title":"#5","vocab":["streetlight","disappeared","darkness","deserved","private"],"en":"One night, Lily woke up at two in the morning with a strange feeling. Something outside was moving. Lily looked out the window and saw a fox sitting very still in the pale glow of a streetlight. Neither of them moved for a long time. Then the fox turned and disappeared into the darkness. Lily sat there for an hour, unable to sleep, not wanting to. Some moments, Lily thought, deserve to be felt completely before you let them go. Lily wrote about it the next morning and kept the entry private for years.","zh":"一天夜裡，Lily在凌晨兩點帶著奇怪的感覺醒來。外面有什麼東西在動。Lily望向窗外，看到一隻狐狸在路燈蒼白的光芒中一動不動地坐著。他們兩個都靜靜地待了很長時間。然後狐狸轉身，消失在黑暗中。Lily在那裡坐了一個小時，睡不著，也不想睡著。有些時刻，Lily想，值得在你放手之前完全地感受。Lily第二天早上把它寫了下來，這篇日記保密了很多年。"},{"title":"#6","vocab":["announced","script","revising","performance","communicate"],"en":"When the English teacher announced that the class would perform an original play in English at the end of term, panic spread through the room. Max was chosen to write the script. It was the most difficult writing task Max had ever faced — every word had to carry meaning, every scene had to move the story forward. Max spent three weeks revising and revising. On the night of the performance, when the audience laughed at the right moments and fell silent at the right moments, Max understood for the first time what it truly means to communicate across a language.","zh":"當英語老師宣布班上學期末將用英文演出一齣原創劇時，恐慌在教室裡蔓延開來。Max被選中來寫劇本。這是Max面對過的最困難的寫作任務——每個詞都必須承載意義，每個場景都必須推動故事前進。Max花了三週時間一遍又一遍地修改。表演當晚，當觀眾在對的時刻笑，在對的時刻沉默，Max第一次真正理解了什麼叫做跨越語言的溝通。"},{"title":"#7","vocab":["competition","marine","pollution","exhibition","officials"],"en":"Mia and two classmates entered a national environmental poster competition. Their design showed a sea turtle tangled in plastic waste, with the words: \"This is not their ocean anymore.\" They worked on it for a month, researching facts about marine pollution and testing different visual approaches. The poster was selected as one of the top twenty nationwide. It was displayed at an exhibition in Penghu where government officials saw it. One official stopped and took a photograph. Mia never found out what happened next, but felt certain that the image had traveled further than they had.","zh":"Mia和兩個同學參加了全國環保海報比賽。他們的設計展示了一隻被塑膠廢物纏住的海龜，配上文字：「這片海洋不再屬於他們了。」他們為此工作了一個月，研究海洋汙染的事實，並測試了不同的視覺方法。海報被選為全國前二十名之一，在Penghu的一個展覽中展出，政府官員看到了它。一位官員停下來拍了照片。Mia從未知道接下來發生了什麼，但確信那張圖像比他們自己走得更遠。"},{"title":"#8","vocab":["hospitalized","bedside","encyclopedia","discharge","carelessly"],"en":"In the spring of fifth grade, Alex's grandmother was hospitalized for a month. Every day after school, Alex sat by her bedside and read to her from a nature encyclopedia — not because Grandma asked, but because Alex did not know what else to offer. Grandma rarely spoke during these visits, but her eyes followed the words. On the last day before discharge, she held Alex's hand and said, \"You have a kind voice.\" Alex had never thought of a voice as something that could be kind. After that, Alex never spoke carelessly again.","zh":"在五年級的春天，Alex的奶奶住院了一個月。每天放學後，Alex坐在她的床邊，從一本自然百科全書讀給她聽——不是因為奶奶要求，而是因為Alex不知道還能給予什麼。奶奶在這些探訪中很少說話，但她的眼睛跟著文字走。出院前的最後一天，她握著Alex的手說：「你有一把善良的聲音。」Alex從未想過聲音也可以是善良的。此後，Alex再也沒有輕率地說話。"},{"title":"#9","vocab":["custodian","sunrise","admired","crooked","straightened"],"en":"The class was assigned to write a one-page essay about a person they admired. Most students chose athletes or celebrities. Anna chose the school custodian, Mr. Lin, who arrived before sunrise every day, fixed broken things quietly, and left after sunset. Anna spent a week following Mr. Lin's schedule and taking notes. The essay described small moments: the way he straightened a crooked picture frame, the way he swept the steps in the rain. The teacher read it aloud without saying whose it was. The class was very quiet at the end.","zh":"班上被要求寫一篇關於他們欽佩的人的一頁短文。大多數學生選擇了運動員或名人。Anna選擇了學校的管理員林先生，他每天日出前到達，靜靜地修好壞掉的東西，日落後才離開。Anna花了一週時間跟著林先生的行程並記筆記。文章描述了細小的時刻：他把歪斜的相框扶正的方式，他在雨中打掃台階的方式。老師沒有說是誰寫的就大聲朗讀了它。班上在最後非常安靜。"},{"title":"#10","vocab":["notebook","poems","hesitated","silently","audience"],"en":"Ren had kept a secret for three years: a small notebook filled with poems written in both Chinese and English. No one had ever read them. One afternoon, Ren's English teacher asked students to bring in a piece of their own writing. Ren hesitated at home that evening, then packed the notebook. The teacher read one poem silently, then looked up and said, \"May I share this with the class?\" Ren nodded. The room was very still when the last line was read. Afterward, three classmates quietly asked Ren to write something for them. Some things find their audience when the time is right.","zh":"Ren保守了一個秘密三年：一個裝滿中英雙語詩歌的小筆記本。從未有人讀過它們。一天下午，Ren的英語老師請學生帶來自己的一篇文章。Ren那天晚上在家猶豫了，然後把筆記本裝進了包。老師默默地讀了一首詩，然後抬起頭說：「我可以和班上分享嗎？」Ren點了點頭。最後一行被讀出時，教室非常安靜。事後，三個同學悄悄地請Ren為他們寫點什麼。有些東西在時機成熟時自然會找到它的讀者。"},{"title":"#11","vocab":["debate","technology","opposing","isolated","margin"],"en":"Last spring, Amy's school sent five students to a regional debate competition in Jiufen. Amy was one of them. The topic was whether technology does more harm than good. Amy's team argued in favor of technology, using examples from medicine, education, and communication. The opposing team was strong and well-prepared. During the final round, Amy made an unexpected point about how technology helped isolated communities during natural disasters. The judges nodded. Amy's team won by a narrow margin. But more than the trophy, Amy carried home the lesson that a single, well-timed idea can change the direction of an entire argument.","zh":"去年春天，Amy的學校選送了五名學生去Jiufen參加地區辯論比賽。Amy是其中之一。主題是科技是否弊大於利。Amy的隊伍支持科技，以醫學、教育和通訊為例。對方隊伍強大且準備充分。在最後一輪，Amy提出了一個意想不到的論點：科技如何在自然災害中幫助了孤立的社區。評審點頭。Amy的隊伍以微弱優勢獲勝。但比起獎盃，Amy更帶回了一個教訓：一個時機恰當的想法，可以改變整個論點的走向。"},{"title":"#12","vocab":["volunteered","restless","distracted","satisfaction","borrowed"],"en":"During the summer holiday, Leo volunteered at a community library in Sun Moon Lake that served children from low-income families lowing Mr. Lin's schedule and taking notes. The essay described small moments: the way he straightened a crooked picture frame, the way he swept the steps in the rain. The teacher read it aloud without saying whose it was. The class was very quiet at the end.","zh":"班上被要求寫一篇關於他們欽佩的人的一頁短文。大多數學生選擇了運動員或名人。Zoe選擇了學校的管理員林先生，他每天日出前到達，靜靜地修好壞掉的東西，日落後才離開。Zoe花了一週時間跟著林先生的行程並記筆記。文章描述了細小的時刻：他把歪斜的相框扶正的方式，他在雨中打掃台階的方式。老師沒有說是誰寫的就大聲朗讀了它。班上在最後非常安靜。"},{"title":"#20","vocab":["notebook","poems","hesitated","silently","audience"],"en":"Jack had kept a secret for three years: a small notebook filled with poems written in both Chinese and English. No one had ever read them. One afternoon, Jack's English teacher asked students to bring in a piece of their own writing. Jack hesitated at home that evening, then packed the notebook. The teacher read one poem silently, then looked up and said, \"May I share this with the class?\" Jack nodded. The room was very still when the last line was read. Afterward, three classmates quietly asked Jack to write something for them. Some things find their audience when the time is right.","zh":"Jack保守了一個秘密三年：一個裝滿中英雙語詩歌的小筆記本。從未有人讀過它們。一天下午，Jack的英語老師請學生帶來自己的一篇文章。Jack那天晚上在家猶豫了，然後把筆記本裝進了包。老師默默地讀了一首詩，然後抬起頭說：「我可以和班上分享嗎？」Jack點了點頭。最後一行被讀出時，教室非常安靜。事後，三個同學悄悄地請Jack為他們寫點什麼。有些東西在時機成熟時自然會找到它的讀者。"},{"title":"#21","vocab":["debate","technology","opposing","isolated","margin"],"en":"Last spring, Nina's school sent five students to a regional debate competition in Yilan. Nina was one of them. The topic was whether technology does more harm than good. Nina's team argued in favor of technology, using examples from medicine, education, and communication. The opposing team was strong and well-prepared. During the final round, Nina made an unexpected point about how technology helped isolated communities during natural disasters. The judges nodded. Nina's team won by a narrow margin. But more than the trophy, Nina carried home the lesson that a single, well-timed idea can change the direction of an entire argument.","zh":"去年春天，Nina的學校選送了五名學生去Yilan參加地區辯論比賽。Nina是其中之一。主題是科技是否弊大於利。Nina的隊伍支持科技，以醫學、教育和通訊為例。對方隊伍強大且準備充分。在最後一輪，Nina提出了一個意想不到的論點：科技如何在自然災害中幫助了孤立的社區。評審點頭。Nina的隊伍以微弱優勢獲勝。但比起獎盃，Nina更帶回了一個教訓：一個時機恰當的想法，可以改變整個論點的走向。"},{"title":"#22","vocab":["volunteered","restless","distracted","satisfaction","borrowed"],"en":"During the summer holiday, Ruby volunteered at a community library in Kenting that served children from low-income families. Ruby's job was to run a reading hour every Tuesday and Thursday. At first, the children were restless and distracted. Ruby tried reading in different voices, using props, and asking questions. Slowly, the children began to lean in. One boy, who had never checked out a book before, borrowed three on the last day. Ruby walked home that evening feeling something that no exam score had ever produced — a deep, quiet satisfaction that good work had been done.","zh":"暑假期間，Ruby在Kenting一個服務低收入家庭兒童的社區圖書館當義工。Ruby的任務是每週二和週四主持閱讀時間。起初，孩子們坐立不安、心不在焉。Ruby嘗試用不同的聲音朗讀，使用道具，並提問。慢慢地，孩子們開始靠近了。一個從未借過書的男孩在最後一天借了三本。Ruby那天晚上走回家，感受到了任何考試成績都無法帶來的東西——一種深沉、安靜的滿足感，因為做了一件好事。"},{"title":"#23","vocab":["terrifying","hesitated","directions","connected","strangers"],"en":"Kai had been studying English for six years, but speaking to a native speaker still felt terrifying. That changed one afternoon when a tourist in Jiufen asked Kai for directions to the train station. Kai hesitated, then took a breath and answered slowly but clearly. The tourist smiled and said, \"Your English is great!\" Kai knew that wasn't entirely true — but it didn't matter. In that moment, language had stopped being a subject on a test and had become something alive, something that connected two strangers in the middle of a busy street.","zh":"Kai學英文已經六年了，但和母語使用者說話仍然讓人感到害怕。一天下午，在Jiufen的一位遊客問Kai去火車站怎麼走，這一切都改變了。Kai猶豫了一下，然後深吸一口氣，慢慢但清楚地回答了。遊客微笑說：「你的英文很好！」Kai知道這並不完全正確——但這並不重要。在那一刻，語言不再是考試的科目，而是成了有生命的東西，讓兩個陌生人在繁忙的街道中間相連。"},{"title":"#24","vocab":["interview","occupation","economic","decades","conclusion"],"en":"For the fifth-grade graduation project, each student had to interview someone in their community and write a report. Tom chose to interview the oldest resident of the neighborhood — a ninety-two-year-old woman who had lived through the Japanese occupation, the post-war years, and Taiwan's rapid economic growth. She spoke quietly, but every sentence carried the weight of decades. Tom listened for three hours and took careful notes. The final report moved the teacher to tears. \"History,\" Tom wrote in the conclusion, \"is not dates in a textbook. It is the memory inside a living person.\"","zh":"為了五年級的畢業專題，每個學生必須採訪社區裡的一個人並寫一份報告。Tom選擇採訪了鄰里中最年長的居民——一位九十二歲的老太太，她經歷了日本殖民統治、戰後歲月和台灣的快速經濟成長。她說話輕聲細語，但每一句話都承載著數十年的分量。Tom聽了三個小時，認真地記了筆記。最終的報告讓老師感動落淚。「歷史，」Tom在結論中寫道，「不是課本上的日期，而是活著的人心中的記憶。」"},{"title":"#25","vocab":["streetlight","disappeared","darkness","deserved","private"],"en":"One night, Lily woke up at two in the morning with a strange feeling. Something outside was moving. Lily looked out the window and saw a fox sitting very still in the pale glow of a streetlight. Neither of them moved for a long time. Then the fox turned and disappeared into the darkness. Lily sat there for an hour, unable to sleep, not wanting to. Some moments, Lily thought, deserve to be felt completely before you let them go. Lily wrote about it the next morning and kept the entry private for years.","zh":"一天夜裡，Lily在凌晨兩點帶著奇怪的感覺醒來。外面有什麼東西在動。Lily望向窗外，看到一隻狐狸在路燈蒼白的光芒中一動不動地坐著。他們兩個都靜靜地待了很長時間。然後狐狸轉身，消失在黑暗中。Lily在那裡坐了一個小時，睡不著，也不想睡著。有些時刻，Lily想，值得在你放手之前完全地感受。Lily第二天早上把它寫了下來，這篇日記保密了很多年。"},{"title":"#26","vocab":["announced","script","revising","performance","communicate"],"en":"When the English teacher announced that the class would perform an original play in English at the end of term, panic spread through the room. Max was chosen to write the script. It was the most difficult writing task Max had ever faced — every word had to carry meaning, every scene had to move the story forward. Max spent three weeks revising and revising. On the night of the performance, when the audience laughed at the right moments and fell silent at the right moments, Max understood for the first time what it truly means to communicate across a language.","zh":"當英語老師宣布班上學期末將用英文演出一齣原創劇時，恐慌在教室裡蔓延開來。Max被選中來寫劇本。這是Max面對過的最困難的寫作任務——每個詞都必須承載意義，每個場景都必須推動故事前進。Max花了三週時間一遍又一遍地修改。表演當晚，當觀眾在對的時刻笑，在對的時刻沉默，Max第一次真正理解了什麼叫做跨越語言的溝通。"},{"title":"#27","vocab":["competition","marine","pollution","exhibition","officials"],"en":"Mia and two classmates entered a national environmental poster competition. Their design showed a sea turtle tangled in plastic waste, with the words: \"This is not their ocean anymore.\" They worked on it for a month, researching facts about marine pollution and testing different visual approaches. The poster was selected as one of the top twenty nationwide. It was displayed at an exhibition in Hsinchu where government officials saw it. One official stopped and took a photograph. Mia never found out what happened next, but felt certain that the image had traveled further than they had.","zh":"Mia和兩個同學參加了全國環保海報比賽。他們的設計展示了一隻被塑膠廢物纏住的海龜，配上文字：「這片海洋不再屬於他們了。」他們為此工作了一個月，研究海洋汙染的事實，並測試了不同的視覺方法。海報被選為全國前二十名之一，在Hsinchu的一個展覽中展出，政府官員看到了它。一位官員停下來拍了照片。Mia從未知道接下來發生了什麼，但確信那張圖像比他們自己走得更遠。"},{"title":"#28","vocab":["hospitalized","bedside","encyclopedia","discharge","carelessly"],"en":"In the spring of fifth grade, Alex's grandmother was hospitalized for a month. Every day after school, Alex sat by her bedside and read to her from a nature encyclopedia — not because Grandma asked, but because Alex did not know what else to offer. Grandma rarely spoke during these visits, but her eyes followed the words. On the last day before discharge, she held Alex's hand and said, \"You have a kind voice.\" Alex had never thought of a voice as something that could be kind. After that, Alex never spoke carelessly again.","zh":"在五年級的春天，Alex的奶奶住院了一個月。每天放學後，Alex坐在她的床邊，從一本自然百科全書讀給她聽——不是因為奶奶要求，而是因為Alex不知道還能給予什 t because Grandma asked, but because Ben did not know what else to offer. Grandma rarely spoke during these visits, but her eyes followed the words. On the last day before discharge, she held Ben's hand and said, \"You have a kind voice.\" Ben had never thought of a voice as something that could be kind. After that, Ben never spoke carelessly again.","zh":"在五年級的春天，Ben的奶奶住院了一個月。每天放學後，Ben坐在她的床邊，從一本自然百科全書讀給她聽——不是因為奶奶要求，而是因為Ben不知道還能給予什麼。奶奶在這些探訪中很少說話，但她的眼睛跟著文字走。出院前的最後一天，她握著Ben的手說：「你有一把善良的聲音。」Ben從未想過聲音也可以是善良的。此後，Ben再也沒有輕率地說話。"},{"title":"#39","vocab":["custodian","sunrise","admired","crooked","straightened"],"en":"The class was assigned to write a one-page essay about a person they admired. Most students chose athletes or celebrities. Zoe chose the school custodian, Mr. Lin, who arrived before sunrise every day, fixed broken things quietly, and left after sunset. Zoe spent a week following Mr. Lin's schedule and taking notes. The essay described small moments: the way he straightened a crooked picture frame, the way he swept the steps in the rain. The teacher read it aloud without saying whose it was. The class was very quiet at the end.","zh":"班上被要求寫一篇關於他們欽佩的人的一頁短文。大多數學生選擇了運動員或名人。Zoe選擇了學校的管理員林先生，他每天日出前到達，靜靜地修好壞掉的東西，日落後才離開。Zoe花了一週時間跟著林先生的行程並記筆記。文章描述了細小的時刻：他把歪斜的相框扶正的方式，他在雨中打掃台階的方式。老師沒有說是誰寫的就大聲朗讀了它。班上在最後非常安靜。"},{"title":"#40","vocab":["notebook","poems","hesitated","silently","audience"],"en":"Jack had kept a secret for three years: a small notebook filled with poems written in both Chinese and English. No one had ever read them. One afternoon, Jack's English teacher asked students to bring in a piece of their own writing. Jack hesitated at home that evening, then packed the notebook. The teacher read one poem silently, then looked up and said, \"May I share this with the class?\" Jack nodded. The room was very still when the last line was read. Afterward, three classmates quietly asked Jack to write something for them. Some things find their audience when the time is right.","zh":"Jack保守了一個秘密三年：一個裝滿中英雙語詩歌的小筆記本。從未有人讀過它們。一天下午，Jack的英語老師請學生帶來自己的一篇文章。Jack那天晚上在家猶豫了，然後把筆記本裝進了包。老師默默地讀了一首詩，然後抬起頭說：「我可以和班上分享嗎？」Jack點了點頭。最後一行被讀出時，教室非常安靜。事後，三個同學悄悄地請Jack為他們寫點什麼。有些東西在時機成熟時自然會找到它的讀者。"},{"title":"#41","vocab":["debate","technology","opposing","isolated","margin"],"en":"Last spring, Nina's school sent five students to a regional debate competition in Taipei. Nina was one of them. The topic was whether technology does more harm than good. Nina's team argued in favor of technology, using examples from medicine, education, and communication. The opposing team was strong and well-prepared. During the final round, Nina made an unexpected point about how technology helped isolated communities during natural disasters. The judges nodded. Nina's team won by a narrow margin. But more than the trophy, Nina carried home the lesson that a single, well-timed idea can change the direction of an entire argument.","zh":"去年春天，Nina的學校選送了五名學生去Taipei參加地區辯論比賽。Nina是其中之一。主題是科技是否弊大於利。Nina的隊伍支持科技，以醫學、教育和通訊為例。對方隊伍強大且準備充分。在最後一輪，Nina提出了一個意想不到的論點：科技如何在自然災害中幫助了孤立的社區。評審點頭。Nina的隊伍以微弱優勢獲勝。但比起獎盃，Nina更帶回了一個教訓：一個時機恰當的想法，可以改變整個論點的走向。"},{"title":"#42","vocab":["volunteered","restless","distracted","satisfaction","borrowed"],"en":"During the summer holiday, Ruby volunteered at a community library in Alishan that served children from low-income families. Ruby's job was to run a reading hour every Tuesday and Thursday. At first, the children were restless and distracted. Ruby tried reading in different voices, using props, and asking questions. Slowly, the children began to lean in. One boy, who had never checked out a book before, borrowed three on the last day. Ruby walked home that evening feeling something that no exam score had ever produced — a deep, quiet satisfaction that good work had been done.","zh":"暑假期間，Ruby在Alishan一個服務低收入家庭兒童的社區圖書館當義工。Ruby的任務是每週二和週四主持閱讀時間。起初，孩子們坐立不安、心不在焉。Ruby嘗試用不同的聲音朗讀，使用道具，並提問。慢慢地，孩子們開始靠近了。一個從未借過書的男孩在最後一天借了三本。Ruby那天晚上走回家，感受到了任何考試成績都無法帶來的東西——一種深沉、安靜的滿足感，因為做了一件好事。"},{"title":"#43","vocab":["terrifying","hesitated","directions","connected","strangers"],"en":"Kai had been studying English for six years, but speaking to a native speaker still felt terrifying. That changed one afternoon when a tourist in Penghu asked Kai for directions to the train station. Kai hesitated, then took a breath and answered slowly but clearly. The tourist smiled and said, \"Your English is great!\" Kai knew that wasn't entirely true — but it didn't matter. In that moment, language had stopped being a subject on a test and had become something alive, something that connected two strangers in the middle of a busy street.","zh":"Kai學英文已經六年了，但和母語使用者說話仍然讓人感到害怕。一天下午，在Penghu的一位遊客問Kai去火車站怎麼走，這一切都改變了。Kai猶豫了一下，然後深吸一口氣，慢慢但清楚地回答了。遊客微笑說：「你的英文很好！」Kai知道這並不完全正確——但這並不重要。在那一刻，語言不再是考試的科目，而是成了有生命的東西，讓兩個陌生人在繁忙的街道中間相連。"},{"title":"#44","vocab":["interview","occupation","economic","decades","conclusion"],"en":"For the fifth-grade graduation project, each student had to interview someone in their community and write a report. Tom chose to interview the oldest resident of the neighborhood — a ninety-two-year-old woman who had lived through the Japanese occupation, the post-war years, and Taiwan's rapid economic growth. She spoke quietly, but every sentence carried the weight of decades. Tom listened for three hours and took careful notes. The final report moved the teacher to tears. \"History,\" Tom wrote in the conclusion, \"is not dates in a textbook. It is the memory inside a living person.\"","zh":"為了五年級的畢業專題，每個學生必須採訪社區裡的一個人並寫一份報告。Tom選擇採訪了鄰里中最年長的居民——一位九十二歲的老太太，她經歷了日本殖民統治、戰後歲月和台灣的快速經濟成長。她說話輕聲細語，但每一句話都承載著數十年的分量。Tom聽了三個小時，認真地記了筆記。最終的報告讓老師感動落淚。「歷史，」Tom在結論中寫道，「不是課本上的日期，而是活著的人心中的記憶。」"},{"title":"#45","vocab":["streetlight","disappeared","darkness","deserved","private"],"en":"One night, Lily woke up at two in the morning with a strange feeling. Something outside was moving. Lily looked out the window and saw a fox sitting very still in the pale glow of a streetlight. Neither en began to lean in. One boy, who had never checked out a book before, borrowed three on the last day. Leo walked home that evening feeling something that no exam score had ever produced — a deep, quiet satisfaction that good work had been done.","zh":"暑假期間，Leo在Tainan一個服務低收入家庭兒童的社區圖書館當義工。Leo的任務是每週二和週四主持閱讀時間。起初，孩子們坐立不安、心不在焉。Leo嘗試用不同的聲音朗讀，使用道具，並提問。慢慢地，孩子們開始靠近了。一個從未借過書的男孩在最後一天借了三本。Leo那天晚上走回家，感受到了任何考試成績都無法帶來的東西——一種深沉、安靜的滿足感，因為做了一件好事。"},{"title":"#53","vocab":["terrifying","hesitated","directions","connected","strangers"],"en":"Emma had been studying English for six years, but speaking to a native speaker still felt terrifying. That changed one afternoon when a tourist in Taipei asked Emma for directions to the train station. Emma hesitated, then took a breath and answered slowly but clearly. The tourist smiled and said, \"Your English is great!\" Emma knew that wasn't entirely true — but it didn't matter. In that moment, language had stopped being a subject on a test and had become something alive, something that connected two strangers in the middle of a busy street.","zh":"Emma學英文已經六年了，但和母語使用者說話仍然讓人感到害怕。一天下午，在Taipei的一位遊客問Emma去火車站怎麼走，這一切都改變了。Emma猶豫了一下，然後深吸一口氣，慢慢但清楚地回答了。遊客微笑說：「你的英文很好！」Emma知道這並不完全正確——但這並不重要。在那一刻，語言不再是考試的科目，而是成了有生命的東西，讓兩個陌生人在繁忙的街道中間相連。"},{"title":"#54","vocab":["interview","occupation","economic","decades","conclusion"],"en":"For the fifth-grade graduation project, each student had to interview someone in their community and write a report. Sam chose to interview the oldest resident of the neighborhood — a ninety-two-year-old woman who had lived through the Japanese occupation, the post-war years, and Taiwan's rapid economic growth. She spoke quietly, but every sentence carried the weight of decades. Sam listened for three hours and took careful notes. The final report moved the teacher to tears. \"History,\" Sam wrote in the conclusion, \"is not dates in a textbook. It is the memory inside a living person.\"","zh":"為了五年級的畢業專題，每個學生必須採訪社區裡的一個人並寫一份報告。Sam選擇採訪了鄰里中最年長的居民——一位九十二歲的老太太，她經歷了日本殖民統治、戰後歲月和台灣的快速經濟成長。她說話輕聲細語，但每一句話都承載著數十年的分量。Sam聽了三個小時，認真地記了筆記。最終的報告讓老師感動落淚。「歷史，」Sam在結論中寫道，「不是課本上的日期，而是活著的人心中的記憶。」"},{"title":"#55","vocab":["streetlight","disappeared","darkness","deserved","private"],"en":"One night, Coco woke up at two in the morning with a strange feeling. Something outside was moving. Coco looked out the window and saw a fox sitting very still in the pale glow of a streetlight. Neither of them moved for a long time. Then the fox turned and disappeared into the darkness. Coco sat there for an hour, unable to sleep, not wanting to. Some moments, Coco thought, deserve to be felt completely before you let them go. Coco wrote about it the next morning and kept the entry private for years.","zh":"一天夜裡，Coco在凌晨兩點帶著奇怪的感覺醒來。外面有什麼東西在動。Coco望向窗外，看到一隻狐狸在路燈蒼白的光芒中一動不動地坐著。他們兩個都靜靜地待了很長時間。然後狐狸轉身，消失在黑暗中。Coco在那裡坐了一個小時，睡不著，也不想睡著。有些時刻，Coco想，值得在你放手之前完全地感受。Coco第二天早上把它寫了下來，這篇日記保密了很多年。"},{"title":"#56","vocab":["announced","script","revising","performance","communicate"],"en":"When the English teacher announced that the class would perform an original play in English at the end of term, panic spread through the room. Tim was chosen to write the script. It was the most difficult writing task Tim had ever faced — every word had to carry meaning, every scene had to move the story forward. Tim spent three weeks revising and revising. On the night of the performance, when the audience laughed at the right moments and fell silent at the right moments, Tim understood for the first time what it truly means to communicate across a language.","zh":"當英語老師宣布班上學期末將用英文演出一齣原創劇時，恐慌在教室裡蔓延開來。Tim被選中來寫劇本。這是Tim面對過的最困難的寫作任務——每個詞都必須承載意義，每個場景都必須推動故事前進。Tim花了三週時間一遍又一遍地修改。表演當晚，當觀眾在對的時刻笑，在對的時刻沉默，Tim第一次真正理解了什麼叫做跨越語言的溝通。"},{"title":"#57","vocab":["competition","marine","pollution","exhibition","officials"],"en":"Mei and two classmates entered a national environmental poster competition. Their design showed a sea turtle tangled in plastic waste, with the words: \"This is not their ocean anymore.\" They worked on it for a month, researching facts about marine pollution and testing different visual approaches. The poster was selected as one of the top twenty nationwide. It was displayed at an exhibition in Yilan where government officials saw it. One official stopped and took a photograph. Mei never found out what happened next, but felt certain that the image had traveled further than they had.","zh":"Mei和兩個同學參加了全國環保海報比賽。他們的設計展示了一隻被塑膠廢物纏住的海龜，配上文字：「這片海洋不再屬於他們了。」他們為此工作了一個月，研究海洋汙染的事實，並測試了不同的視覺方法。海報被選為全國前二十名之一，在Yilan的一個展覽中展出，政府官員看到了它。一位官員停下來拍了照片。Mei從未知道接下來發生了什麼，但確信那張圖像比他們自己走得更遠。"},{"title":"#58","vocab":["hospitalized","bedside","encyclopedia","discharge","carelessly"],"en":"In the spring of fifth grade, Ben's grandmother was hospitalized for a month. Every day after school, Ben sat by her bedside and read to her from a nature encyclopedia — not because Grandma asked, but because Ben did not know what else to offer. Grandma rarely spoke during these visits, but her eyes followed the words. On the last day before discharge, she held Ben's hand and said, \"You have a kind voice.\" Ben had never thought of a voice as something that could be kind. After that, Ben never spoke carelessly again.","zh":"在五年級的春天，Ben的奶奶住院了一個月。每天放學後，Ben坐在她的床邊，從一本自然百科全書讀給她聽——不是因為奶奶要求，而是因為Ben不知道還能給予什麼。奶奶在這些探訪中很少說話，但她的眼睛跟著文字走。出院前的最後一天，她握著Ben的手說：「你有一把善良的聲音。」Ben從未想過聲音也可以是善良的。此後，Ben再也沒有輕率地說話。"},{"title":"#59","vocab":["custodian","sunrise","admired","crooked","straightened"],"en":"The class was assigned to write a one-page essay about a person they admired. Most students chose athletes or celebrities. Zoe chose the school custodian, Mr. Lin, who arrived before sunrise every day, fixed broken things quietly, and left after sunset. Zoe spent a week following Mr. Lin's schedule and taking notes. The essay described small moments: the way he straightened a crooked picture frame, the way he swept the steps in the rain. The teacher read it aloud without saying whose it was. The class was very quiet at the end.","zh":"班上被要求寫一篇關於他們欽佩的人的一頁短文。大多數學生選擇了運動員或名人。Zoe選擇了學校的管理員林先生，他每天日出前到達，靜靜地修好壞掉的東西，日落後才離開。Zoe花了一週時間跟著林先生的行程並記筆記。文章描述了細小的時刻：他把歪斜的相框扶正的方式，他在雨中打掃台階的方式。老師沒有說是誰寫的就大聲朗讀了它。班上在最後非常安靜。"},{"title":"#60","vocab":["notebook","poems","hesitated","silently","audience"],"en":"Jack had kept a secret for three years: a small notebook filled with poems written in both Chinese and English. No one had ever read them. One afternoon, Jack's English teacher asked students to bring in a piece of their own writing. Jack hesitated at home that evening, then packed the notebook. The teacher read one poem silently, then looked up and said, \"May I share this with the class?\" Jack nodded. The room was very still when the last line was read. Afterward, three classmates quietly asked Jack to write something for them. Some things find their audience when the time is right.","zh":"Jack保守了一個秘密三年：一個裝滿中英雙語詩歌的小筆記本。從未有人讀過它們。一天下午，Jack的英語老師請學生帶來自己的一篇文章。Jack那天晚上在家猶豫了，然後把筆記本裝進了包。老師默默地讀了一首詩，然後抬起頭說：「我可以和班上分享嗎？」Jack點了點頭。最後一行被讀出時，教室非常安靜。事後，三個同學悄悄地請Jack為他們寫點什麼。有些東西在時機成熟時自然會找到它的讀者。"},{"title":"#61","vocab":["debate","technology","opposing","isolated","margin"],"en":"Last spring, Nina's school sent five students to a regional debate competition in Kaohsiung. Nina was one of them. The topic was whether technology does more harm than good. Nina's team argued in favor of technology, using examples from medicine, education, and communication. The opposing team was strong and well-prepared. During the final round, Nina made an unexpected point about how technology helped isolated communities during natural disasters. The judges nodded. Nina's team won by a narrow margin. But more than the trophy, Nina carried home the lesson that a single, well-timed idea can change the direction of an entire argument.","zh":"去年春天，Nina的學校選送了五名學生去Kaohsiung參加地區辯論比賽。Nina是其中之一。主題是科技是否弊大於利。Nina的隊伍支持科技，以醫學、教育和通訊為例。對方隊伍強大且準備充分。在最後一輪，Nina提出了一個意想不到的論點：科技如何在自然災害中幫助了孤立的社區。評審點頭。Nina的隊伍以微弱優勢獲勝。但比起獎盃，Nina更帶回了一個教訓：一個時機 s to communicate across a language.","zh":"當英語老師宣布班上學期末將用英文演出一齣原創劇時，恐慌在教室裡蔓延開來。Max被選中來寫劇本。這是Max面對過的最困難的寫作任務——每個詞都必須承載意義，每個場景都必須推動故事前進。Max花了三週時間一遍又一遍地修改。表演當晚，當觀眾在對的時刻笑，在對的時刻沉默，Max第一次真正理解了什麼叫做跨越語言的溝通。"},{"title":"#67","vocab":["competition","marine","pollution","exhibition","officials"],"en":"Mia and two classmates entered a national environmental poster competition. Their design showed a sea turtle tangled in plastic waste, with the words: \"This is not their ocean anymore.\" They worked on it for a month, researching facts about marine pollution and testing different visual approaches. The poster was selected as one of the top twenty nationwide. It was displayed at an exhibition in Penghu where government officials saw it. One official stopped and took a photograph. Mia never found out what happened next, but felt certain that the image had traveled further than they had.","zh":"Mia和兩個同學參加了全國環保海報比賽。他們的設計展示了一隻被塑膠廢物纏住的海龜，配上文字：「這片海洋不再屬於他們了。」他們為此工作了一個月，研究海洋汙染的事實，並測試了不同的視覺方法。海報被選為全國前二十名之一，在Penghu的一個展覽中展出，政府官員看到了它。一位官員停下來拍了照片。Mia從未知道接下來發生了什麼，但確信那張圖像比他們自己走得更遠。"},{"title":"#68","vocab":["hospitalized","bedside","encyclopedia","discharge","carelessly"],"en":"In the spring of fifth grade, Alex's grandmother was hospitalized for a month. Every day after school, Alex sat by her bedside and read to her from a nature encyclopedia — not because Grandma asked, but because Alex did not know what else to offer. Grandma rarely spoke during these visits, but her eyes followed the words. On the last day before discharge, she held Alex's hand and said, \"You have a kind voice.\" Alex had never thought of a voice as something that could be kind. After that, Alex never spoke carelessly again.","zh":"在五年級的春天，Alex的奶奶住院了一個月。每天放學後，Alex坐在她的床邊，從一本自然百科全書讀給她聽——不是因為奶奶要求，而是因為Alex不知道還能給予什麼。奶奶在這些探訪中很少說話，但她的眼睛跟著文字走。出院前的最後一天，她握著Alex的手說：「你有一把善良的聲音。」Alex從未想過聲音也可以是善良的。此後，Alex再也沒有輕率地說話。"},{"title":"#69","vocab":["custodian","sunrise","admired","crooked","straightened"],"en":"The class was assigned to write nt about how technology helped isolated communities during natural disasters. The judges nodded. Amy's team won by a narrow margin. But more than the trophy, Amy carried home the lesson that a single, well-timed idea can change the direction of an entire argument.","zh":"去年春天，Amy的學校選送了五名學生去Jiufen參加地區辯論比賽。Amy是其中之一。主題是科技是否弊大於利。Amy的隊伍支持科技，以醫學、教育和通訊為例。對方隊伍強大且準備充分。在最後一輪，Amy提出了一個意想不到的論點：科技如何在自然災害中幫助了孤立的社區。評審點頭。Amy的隊伍以微弱優勢獲勝。但比起獎盃，Amy更帶回了一個教訓：一個時機恰當的想法，可以改變整個論點的走向。"},{"title":"#72","vocab":["volunteered","restless","distracted","satisfaction","borrowed"],"en":"During the summer holiday, Leo volunteered at a community library in Sun Moon Lake that served children from low-income families. Leo's job was to run a reading hour every Tuesday and Thursday. At first, the children were restless and distracted. Leo tried reading in different voices, using props, and asking questions. Slowly, the children began to lean in. One boy, who had never checked out a book before, borrowed three on the last day. Leo walked home that evening feeling something that no exam score had ever produced — a deep, quiet satisfaction that good work had been done.","zh":"暑假期間，Leo在Sun Moon Lake一個服務低收入家庭兒童的社區圖書館當義工。Leo的任務是每週二和週四主持閱讀時間。起初，孩子們坐立不安、心不在焉。Leo嘗試用不同的聲音朗讀，使用道具，並提問。慢慢地，孩子們開始靠近了。一個從未借過書的男孩在最後一天借了三本。Leo那天晚上走回家，感受到了任何考試成績都無法帶來的東西——一種深沉、安靜的滿足感，因為做了一件好事。"},{"title":"#73","vocab":["terrifying","hesitated","directions","connected","strangers"],"en":"Emma had been studying English for six years, but speaking to a native speaker still felt terrifying. That changed one afternoon when a tourist in Kaohsiung asked Emma for directions to the train station. Emma hesitated, then took a breath and answered slowly but clearly. The tourist smiled and said, \"Your English is great!\" Emma knew that wasn't entirely true — but it didn't matter. In that moment, language had stopped being a subject on a test and had become something alive, something that connected two strangers in the middle of a busy street.","zh":"Emma學英文已經六年了，但和母語使用者說話仍然讓人感到害怕。一天下午，在Kaohsiung的一位遊客問Emma去火車站怎麼走，這一切都改變了。Emma猶豫了一下，然後深吸一口氣，慢慢但清楚地回答了。遊客微笑說：「你的英文很好！」Emma知道這並不完全正確——但這並不重要。在那一刻，語言不再是考試的科目，而是成了有生命的東西，讓兩個陌生人在繁忙的街道中間相連。"},{"title":"#74","vocab":["interview","occupation","economic","decades","conclusion"],"en":"For the fifth-grade graduation project, each student had to interview someone in their community and write a report. Sam chose to interview the oldest resident of the neighborhood — a ninety-two-year-old woman who had lived through the Japanese occupation, the post-war years, and Taiwan's rapid economic growth. She spoke quietly, but every sentence carried the weight of decades. Sam listened for three hours and took careful notes. The final report moved the teacher to tears. \"History,\" Sam wrote in the conclusion, \"is not dates in a textbook. It is the memory inside a living person.\"","zh":"為了五年級的畢業專題，每個學生必須採訪社區裡的一個人並寫一份報告。Sam選擇採訪了鄰里中最年長的居民——一位九十二歲的老太太，她經歷了日本殖民統治、戰後歲月和台灣的快速經濟成長。她說話輕聲細語，但每一句話都承載著數十年的分量。Sam聽了三個小時，認真地記了筆記。最終的報告讓老師感動落淚。「歷史，」Sam在結論中寫道，「不是課本上的日期，而是活著的人心中的記憶。」"},{"title":"#75","vocab":["streetlight","disappeared","darkness","deserved","private"],"en":"One night, Coco woke up at two in the morning with a strange feeling. Something outside was moving. Coco looked out the window and saw a fox sitting very still in the pale glow of a streetlight. Neither of them moved for a long time. Then the fox turned and disappeared into the darkness. Coco sat there for an hour, unable to sleep, not wanting to. Some moments, Coco thought, deserve to be felt completely before you let them go. Coco wrote about it the next morning and kept the entry private for years.","zh":"一天夜裡，Coco在凌晨兩點帶著奇怪的感覺醒來。外面有什麼東西在動。Coco望向窗外，看到一隻狐狸在路燈蒼白的光芒中一動不動地坐著。他們兩個都靜靜地待了很長時間。然後狐狸轉身，消失在黑暗中。Coco在那裡坐了一個小時，睡不著，也不想睡著。有些時刻，Coco想，值得在你放手之前完全地感受。Coco第二天早上把它寫了下來，這篇日記保密了很多年。"},{"title":"#76","vocab":["announced","script","revising","performance","communicate"],"en":"When the English teacher announced that the class would perform an original play in English at the end of term, panic spread through the room. Tim was chosen to write the script. It was the most difficult writing task Tim had ever faced — every word had to carry meaning, every scene had to move the story forward. Tim spent three weeks revising and revising. On the night of the performance, when the audience laughed at the right moments and fell silent at the right moments, Tim understood for the first time what it truly means to communicate across a language.","zh":"當英語老師宣布班上學期末將用英文演出一齣原創劇時，恐慌在教室裡蔓延開來。Tim被選中來寫劇本。這是Tim面對過的最困難的寫作任務——每個詞都必須承載意義，每個場景都必須推動故事前進。Tim花了三週時間一遍又一遍地修改。表演當晚，當觀眾在對的時刻笑，在對的時刻沉默，Tim第一次真正理解了什麼叫做跨越語言的溝通。"},{"title":"#77","vocab":["competition","marine","pollution","exhibition","officials"],"en":"Mei and two classmates entered a national environmental poster competition. Their design showed a sea turtle tangled in plastic waste, with the words: \"This is not their ocean anymore.\" They worked on it for a month, researching facts about marine pollution and testing different visual approaches. The poster was selected as one of the top twenty nationwide. It was displayed at an exhibition in Taipei where government officials saw it. One official stopped and took a photograph. Mei never found out what happened next, but felt certain that the image had traveled further than they had.","zh":"Mei和兩個同學參加了全國環保海報比賽。他們的設計展示了一隻被塑膠廢物纏住的海龜，配上文字：「這片海洋不再屬於他們了。」他們為此工作了一個月，研究海洋汙染的事實，並測試了不同的視覺方法。海報被選為全國前二十名之一，在Taipei的一個展覽中展出，政府官員看到了它。一位官員停下來拍了照片。Mei從未知道接下來發生了什麼，但確信那張圖像比他們自己走得更遠。"},{"title":"#78","vocab":["hospitalized","bedside","encyclopedia","discharge","carelessly"],"en":"In the spring of fifth grade, Ben's grandmother was hospitalized for a month. Every day after school, Ben sat by her bedside and read to her from a nature encyclopedia — not because Grandma asked, but because Ben did not know what else to offer. Grandma rarely spoke during these visits, but her eyes followed the words. On the last day before discharge, she held Ben's hand hanged one afternoon when a tourist in Jiufen asked Kai for directions to the train station. Kai hesitated, then took a breath and answered slowly but clearly. The tourist smiled and said, \"Your English is great!\" Kai knew that wasn't entirely true — but it didn't matter. In that moment, language had stopped being a subject on a test and had become something alive, something that connected two strangers in the middle of a busy street.","zh":"Kai學英文已經六年了，但和母語使用者說話仍然讓人感到害怕。一天下午，在Jiufen的一位遊客問Kai去火車站怎麼走，這一切都改變了。Kai猶豫了一下，然後深吸一口氣，慢慢但清楚地回答了。遊客微笑說：「你的英文很好！」Kai知道這並不完全正確——但這並不重要。在那一刻，語言不再是考試的科目，而是成了有生命的東西，讓兩個陌生人在繁忙的街道中間相連。"},{"title":"#84","vocab":["interview","occupation","economic","decades","conclusion"],"en":"For the fifth-grade graduation project, each student had to interview someone in their community and write a report. Tom chose to interview the oldest resident of the neighborhood — a ninety-two-year-old woman who had lived through the Japanese occupation, the post-war years, and Taiwan's rapid economic growth. She spoke quietly, but every sentence carried the weight of decades. Tom listened for three hours and took careful notes. The final report moved the teacher to tears. \"History,\" Tom wrote in the conclusion, \"is not dates in a textbook. It is the memory inside a living person.\"","zh":"為了五年級的畢業專題，每個學生必須採訪社區裡的一個人並寫一份報告。Tom選擇採訪了鄰里中最年長的居民——一位九十二歲的老太太，她經歷了日本殖民統治、戰後歲月和台灣的快速經濟成長。她說話輕聲細語，但每一句話都承載著數十年的分量。Tom聽了三個小時，認真地記了筆記。最終的報告讓老師感動落淚。「歷史，」Tom在結論中寫道，「不是課本上的日期，而是活著的人心中的記憶。」"},{"title":"#85","vocab":["streetlight","disappeared","darkness","deserved","private"],"en":"One night, Lily woke up at two in the morning with a strange feeling. Something outside was moving. Lily looked out the window and saw a fox sitting very still in the pale glow of a streetlight. Neither of them moved for a long time. Then the fox turned and disappeared into the darkness. Lily sat there for an hour, unable to sleep, not wanting to. Some moments, Lily thought, deserve to be felt completely before you let them go. Lily wrote about it the next morning and kept the entry private for years.","zh":"一天夜裡，Lily在凌晨兩點帶著奇怪的感覺醒來。外面有什麼東西在動。Lily望向窗外，看到一隻狐狸在路燈蒼白的光芒中一動不動地坐著。他們兩個都靜靜地待了很長時間。然後狐狸轉身，消失在黑暗中。Lily在那裡坐了一個小時，睡不著，也不想睡著。有些時刻，Lily想，值得在你放手之前完全地感受。Lily第二天早上把它寫了下來，這篇日記保密了很多年。"},{"title":"#86","vocab":["announced","script","revising","performance","communicate"],"en":"When the English teacher announced that the class would perform an original play in English at the end of term, panic spread through the room. Max was chosen to write the script. It was the most difficult writing task Max had ever faced — every word had to carry meaning, every scene had to move the story forward. Max spent three weeks revising and revising. On the night of the performance, when the audience laughed at the right moments and fell silent at the right moments, Max understood for the first time what it truly means to communicate across a language.","zh":"當英語老師宣布班上學期末將用英文演出一齣原創劇時，恐慌在教室裡蔓延開來。Max被選中來寫劇本。這是Max面對過的最困難的寫作任務——每個詞都必須承載意義，每個場景都必須推動故事前進。Max花了三週時間一遍又一遍地修改。表演當晚，當觀眾在對的時刻笑，在對的時刻沉默，Max第一次真正理解了什麼叫做跨越語言的溝通。"},{"title":"#87","vocab":["competition","marine","pollution","exhibition","officials"],"en":"Mia and two classmates entered a national environmental poster competition. Their design showed a sea turtle tangled in plastic waste, with the words: \"This is not their ocean anymore.\" They worked on it for a month, researching facts about marine pollution and testing different visual approaches. The poster was selected as one of the top twenty nationwide. It was displayed at an exhibition in Hsinchu where government officials saw it. One official stopped and took a photograph. Mia never found out what happened next, but felt certain that the image had traveled further than they had.","zh":"Mia和兩個同學參加了全國環保海報比賽。他們的設計展示了一隻被塑膠廢物纏住的海龜，配上文字：「這片海洋不再屬於他們了。」他們為此工作了一個月，研究海洋汙染的事實，並測試了不同的視覺方法。海報被選為全國前二十名之一，在Hsinchu的一個展覽中展出，政府官員看到了它。一位官員停下來拍了照片。Mia從未知道接下來發生了什麼，但確信那張圖像比他們自己走得更遠。"},{"title":"#88","vocab":["hospitalized","bedside","encyclopedia","discharge","carelessly"],"en":"In the spring of fifth grade, Alex's grandmother was hospitalized for a month. Every day after school, Alex sat by her bedside and read to her from a nature encyclopedia — not because Grandma asked, but because Alex did not know what else to offer. Grandma rarely spoke during these visits, but her eyes followed the words. On the last day before discharge, she held Alex's hand and said, \"You have a kind voice.\" Alex had never thought of a voice as something that could be kind. After that, Alex never spoke carelessly again.","zh":"在五年級的春天，Alex的奶奶住院了一個月。每天放學後，Alex坐在她的床邊，從一本自然百科全書讀給她聽——不是因為奶奶要求，而是因為Alex不知道還能給予什麼。奶奶在這些探訪中很少說話，但她的眼睛跟著文字走。出院前的最後一天，她握著Alex的手說：「你有一把善良的聲音。」Alex從未想過聲音也可以是善良的。此後，Alex再也沒有輕率地說話。"},{"title":"#89","vocab":["custodian","sunrise","admired","crooked","straightened"],"en":"The class was assigned to write a one-page essay about a person they admired. Most students chose athletes or celebrities. Anna chose the school custodian, Mr. Lin, who arrived before sunrise every day, fixed broken things quietly, and left after sunset. Anna spent a week following Mr. Lin's schedule and taking notes. The essay described small moments: the way he straightened a crooked picture frame, the way he swept the steps in the rain. The teacher read it aloud without saying whose it was. The class was very quiet at the end.","zh":"班上被要求寫一篇關於他們欽佩的人的一頁短文。大多數學生選擇了運動員或名人。Anna選擇了學校的管理員林先生，他每天日出前到達，靜靜地修好壞掉的東西，日落後才離開。Anna花了一週時間跟著林先生的行程並記筆記。文章描述了細小的時刻：他把歪斜的相框扶正的方式，他在雨中打掃台階的方式。老師沒有說是誰寫的就大聲朗讀了它。班上在最後非常安靜。"},{"title":"#90","vocab":["notebook","poems","hesitated","silently","audience"],"en":"Ren had kept a secret for three years: a small notebook filled with poems written in both Chinese and English. No one had ever read them. One afternoon, Ren's English teacher asked students to bring in a piece of their own writing. Ren hesitated at home that evening, then packed the notebook. The teacher read one poem silently, then looked up and said, \"May I share this with the class?\" Ren nodded. The room was very still when the last line was read. Afterward, three classmates quietly asked Ren to write something for them. Some things find their audience when the time is right.","zh":"Ren保守了一個秘密三年：一個裝滿中英雙語詩歌的小筆記本。從未有人讀過它們。一天下午，Ren的英語老師請學生帶來自己的一篇文章。Ren那天晚上在家猶豫了，然後把筆記本裝進了包。老師默默地讀了一首詩，然後抬起頭說：「我可以和班上分享嗎？」Ren點了點頭。最後一行被讀出時，教室非常安靜。事後，三個同學悄悄地請Ren為他們寫點什麼。有些東西在時機成熟時自然會找到它的讀者。"},{"title":"#91","vocab":["debate","technology","opposing","isolated","margin"],"en":"Last spring, Amy's school sent five students to a regional debate competition in Penghu. Amy was one of them. The topic was whether technology does more harm than good. Amy's team argued in favor of technology, using examples from medicine, education, and communication. The opposing team was strong and well-prepared. During the final round, Amy made an unexpected point about how technology helped isolated communities during natural disasters. The judges nodded. Amy's team won by a narrow margin. But more than the trophy, Amy carried home the lesson that a single, well-timed idea can change the direction of an entire argument.","zh":"去年春天，Amy的學校選送了五名學生去Penghu參加地區辯論比賽。Amy是其中之一。主題是科技是否弊大於利。Amy的隊伍支持科技，以醫學、教育和通訊為例。對方隊伍強大且準備充分。在最後一輪，Amy提出了一個意想不到的論點：科技如何在自然災害中幫助了孤立的社區。評審點頭。Amy的隊伍以微弱優勢獲勝。但比起獎盃，Amy更帶回了一個教訓：一個時機恰當的想法，可以改變整個論點的走向。"},{"title":"#92","vocab":["volunteered","restless","distracted","satisfaction","borrowed"],"en":"During the summer holiday, Leo volunteered at a community library in Taidong that served children from low-income families. Leo's job was to run a reading hour every Tuesday and Thursday. At first, the children were restless and distracted. Leo tried reading in different voices, using props, and asking questions. Slowly, the children began to lean in. One boy, who had never checked out a book before, borrowed three on the last day. Leo walked home that evening feeling something that no exam score had ever produced — a deep, quiet at served children from low-income families. Nina's job was to run a reading hour every Tuesday and Thursday. At first, the children were restless and distracted. Nina tried reading in different voices, using props, and asking questions. Slowly, the children began to lean in. One boy, who had never checked out a book before, borrowed three on the last day. Nina walked home that evening feeling something that no exam score had ever produced — a deep, quiet satisfaction that good work had been done.","zh":"暑假期間，Nina在Jiufen一個服務低收入家庭兒童的社區圖書館當義工。Nina的任務是每週二和週四主持閱讀時間。起初，孩子們坐立不安、心不在焉。Nina嘗試用不同的聲音朗讀，使用道具，並提問。慢慢地，孩子們開始靠近了。一個從未借過書的男孩在最後一天借了三本。Nina那天晚上走回家，感受到了任何考試成績都無法帶來的東西——一種深沉、安靜的滿足感，因為做了一件好事。"},{"title":"#3","vocab":["terrifying","hesitated","directions","connected","strangers"],"en":"Ruby had been studying English for six years, but speaking to a native speaker still felt terrifying. That changed one afternoon when a tourist in Sun Moon Lake asked Ruby for directions to the train station. Ruby hesitated, then took a breath and answered slowly but clearly. The tourist smiled and said, \"Your English is great!\" Ruby knew that wasn't entirely true — but it didn't matter. In that moment, language had stopped being a subject on a test and had become something alive, something that connected two strangers in the middle of a busy street.","zh":"Ruby學英文已經六年了，但和母語使用者說話仍然讓人感到害怕。一天下午，在Sun Moon Lake的一位遊客問Ruby去火車站怎麼走，這一切都改變了。Ruby猶豫了一下，然後深吸一口氣，慢慢但清楚地回答了。遊客微笑說：「你的英文很好！」Ruby知道這並不完全正確——但這並不重要。在那一刻，語言不再是考試的科目，而是成了有生命的東西，讓兩個陌生人在繁忙的街道中間相連。"},{"title":"#4","vocab":["interview","occupation","economic","decades","conclusion"],"en":"For the fifth-grade graduation project, each student had to interview someone in their community and write a report. Kai chose to interview the oldest resident of the neighborhood — a ninety-two-year-old woman who had lived through the Japanese occupation, the post-war years, and Taiwan's rapid economic growth. She spoke quietly, but every sentence carried the weight of decades. Kai listened for three hours and took careful notes. The final report moved the teacher to tears. \"History,\" Kai wrote in the conclusion, \"is not dates in a textbook. It is the memory inside a living person.\"","zh":"為了五年級的畢業專題，每個學生必須採訪社區裡的一個人並寫一份報告。Kai選擇採訪了鄰里中最年長的居民——一位九十二歲的老太太，她經歷了日本殖民統治、戰後歲月和台灣的快速經濟成長。她說話輕聲細語，但每一句話都承載著數十年的分量。Kai聽了三個小時，認真地記了筆記。最終的報告讓老師感動落淚。「歷史，」Kai在結論中寫道，「不是課本上的日期，而是活著的人心中的記憶。」"},{"title":"#5","vocab":["streetlight","disappeared","darkness","deserved","private"],"en":"One night, Tom woke up at two in the morning with a strange feeling. Something outside was moving. Tom looked out the window and saw a fox sitting very still in the pale glow of a streetlight. Neither of them moved for a long time. Then the fox turned and disappeared into the darkness. Tom sat there for an hour, unable to sleep, not wanting to. Some moments, Tom thought, deserve to be felt completely before you let them go. Tom wrote about it the next morning and kept the entry private for years.","zh":"一天夜裡，Tom在凌晨兩點帶著奇怪的感覺醒來。外面有什麼東西在動。Tom望向窗外，看到一隻狐狸在路燈蒼白的光芒中一動不動地坐著。他們兩個都靜靜地待了很長時間。然後狐狸轉身，消失在黑暗中。Tom在那裡坐了一個小時，睡不著，也不想睡著。有些時刻，Tom想，值得在你放手之前完全地感受。Tom第二天早上把它寫了下來，這篇日記保密了很多年。"},{"title":"#6","vocab":["announced","script","revising","performance","communicate"],"en":"When the English teacher announced that the class would perform an original play in English at the end of term, panic spread through the room. Lily was chosen to write the script. It was the most difficult writing task Lily had ever faced — every word had to carry meaning, every scene had to move the story forward. Lily spent three weeks revising and revising. On the night of the performance, when the audience laughed at the right moments and fell silent at the right moments, Lily understood for the first time what it truly means to communicate across a language.","zh":"當英語老師宣布班上學期末將用英文演出一齣原創劇時，恐慌在教室裡蔓延開來。Lily被選中來寫劇本。這是Lily面對過的最困難的寫作任務——每個詞都必須承載意義，每個場景都必須推動故事前進。Lily花了三週時間一遍又一遍地修改。表演當晚，當觀眾在對的時刻笑，在對的時刻沉默，Lily第一次真正理解了什麼叫做跨越語言的溝通。"},{"title":"#7","vocab":["competition","marine","pollution","exhibition","officials"],"en":"Max and two classmates entered a national environmental poster competition. Their design showed a sea turtle tangled in plastic waste, with the words: \"This is not their ocean anymore.\" They worked on it for a month, researching facts about marine pollution and testing different visual approaches. The poster was selected as one of the top twenty nationwide. It was displayed at an exhibition in Tainan where government officials saw it. One official stopped and took a photograph. Max never found out what happened next, but felt certain that the image had traveled further than they had.","zh":"Max和兩個同學參加了全國環保海報比賽。他們的設計展示了一隻被塑膠廢物纏住的海龜，配上文字：「這片海洋不再屬於他們了。」他們為此工作了一個月，研究海洋汙染的事實，並測試了不同的視覺方法。海報被選為全國前二十名之一，在Tainan的一個展覽中展出，政府官員看到了它。一位官員停下來拍了照片。Max從未知道接下來發生了什麼，但確信那張圖像比他們自己走得更遠。"},{"title":"#8","vocab":["hospitalized","bedside","encyclopedia","discharge","carelessly"],"en":"In the spring of fifth grade, Mia's grandmother was hospitalized for a month. Every day after school, Mia sat by her bedside and read to her from a nature encyclopedia — not because Grandma asked, but because Mia did not know what else to offer. Grandma rarely spoke during these visits, but her eyes followed the words. On the last day before discharge, she held Mia's hand and said, \"You have a kind voice.\" Mia had never thought of a voice as something that could be kind. After that, Mia never spoke carelessly again.","zh":"在五年級的春天，Mia的奶奶住院了一個月。每天放學後，Mia坐在她的床邊，從一本自然百科全書讀給她聽——不是因為奶奶要求，而是因為Mia不知道還能給予什麼。奶奶在這些探訪中很少說話，但她的眼睛跟著文字走。出院前的最後一天，她握著Mia的手說：「你有一把善良的聲音。」Mia從未想過聲音也可以是善良的。此後，Mia再也沒有輕率地說話。"},{"title":"#9","vocab":["custodian","sunrise","admired","crooked","straightened"],"en":"The class was assigned to write a one-page essay about a person they admired. Most students chose athletes or celebrities. Alex chose the school custodian, Mr. Lin, who arrived before sunrise every day, fixed broken things quietly, t a single, well-timed idea can change the direction of an entire argument.","zh":"去年春天，Ren的學校選送了五名學生去Taidong參加地區辯論比賽。Ren是其中之一。主題是科技是否弊大於利。Ren的隊伍支持科技，以醫學、教育和通訊為例。對方隊伍強大且準備充分。在最後一輪，Ren提出了一個意想不到的論點：科技如何在自然災害中幫助了孤立的社區。評審點頭。Ren的隊伍以微弱優勢獲勝。但比起獎盃，Ren更帶回了一個教訓：一個時機恰當的想法，可以改變整個論點的走向。"},{"title":"#12","vocab":["volunteered","restless","distracted","satisfaction","borrowed"],"en":"During the summer holiday, Amy volunteered at a community library in Yilan that served children from low-income families. Amy's job was to run a reading hour every Tuesday and Thursday. At first, the children were restless and distracted. Amy tried reading in different voices, using props, and asking questions. Slowly, the children began to lean in. One boy, who had never checked out a book before, borrowed three on the last day. Amy walked home that evening feeling something that no exam score had ever produced — a deep, quiet satisfaction that good work had been done.","zh":"暑假期間，Amy在Yilan一個服務低收入家庭兒童的社區圖書館當義工。Amy的任務是每週二和週四主持閱讀時間。起初，孩子們坐立不安、心不在焉。Amy嘗試用不同的聲音朗讀，使用道具，並提問。慢慢地，孩子們開始靠近了。一個從未借過書的男孩在最後一天借了三本。Amy那天晚上走回家，感受到了任何考試成績都無法帶來的東西——一種深沉、安靜的滿足感，因為做了一件好事。"},{"title":"#13","vocab":["terrifying","hesitated","directions","connected","strangers"],"en":"Leo had been studying English for six years, but speaking to a native speaker still felt terrifying. That changed one afternoon when a tourist in Kenting asked Leo for directions to the train station. Leo hesitated, then took a breath and answered slowly but clearly. The tourist smiled and said, \"Your English is great!\" Leo knew that wasn't entirely true — but it didn't matter. In that moment, language had stopped being a subject on a test and had become something alive, something that connected two strangers in the middle of a busy street.","zh":"Leo學英文已經六年了，但和母語使用者說話仍然讓人感到害怕。一天下午，在Kenting的一位遊客問Leo去火車站怎麼走，這一切都改變了。Leo猶豫了一下，然後深吸一口氣，慢慢但清楚地回答了。遊客微笑說：「你的英文很好！」Leo知道這並不完全正確——但這並不重要。在那一刻，語言不再是考試的科目，而是成了有生命的東西，讓兩個陌生人在繁忙的街道中間相連。"},{"title":"#14","vocab":["interview","occupation","economic","decades","conclusion"],"en":"For the fifth-grade graduation project, each student had to interview someone in their community and write a report. Emma chose to interview the oldest resident of the neighborhood — a ninety-two-year-old woman who had lived through the Japanese occupation, the post-war years, and Taiwan's rapid economic growth. She spoke quietly, but every sentence carried the weight of decades. Emma listened for three hours and took careful notes. The final report moved the teacher to tears. \"History,\" Emma wrote in the conclusion, \"is not dates in a textbook. It is the memory inside a living person.\"","zh":"為了五年級的畢業專題，每個學生必須採訪社區裡的一個人並寫一份報告。Emma選擇採訪了鄰里中最年長的居民——一位九十二歲的老太太，她經歷了日本殖民統治、戰後歲月和台灣的快速經濟成長。她說話輕聲細語，但每一句話都承載著數十年的分量。Emma聽了三個小時，認真地記了筆記。最終的報告讓老師感動落淚。「歷史，」Emma在結論中寫道，「不是課本上的日期，而是活著的人心中的記憶。」"},{"title":"#15","vocab":["streetlight","disappeared","darkness","deserved","private"],"en":"One night, Sam woke up at two in the morning with a strange feeling. Something outside was moving. Sam looked out the window and saw a fox sitting very still in the pale glow of a streetlight. Neither of them moved for a long time. Then the fox turned and disappeared into the darkness. Sam sat there for an hour, unable to sleep, not wanting to. Some moments, Sam thought, deserve to be felt completely before you let them go. Sam wrote about it the next morning and kept the entry private for years.","zh":"一天夜裡，Sam在凌晨兩點帶著奇怪的感覺醒來。外面有什麼東西在動。Sam望向窗外，看到一隻狐狸在路燈蒼白的光芒中一動不動地坐著。他們兩個都靜靜地待了很長時間。然後狐狸轉身，消失在黑暗中。Sam在那裡坐了一個小時，睡不著，也不想睡著。有些時刻，Sam想，值得在你放手之前完全地感受。Sam第二天早上把它寫了下來，這篇日記保密了很多年。"},{"title":"#16","vocab":["announced","script","revising","performance","communicate"],"en":"When the English teacher announced that the class would perform an original play in English at the end of term, panic spread through the room. Coco was chosen to write the script. It was the most difficult writing task Coco had ever faced — every word had to carry meaning, every scene had to move the story forward. Coco spent three weeks revising and revising. On the night of the performance, when the audience laughed at the right moments and fell silent at the right moments, Coco understood for the first time what it truly means to communicate across a language.","zh":"當英語老師宣布班上學期末將用英文演出一齣原創劇時，恐慌在教室裡蔓延開來。Coco被選中來寫劇本。這是Coco面對過的最困難的寫作任務——每個詞都必須承載意義，每個場景都必須推動故事前進。Coco花了三週時間一遍又一遍地修改。表演當晚，當觀眾在對的時刻笑，在對的時刻沉默，Coco第一次真正理解了什麼叫做跨越語言的溝通。"},{"title":"#17","vocab":["competition","marine","pollution","exhibition","officials"],"en":"Tim and two classmates entered a national environmental poster competition. Their design showed a sea turtle tangled in plastic waste, with the words: \"This is not their ocean anymore.\" They worked on it for a month, researching facts about marine pollution and testing different visual approaches. The poster was selected as one of the top twenty nationwide. It was displayed at an exhibition in Taichung where government officials saw it. One official stopped and took a photograph. Tim never found out what happened next, but felt certain that the image had traveled further than they had.","zh":"Tim和兩個同學參加了全國環保海報比賽。他們的設計展示了一隻被塑膠廢物纏住的海龜，配上文字：「這片海洋不再屬於他們了。」他們為此工作了一個月，研究海洋汙染的事實，並測試了不同的視覺方法。海報被選為全國前二十名之一，在Taichung的一個展覽中展出，政府官員看到了它。一位官員停下來拍了照片。Tim從未知道接下來發生了什麼，但確信那張圖像比他們自己走得更遠。"},{"title":"#18","vocab":["hospitalized","bedside","encyclopedia","discharge","carelessly"],"en":"In the spring of fifth grade, Mei's grandmother was hospitalized for a month. Every day after school, Mei sat by her bedside and read to her from a nature encyclopedia — not because Grandma asked, but because Mei did not know what else to offer. Grandma rarely spoke during these visits, but her eyes followed the words. On the last day before discharge, she held Mei's hand and said, \"You have a kind voice.\" Mei had never thought of a voice as something that could be kind. After that, Mei never spoke carelessly again.","zh":"在五年級的春天，Mei的奶奶住院了一個月。每天放學後，Mei坐在她的床邊，從一本自然百科全書讀給她聽——不是因為奶奶要求，而是因為Mei不知道還能給予什麼。奶奶在這些探訪中很少說話，但她的眼睛跟著文字走。出院前的最後一天，她握著Mei的手說：「你有一把善良的聲音。」Mei從未想過聲音也可以是善良的。此後，Mei再也沒有輕率地說話。"},{"title":"#19","vocab":["custodian","sunrise","admired","crooked","straightened"],"en":"The class was assigned to write a one-page essay about a person they admired. Most students chose athletes or celebrities. Ben chose the school custodian, Mr. Lin, who arrived before sunrise every day, fixed broken things quietly, and left after sunset. Ben spent a week following Mr. Lin's schedule and taking notes. The essay described small moments: the way he straightened a crooked picture frame, the way he swept the steps in the rain. The teacher read it aloud without saying whose it was. The class was very quiet at the end.","zh":"班上被要求寫一篇關於他們欽佩的人的一頁短文。大多數學生選擇了運動員或名人。Ben選擇了學校的管理員林先生，他每天日出前到達，靜靜地修好壞掉的東西，日落後才離開。Ben花了一週時間跟著林先生的行程並記筆記。文章描述了細小的時刻：他把歪斜的相框扶正的方式，他在雨中打掃台階的方式。老師沒有說是誰寫的就大聲朗讀了它。班上在最後非常安靜。"},{"title":"#20","vocab":["notebook","poems","hesitated","silently","audience"],"en":"Zoe had kept a secret for three years: a small notebook filled with poems written in both Chinese and English. No one had ever read them. One afternoon, Zoe's English teacher asked students to bring in a piece of their own writing. Zoe hesitated at home that evening, then packed the notebook. The teacher read one poem silently, then looked up and said, \"May I share this with the class?\" Zoe nodded. The room was very still when the last line was read. Afterward, three classmates quietly asked Zoe to write something for them. Some things find their audience when the time is right.","zh":"Zoe保守了一個秘密三年：一個裝滿中英雙語詩歌的小筆記本。從未有人讀過它們。一天下午，Zoe的英語老師請學生帶來自己的一篇文章。Zoe那天晚上在家猶豫了，然後把筆記本裝進了包。老師默默地讀了一首詩，然後抬起頭說：「我可以和班上分享嗎？」Zoe點了點頭。最後一行被讀出時，教室非常安靜。事後，三個同學悄悄地請Zoe為他們寫點什麼。有些東西在時機成熟時自然會找到它的讀者。"},{"title":"#21","vocab":["debate","technology","opposing","isolated","margin"],"en":"Last spring, Jack's school sent five students to a regional debate competition in Alishan. Jack was one of them. The topic was whether technology does more harm than good. Jack's team argued in favor of technology, using examples from medicine, education, and communication. The opposing team was strong and well-prepared. During the final round, Jack made an unexpected point about how technology helped isolated communities during natural disasters. The judges nodded. Jack's team won by a narrow margin. But more than the trophy, Jack carried home the lesson that a single, well-timed idea can change the direction of an entire argument.","zh":"去年春天，Jack的學校選送了五名學生去Alishan參加地區辯論比賽。Jack是其中之一。主題是科技是否弊大於利。Jack的隊伍支持科技，以醫學、教育和通訊為例。對方隊伍強大且準備充分。在最後一輪，Jack提出了一個意想不到的論點：科技如何在自然災害中幫助了孤立的社區。評審點頭。Jack的隊伍以微弱優勢獲勝。但比起獎盃，Jack更帶回了一個教訓：一個時機恰當的想法，可以改變整個論點的走向。"},{"title":"#22","vocab":["volunteered","restless","distracted","satisfaction","borrowed"],"en":"During the summer holiday, Nina volunteered at a community library in Penghu that served children from low-income families. Nina's job was to run a reading hour every Tuesday and Thursday. At first, the children were restless and distracted. Nina tried reading in different voices, using props, and asking questions. Slowly, the children began to lean in. One boy, who had never checked out a book before, borrowed three on the last day. Nina walked home that evening feeling something that no exam score had ever produced — a deep, quiet satisfaction that good work had been done.","zh":"暑假期間，Nina在Penghu一個服務低收入家庭兒童的社區圖書館當義工。Nina的任務是每週二和週四主持閱讀時間。起初，孩子們坐立不安、心不在焉。Nina嘗試用不同的聲音朗讀，使用道具，並提問。慢慢地，孩子們開始靠近了。一個從未借過書的男孩在最後一天借了三本。Nina那天晚上走回家，感受到了任何考試成績都無法帶來的東西——一種深沉、安靜的滿足感，因為做了一件好事。"},{"title":"#23","vocab":["terrifying","hesitated","directions","connected","strangers"],"en":"Ruby had been studying English for six years, but speaking to a native speaker still felt terrifying. That changed one afternoon when a tourist in Taidong asked Ruby for directions to the train station. Ruby hesitated, then took a breath and answered slowly but clearly. The tourist smiled and said, \"Your English is great
