me things find their audience when the time is right.","zh":"Anna保守了一個秘密三年：一個裝滿中英雙語詩歌的小筆記本。從未有人讀過它們。一天下午，Anna的英語老師請學生帶來自己的一篇文章。Anna那天晚上在家猶豫了，然後把筆記本裝進了包。老師默默地讀了一首詩，然後抬起頭說：「我可以和班上分享嗎？」Anna點了點頭。最後一行被讀出時，教室非常安靜。事後，三個同學悄悄地請Anna為他們寫點什麼。有些東西在時機成熟時自然會找到它的讀者。"},{"title":"#31","vocab":["debate","technology","opposing","isolated","margin"],"en":"Last spring, Ren's school sent five students to a regional debate competition in Tainan. Ren was one of them. The topic was whether technology does more harm than good. Ren's team argued in favor of technology, using examples from medicine, education, and communication. The opposing team was strong and well-prepared. During the final round, Ren made an unexpected point about how technology helped isolated communities during natural disasters. The judges nodded. Ren's team won by a narrow margin. But more than the trophy, Ren carried home the lesson that a single, well-timed idea can change the direction of an entire argument.","zh":"去年春天，Ren的學校選送了五名學生去Tainan參加地區辯論比賽。Ren是其中之一。主題是科技是否弊大於利。Ren的隊伍支持科技，以醫學、教育和通訊為例。對方隊伍強大且準備充分。在最後一輪，Ren提出了一個意想不到的論點：科技如何在自然災害中幫助了孤立的社區。評審點頭。Ren的隊伍以微弱優勢獲勝。但比起獎盃，Ren更帶回了一個教訓：一個時機恰當的想法，可以改變整個論點的走向。"},{"title":"#32","vocab":["volunteered","restless","distracted","satisfaction","borrowed"],"en":"During the summer holiday, Amy volunteered at a community library in Taipei that served children from low-income families. Amy's job was to run a reading hour every Tuesday and Thursday. At first, the children were restless and distracted. Amy tried reading in different voices, using props, and asking questions. Slowly, the children began to lean in. One boy, who had never checked out a book before, borrowed three on the last day. Amy walked home that evening feeling something that no exam score had ever produced — a deep, quiet satisfaction that good work had been done.","zh":"暑假期間，Amy在Taipei一個服務低收入家庭兒童的社區圖書館當義工。Amy的任務是每週二和週四主持閱讀時間。起初，孩子們坐立不安、心不在焉。Amy嘗試用不同的聲音朗讀，使用道具，並提問。慢慢地，孩子們開始靠近了。一個從未借過書的男孩在最後一天借了三本。Amy那天晚上走回家，感受到了任何考試成績都無法帶來的東西——一種深沉、安靜的滿足感，因為做了一件好事。"},{"title":"#33","vocab":["terrifying","hesitated","directions","connected","strangers"],"en":"Leo had been studying English for six years, but speaking to a native speaker still felt terrifying. That changed one afternoon when a tourist in Alishan asked Leo for directions to the train station. Leo hesitated, then took a breath and answered slowly but clearly. The tourist smiled and said, \"Your English is great!\" Leo knew that wasn't entirely true — but it didn't matter. In that moment, language had stopped being a subject on a test and had become something alive, something that connected two strangers in the middle of a busy street.","zh":"Leo學英文已經六年了，但和母語使用者說話仍然讓人感到害怕。一天下午，在Alishan的一位遊客問Leo去火車站怎麼走，這一切都改變了。Leo猶豫了一下，然後深吸一口氣，慢慢但清楚地回答了。遊客微笑說：「你的英文很好！」Leo知道這並不完全正確——但這並不重要。在那一刻，語言不再是考試的科目，而是成了有生命的東西，讓兩個陌生人在繁忙的街道中間相連。"},{"title":"#34","vocab":["interview","occupation","economic","decades","conclusion"],"en":"For the fifth-grade graduation project, each student had to interview someone in their community and write a report. Emma chose to interview the oldest resident of the neighborhood — a ninety-two-year-old woman who had lived through the Japanese occupation, the post-war years, and Taiwan's rapid economic growth. She spoke quietly, but every sentence carried the weight of decades. Emma listened for three hours and took careful notes. The final report moved the teacher to tears. \"History,\" Emma wrote in the conclusion, \"is not dates in a textbook. It is the memory inside a living person.\"","zh":"為了五年級的畢業專題，每個學生必須採訪社區裡的一個人並寫一份報告。Emma選擇採訪了鄰里中最年長的居民——一位九十二歲的老太太，她經歷了日本殖民統治、戰後歲月和台灣的快速經濟成長。她說話輕聲細語，但每一句話都承載著數十年的分量。Emma聽了三個小時，認真地記了筆記。最終的報告讓老師感動落淚。「歷史，」Emma在結論中寫道，「不是課本上的日期，而是活著的人心中的記憶。」"},{"title":"#35","vocab":["streetlight","disappeared","darkness","deserved","private"],"en":"One night, Sam woke up at two in the morning with a strange feeling. Something outside was moving. Sam looked out the window and saw a fox sitting very still in the pale glow of a streetlight. Neither of them moved for a long time. Then the fox turned and disappeared into the darkness. Sam sat there for an hour, unable to sleep, not wanting to. Some moments, Sam thought, deserve to be felt completely before you let them go. Sam wrote about it the next morning and kept the entry private for years.","zh":"一天夜裡，Sam在凌晨兩點帶著奇怪的感覺醒來。外面有什麼東西在動。Sam望向窗外，看到一隻狐狸在路燈蒼白的光芒中一動不動地坐著。他們兩個都靜靜地待了很長時間。然後狐狸轉身，消失在黑暗中。Sam在那裡坐了一個小時，睡不著，也不想睡著。有些時刻，Sam想，值得在你放手之前完全地感受。Sam第二天早上把它寫了下來，這篇日記保密了很多年。"},{"title":"#36","vocab":["announced","script","revising","performance","communicate"],"en":"When the English teacher announced that the class would perform an original play in English at the end of term, panic spread through the room. Coco was chosen to write the script. It was the most difficult writing task Coco had ever faced — every word had to carry meaning, every scene had to move the story forward. Coco spent three weeks revising and revising. On the night of the performance, when the audience laughed at the right moments and fell silent at the right moments, Coco understood for the first time what it truly means to communicate across a language.","zh":"當英語老師宣布班上學期末將用英文演出一齣原創劇時，恐慌在教室裡蔓延開來。Coco被選中來寫劇本。這是Coco面對過的最困難的寫作任務——每個詞都必須承載意義，每個場景都必須推動故事前進。Coco花了三週時間一遍又一遍地修改。表演當晚，當觀眾在對的時刻笑，在對的時刻沉默，Coco第一次真正理解了什麼叫做跨越語言的溝通。"},{"title":"#37","vocab":["competition","marine","pollution","exhibition","officials"],"en":"Tim and two classmates entered a national environmental poster competition. Their design showed a sea turtle tangled in plastic waste, with the words: \"This is not their ocean anymore.\" They worked on it for a month, researching facts about marine pollution and testing different visual approaches. The poster was selected as one of the top twenty nationwide. It was displayed at an exhibition in Kenting where government officials saw it. One official stopped and took a photograph. Tim never found out what happened next, but felt certain that the image had trav ,"zh":"為了五年級的畢業專題，每個學生必須採訪社區裡的一個人並寫一份報告。Kai選擇採訪了鄰里中最年長的居民——一位九十二歲的老太太，她經歷了日本殖民統治、戰後歲月和台灣的快速經濟成長。她說話輕聲細語，但每一句話都承載著數十年的分量。Kai聽了三個小時，認真地記了筆記。最終的報告讓老師感動落淚。「歷史，」Kai在結論中寫道，「不是課本上的日期，而是活著的人心中的記憶。」"},{"title":"#45","vocab":["streetlight","disappeared","darkness","deserved","private"],"en":"One night, Tom woke up at two in the morning with a strange feeling. Something outside was moving. Tom looked out the window and saw a fox sitting very still in the pale glow of a streetlight. Neither of them moved for a long time. Then the fox turned and disappeared into the darkness. Tom sat there for an hour, unable to sleep, not wanting to. Some moments, Tom thought, deserve to be felt completely before you let them go. Tom wrote about it the next morning and kept the entry private for years.","zh":"一天夜裡，Tom在凌晨兩點帶著奇怪的感覺醒來。外面有什麼東西在動。Tom望向窗外，看到一隻狐狸在路燈蒼白的光芒中一動不動地坐著。他們兩個都靜靜地待了很長時間。然後狐狸轉身，消失在黑暗中。Tom在那裡坐了一個小時，睡不著，也不想睡著。有些時刻，Tom想，值得在你放手之前完全地感受。Tom第二天早上把它寫了下來，這篇日記保密了很多年。"},{"title":"#46","vocab":["announced","script","revising","performance","communicate"],"en":"When the English teacher announced that the class would perform an original play in English at the end of term, panic spread through the room. Lily was chosen to write the script. It was the most difficult writing task Lily had ever faced — every word had to carry meaning, every scene had to move the story forward. Lily spent three weeks revising and revising. On the night of the performance, when the audience laughed at the right moments and fell silent at the right moments, Lily understood for the first time what it truly means to communicate across a language.","zh":"當英語老師宣布班上學期末將用英文演出一齣原創劇時，恐慌在教室裡蔓延開來。Lily被選中來寫劇本。這是Lily面對過的最困難的寫作任務——每個詞都必須承載意義，每個場景都必須推動故事前進。Lily花了三週時間一遍又一遍地修改。表演當晚，當觀眾在對的時刻笑，在對的時刻沉默，Lily第一次真正理解了什麼叫做跨越語言的溝通。"},{"title":"#47","vocab":["competition","marine","pollution","exhibition","officials"],"en":"Max and two classmates entered a national environmental poster competition. Their design showed a sea turtle tangled in plastic waste, with the words: \"This is not their ocean anymore.\" They worked on it for a month, researching facts about marine pollution and testing different visual approaches. The poster was selected as one of the top twenty nationwide. It was displayed at an exhibition in Taidong where government officials saw it. One official stopped and took a photograph. Max never found out what happened next, but felt certain that the image had traveled further than they had.","zh":"Max和兩個同學參加了全國環保海報比賽。他們的設計展示了一隻被塑膠廢物纏住的海龜，配上文字：「這片海洋不再屬於他們了。」他們為此工作了一個月，研究海洋汙染的事實，並測試了不同的視覺方法。海報被選為全國前二十名之一，在Taidong的一個展覽中展出，政府官員看到了它。一位官員停下來拍了照片。Max從未知道接下來發生了什麼，但確信那張圖像比他們自己走得更遠。"},{"title":"#48","vocab":["hospitalized","bedside","encyclopedia","discharge","carelessly"],"en":"In the spring of fifth grade, Mia's grandmother was hospitalized for a month. Every day after school, Mia sat by her bedside and read to her from a nature encyclopedia — not because Grandma asked, but because Mia did not know what else to offer. Grandma rarely spoke during these visits, but her eyes followed the words. On the last day before discharge, she held Mia's hand and said, \"You have a kind voice.\" Mia had never thought of a voice as something that could be kind. After that, Mia never spoke carelessly again.","zh":"在五年級的春天，Mia的奶奶住院了一個月。每天放學後，Mia坐在她的床邊，從一本自然百科全書讀給她聽——不是因為奶奶要求，而是因為Mia不知道還能給予什麼。奶奶在這些探訪中很少說話，但她的眼睛跟著文字走。出院前的最後一天，她握著Mia的手說：「你有一把善良的聲音。」Mia從未想過聲音也可以是善良的。此後，Mia再也沒有輕率地說話。"},{"title":"#49","vocab":["custodian","sunrise","admired","crooked","straightened"],"en":"The class was assigned to write a one-page essay about a person they admired. Most students chose athletes or celebrities. Alex chose the school custodian, Mr. Lin, who arrived before sunrise every day, fixed broken things quietly, and left after sunset. Alex spent a week following Mr. Lin's schedule and taking notes. The essay described small moments: the way he straightened a crooked picture frame, the way he swept the steps in the rain. The teacher read it aloud without saying whose it was. The class was very quiet at the end.","zh":"班上被要求寫一篇關於他們欽佩的人的一頁短文。大多數學生選擇了運動員或名人。Alex選擇了學校的管理員林先生，他每天日出前到達，靜靜地修好壞掉的東西，日落後才離開。Alex花了一週時間跟著林先生的行程並記筆記。文章描述了細小的時刻：他把歪斜的相框扶正的方式，他在雨中打掃台階的方式。老師沒有說是誰寫的就大聲朗讀了它。班上在最後非常安靜。"},{"title":"#50","vocab":["notebook","poems","hesitated","silently","audience"],"en":"Anna had kept a secret for three years: a small notebook filled with poems written in both Chinese and English. No one had ever read them. One afternoon, Anna's English teacher asked students to bring in a piece of their own writing. Anna hesitated at home that evening, then packed the notebook. The teacher read one poem silently, then looked up and said, \"May I share this with the class?\" Anna nodded. The room was very still when the last line was read. Afterward, three classmates quietly asked Anna to write something for them. Some things find their audience when the time is right.","zh":"Anna保守了一個秘密三年：一個裝滿中英雙語詩歌的小筆記本。從未有人讀過它們。一天下午，Anna的英語老師請學生帶來自己的一篇文章。Anna那天晚上在家猶豫了，然後把筆記本裝進了包。老師默默地讀了一首詩，然後抬起頭說：「我可以和班上分享嗎？」Anna點了點頭。最後一行被讀出時，教室非常安靜。事後，三個同學悄悄地請Anna為他們寫點什麼。有些東西在時機成熟時自然會找到它的讀者。"},{"title":"#51","vocab":["debate","technology","opposing","isolated","margin"],"en":"Last spring, Ren's school sent five students to a regional debate competition in Sun Moon Lake. Ren was one of them. The topic was whether technology does more harm than good. Ren's team argued in favor of technology, using examples from medicine, education, and communication. The opposing team was strong and well-prepared. During the final round, Ren made an unexpected point about how technology helped isolated communities during natural disasters. The judges nodded. Ren's team won by a narrow margin. But more than the trophy, Ren carried home the lesson that a single, well-timed idea can change the direction of an entire argument.","zh":"去年春天，Ren的學校選送了五名學生去Sun Moon Lake參加地區辯論比賽。Ren是其中之一。主題是科技是否弊大於利。Ren的隊伍支持科技，以醫學、教育和通訊為例。對方隊伍強大且準備充分。在最後一輪，Ren提出了一個意想不到的論點：科技如何在自然災害中幫助 rstood for the first time what it truly means to communicate across a language.","zh":"當英語老師宣布班上學期末將用英文演出一齣原創劇時，恐慌在教室裡蔓延開來。Coco被選中來寫劇本。這是Coco面對過的最困難的寫作任務——每個詞都必須承載意義，每個場景都必須推動故事前進。Coco花了三週時間一遍又一遍地修改。表演當晚，當觀眾在對的時刻笑，在對的時刻沉默，Coco第一次真正理解了什麼叫做跨越語言的溝通。"},{"title":"#57","vocab":["competition","marine","pollution","exhibition","officials"],"en":"Tim and two classmates entered a national environmental poster competition. Their design showed a sea turtle tangled in plastic waste, with the words: \"This is not their ocean anymore.\" They worked on it for a month, researching facts about marine pollution and testing different visual approaches. The poster was selected as one of the top twenty nationwide. It was displayed at an exhibition in Alishan where government officials saw it. One official stopped and took a photograph. Tim never found out what happened next, but felt certain that the image had traveled further than they had.","zh":"Tim和兩個同學參加了全國環保海報比賽。他們的設計展示了一隻被塑膠廢物纏住的海龜，配上文字：「這片海洋不再屬於他們了。」他們為此工作了一個月，研究海洋汙染的事實，並測試了不同的視覺方法。海報被選為全國前二十名之一，在Alishan的一個展覽中展出，政府官員看到了它。一位官員停下來拍了照片。Tim從未知道接下來發生了什麼，但確信那張圖像比他們自己走得更遠。"},{"title":"#58","vocab":["hospitalized","bedside","encyclopedia","discharge","carelessly"],"en":"In the spring of fifth grade, Mei's grandmother was hospitalized for a month. Every day after school, Mei sat by her bedside and read to her from a nature encyclopedia — not because Grandma asked, but because Mei did not know what else to offer. Grandma rarely spoke during these visits, but her eyes followed the words. On the last day before discharge, she held Mei's hand and said, \"You have a kind voice.\" Mei had never thought of a voice as something that could be kind. After that, Mei never spoke carelessly again.","zh":"在五年級的春天，Mei的奶奶住院了一個月。每天放學後，Mei坐在她的床邊，從一本自然百科全書讀給她聽——不是因為奶奶要求，而是因為Mei不知道還能給予什麼。奶奶在這些探訪中很少說話，但她的眼睛跟著文字走。出院前的最後一天，她握著Mei的手說：「你有一把善良的聲音。」Mei從未想過聲音也可以是善良的。此後，Mei再也沒有輕率地說話。"},{"title":"#59","vocab":["custodian","sunrise","admired","crooked","straightened"],"en":"The class was assigned to write a one-page essay about a person they admired. Most students chose athletes or celebrities. Ben chose the school custodian, Mr. Lin, who arrived before sunrise every day, fixed broken things quietly, and left after sunset. Ben spent a week following Mr. Lin's schedule and taking notes. The essay described small moments: the way he straightened a crooked picture frame, the way he swept the steps in the rain. The teacher read it aloud without saying whose it was. The class was very quiet at the end.","zh":"班上被要求寫一篇關於他們欽佩的人的一頁短文。大多數學生選擇了運動員或名人。Ben選擇了學校的管理員林先生，他每天日出前到達，靜靜地修好壞掉的東西，日落後才離開。Ben花了一週時間跟著林先生的行程並記筆記。文章描述了細小的時刻：他把歪斜的相框扶正的方式，他在雨中打掃台階的方式。老師沒有說是誰寫的就大聲朗讀了它。班上在最後非常安靜。"},{"title":"#60","vocab":["notebook","poems","hesitated","silently","audience"],"en":"Zoe had kept a secret for three years: a small notebook filled with poems written in both Chinese and English. No one had ever read them. One afternoon, Zoe's English teacher asked students to bring in a piece of their own writing. Zoe hesitated at home that evening, then packed the notebook. The teacher read one poem silently, then looked up and said, \"May I share this with the class?\" Zoe nodded. The room was very still when the last line was read. Afterward, three classmates quietly asked Zoe to write something for them. Some things find their audience when the time is right.","zh":"Zoe保守了一個秘密三年：一個裝滿中英雙語詩歌的小筆記本。從未有人讀過它們。一天下午，Zoe的英語老師請學生帶來自己的一篇文章。Zoe那天晚上在家猶豫了，然後把筆記本裝進了包。老師默默地讀了一首詩，然後抬起頭說：「我可以和班上分享嗎？」Zoe點了點頭。最後一行被讀出時，教室非常安靜。事後，三個同學悄悄地請Zoe為他們寫點什麼。有些東西在時機成熟時自然會找到它的讀者。"},{"title":"#61","vocab":["debate","technology","opposing","isolated","margin"],"en":"Last spring, Jack's school sent five students to a regional debate competition in Kenting. Jack was one of them. The topic was whether technology does more harm than good. Jack's team argued in favor of technology, using examples from medicine, education, and communication. The opposing team was strong and well-prepared. During the final round, Jack made an unexpected point about how technology helped isolated communities during natural disasters. The judges nodded. Jack's team won by a narrow margin. But more than the trophy, Jack carried home the lesson that a single, well-timed idea can change the direction of an entire argument.","zh":"去年春天，Jack的學校選送了五名學生去Kenting參加地區辯論比賽。Jack是其中之一。主題是科技是否弊大於利。Jack的隊伍支持科技，以醫學、教育和通訊為例。對方隊伍強大且準備充分。在最後一輪，Jack提出了一個意想不到的論點：科技如何在自然災害中幫助了孤立的社區。評審點頭。Jack的隊伍以微弱優勢獲勝。但比起獎盃，Jack更帶回了一個教訓：一個時機恰當的想法，可以改變整個論點的走向。"},{"title":"#62","vocab":["volunteered","restless","distracted","satisfaction","borrowed"],"en":"During the summer holiday, Nina volunteered at a community library in Jiufen that served children from low-income families. Nina's job was to run a reading hour every Tuesday and Thursday. At first, the children were restless and distracted. Nina tried reading in different voices, using props, and asking questions. Slowly, the children began to lean in. One boy, who had never checked out a book before, borrowed three on the last day. Nina walked home that evening feeling something that no exam score had ever produced — a deep, quiet satisfaction that good work had been done.","zh":"暑假期間，Nina在Jiufen一個服務低收入家庭兒童的社區圖書館當義工。Nina的任務是每週二和週四主持閱讀時間。起初，孩子們坐立不安、心不在焉。Nina嘗試用不同的聲音朗讀，使用道具，並提問。慢慢地，孩子們開始靠近了。一個從未借過書的男孩在最後一天借了三本。Nina那天晚上走回家，感受到了任何考試成績都無法帶來的東西——一種深沉、安靜的滿足感，因為做了一件好事。"},{"title":"#63","vocab":["terrifying","hesitated","directions","connected","strangers"],"en":"Ruby had been studying English for six years, but speaking to a native speaker still felt terrifying. That changed one afternoon when a tourist in Sun Moon Lake asked Ruby for directions to the train station. Ruby hesitated, then took a breath and answered slowly but clearly. The tourist smiled and said, \"Your English is great!\" Ruby knew that wasn't entirely true — but it didn't matter. In that moment, language had stopped being a subject on a test and had become something alive, something that connected two strangers in the middle of a busy street.","zh":"Ruby學英文已經六年了，但和母語使用者說話仍然讓人感到害怕。一天下午，在Sun Moon Lake的一位遊客問Ruby去火車站怎麼走，這一切都改變了。Ruby猶豫了一下，然後深吸一口氣，慢慢但清楚地回答了。遊客微笑說：「你的英文很好！」Ruby知道這並不完全正確——但這並不重要。在那一刻，語言不再是考試的科目，而是成了有生命的東西，讓兩個陌生人在繁忙的街道中間相連。"},{"title":"#64","vocab":["interview","occupation","economic","decades","conclusion"],"en":"For the fifth-grade graduation project, each student had to interview someone in their community and write a report. Kai chose to interview the oldest resident of the neighborhood — a ninety-two-year-old woman who had lived through the Japanese occupation, the post-war years, and Taiwan's rapid economic growth. She spoke quietly, but every sentence carried the weight of decades. Kai listened for three hours and took careful notes. The final report moved the teacher to tears. \"History,\" Kai wrote in the conclusion, \"is not dates in a textbook. It is the memory inside a living person.\"","zh":"為了五年級的畢業專題，每個學生必須採訪社區裡的一個人並寫一份報告。Kai選擇採訪了鄰里中最年長的居民——一位九十二歲的老太太，她經歷了日本殖民統治、戰後歲月和台灣的快速經濟成長。她說話輕聲細語，但每一句話都承載著數十年的分量。Kai聽了三個小時，認真地記了筆記。最終的報告讓老師感動落淚。「歷史，」Kai在結論中寫道，「不是課本上的日期，而是活著的人心中的記憶。」"},{"title":"#65","vocab":["streetlight","disappeared","darkness","deserved","private"],"en":"One night, Tom woke up at two in the morning with a strange feeling. Something outside was moving. Tom looked out the window and saw a fox sitting very still in the pale glow of a streetlight. Neither of them moved for a long time. Then the fox turned and disappeared into the darkness. Tom sat there for an hour, unable to sleep, not wanting to. Some moments, Tom thought, deserve to be felt completely before you let them go. Tom wrote about it the next morning and kept the entry private for years.","zh":"一天夜裡，Tom在凌晨兩點帶著奇怪的感覺醒來。外面有什麼東西在動。Tom望向窗外，看到一隻狐狸在路燈蒼白的光芒中一動不動地坐著。他們兩個都靜靜地待了很長時間。然後狐狸轉身，消失在黑暗中。Tom在那裡坐了一個小時，睡不著，也不想睡著。有些時刻，Tom想，值得在你放手之前完全地感受。Tom第二天早上把它寫了下來，這篇日記保密了很多年。"},{"title":"#66","vocab":["announced","script","revising","performance","communicate"],"en":"When the English teacher announced that the class would perform an original play in English at the end of term, panic spread through the room. Lily was chosen to write the script. It was the most difficult writing task Lily had ever faced — every word had to carry meaning, every scene had to move the story forward. Lily spent three weeks revising and revising. On the night of the performance, when the audience laughed at the right moments and fell silent at the right moments, Lily understood for the first time what it truly means to communicate across a language.","zh":"當英語老師宣布班上學期末將用英文演出一齣原創劇時，恐慌在教室裡蔓延開來。Lily被選中來寫劇本。這是Lily面對過的最困難的寫作任務——每個詞都必須承載意義，每個場景都必須推動故事前進。Lily花了三週時間一遍又一遍地修改。表演當晚，當觀眾在對的時刻笑，在對的時刻沉默，Lily第一次真正理解了什麼叫做跨越語言的溝通。"},{"title":"#67","vocab":["competition","marine","pollution","exhibition","officials"],"en":"Max and two classmates entered a national environmental poster competition. Their design showed a sea turtle tangled in plastic waste, with the words: \"This is not their ocean anymore.\" They worked on it for a month, researching facts about marine pollution and testing different visual approaches. The poster was selected as one of the top twenty nationwide. It was displayed at an exhibition in Tainan where government officials saw it. One official stopped and took a photograph. Max never found out what happened next, but felt certain that the image had traveled further than they had.","zh":"Max和兩個同學參加了全國環保海報比賽。他們的設計展示了一隻被塑膠廢物纏住的海龜，配上文字：「這片海洋不再屬於他們了。」他們為此工作了一個月，研究海洋汙染的事實，並測試了不同的視覺方法。海報被選為全國前二十名之一，在Tainan的一個展覽中展出，政府官員看到了它。一位官員停下來拍了照片。Max從未知道接下來發生了什麼，但確信那張圖像比他們自己走得更遠。"},{"title":"#68","vocab":["hospitalized","bedside","encyclopedia","discharge","carelessly"],"en":"In the spring of fifth grade, Mia's grandmother was hospitalized for a month. Every day after school, Mia sat by her bedside and read to her from a nature encyclopedia — not because Grandma asked, but because Mia did not know what else to offer. Grandma rarely spoke during these visits, but her eyes followed the words. On th er still felt terrifying. That changed one afternoon when a tourist in Kenting asked Leo for directions to the train station. Leo hesitated, then took a breath and answered slowly but clearly. The tourist smiled and said, \"Your English is great!\" Leo knew that wasn't entirely true — but it didn't matter. In that moment, language had stopped being a subject on a test and had become something alive, something that connected two strangers in the middle of a busy street.","zh":"Leo學英文已經六年了，但和母語使用者說話仍然讓人感到害怕。一天下午，在Kenting的一位遊客問Leo去火車站怎麼走，這一切都改變了。Leo猶豫了一下，然後深吸一口氣，慢慢但清楚地回答了。遊客微笑說：「你的英文很好！」Leo知道這並不完全正確——但這並不重要。在那一刻，語言不再是考試的科目，而是成了有生命的東西，讓兩個陌生人在繁忙的街道中間相連。"},{"title":"#74","vocab":["interview","occupation","economic","decades","conclusion"],"en":"For the fifth-grade graduation project, each student had to interview someone in their community and write a report. Emma chose to interview the oldest resident of the neighborhood — a ninety-two-year-old woman who had lived through the Japanese occupation, the post-war years, and Taiwan's rapid economic growth. She spoke quietly, but every sentence carried the weight of decades. Emma listened for three hours and took careful notes. The final report moved the teacher to tears. \"History,\" Emma wrote in the conclusion, \"is not dates in a textbook. It is the memory inside a living person.\"","zh":"為了五年級的畢業專題，每個學生必須採訪社區裡的一個人並寫一份報告。Emma選擇採訪了鄰里中最年長的居民——一位九十二歲的老太太，她經歷了日本殖民統治、戰後歲月和台灣的快速經濟成長。她說話輕聲細語，但每一句話都承載著數十年的分量。Emma聽了三個小時，認真地記了筆記。最終的報告讓老師感動落淚。「歷史，」Emma在結論中寫道，「不是課本上的日期，而是活著的人心中的記憶。」"},{"title":"#75","vocab":["streetlight","disappeared","darkness","deserved","private"],"en":"One night, Sam woke up at two in the morning with a strange feeling. Something outside was moving. Sam looked out the window and saw a fox sitting very still in the pale glow of a streetlight. Neither of them moved for a long time. Then the fox turned and disappeared into the darkness. Sam sat there for an hour, unable to sleep, not wanting to. Some moments, Sam thought, deserve to be felt completely before you let them go. Sam wrote about it the next morning and kept the entry private for years.","zh":"一天夜裡，Sam在凌晨兩點帶著奇怪的感覺醒來。外面有什麼東西在動。Sam望向窗外，看到一隻狐狸在路燈蒼白的光芒中一動不動地坐著。他們兩個都靜靜地待了很長時間。然後狐狸轉身，消失在黑暗中。Sam在那裡坐了一個小時，睡不著，也不想睡著。有些時刻，Sam想，值得在你放手之前完全地感受。Sam第二天早上把它寫了下來，這篇日記保密了很多年。"},{"title":"#76","vocab":["announced","script","revising","performance","communicate"],"en":"When the English teacher announced that the class would perform an original play in English at the end of term, panic spread through the room. Coco was chosen to write the script. It was the most difficult writing task Coco had ever faced — every word had to carry meaning, every scene had to move the story forward. Coco spent three weeks revising and revising. On the night of the performance, when the audience laughed at the right moments and fell silent at the right moments, Coco understood for the first time what it truly means to communicate across a language.","zh":"當英語老師宣布班上學期末將用英文演出一齣原創劇時，恐慌在教室裡蔓延開來。Coco被選中來寫劇本。這是Coco面對過的最困難的寫作任務——每個詞都必須承載意義，每個場景都必須推動故事前進。Coco花了三週時間一遍又一遍地修改。表演當晚，當觀眾在對的時刻笑，在對的時刻沉默，Coco第一次真正理解了什麼叫做跨越語言的溝通。"},{"title":"#77","vocab":["competition","marine","pollution","exhibition","officials"],"en":"Tim and two classmates entered a national environmental poster competition. Their design showed a sea turtle tangled in plastic waste, with the words: \"This is not their ocean anymore.\" They worked on it for a month, researching facts about marine pollution and testing different visual approaches. The poster was selected as one of the top twenty nationwide. It was displayed at an exhibition in Taichung where government officials saw it. One official stopped and took a photograph. Tim never found out what happened next, but felt certain that the image had traveled further than they had.","zh":"Tim和兩個同學參加了全國環保海報比賽。他們的設計展示了一隻被塑膠廢物纏住的海龜，配上文字：「這片海洋不再屬於他們了。」他們為此工作了一個月，研究海洋汙染的事實，並測試了不同的視覺方法。海報被選為全國前二十名之一，在Taichung的一個展覽中展出，政府官員看到了它。一位官員停下來拍了照片。Tim從未知道接下來發生了什麼，但確信那張圖像比他們自己走得更遠。"},{"title":"#78","vocab":["hospitalized","bedside","encyclopedia","discharge","carelessly"],"en":"In the spring of fifth grade, Mei's grandmother was hospitalized for a month. Every day after school, Mei sat by her bedside and read to her from a nature encyclopedia — not because Grandma asked, but because Mei did not know what else to offer. Grandma rarely spoke during these visits, but her eyes followed the words. On the last day before discharge, she held Mei's hand and said, \"You have a kind voice.\" Mei had never thought of a voice as something that could be kind. After that, Mei never spoke carelessly again.","zh":"在五年級的春天，Mei的奶奶住院了一個月。每天放學後，Mei坐在她的床邊，從一本自然百科全書讀給她聽——不是因為奶奶要求，而是因為Mei不知道還能給予什麼。奶奶在這些探訪中很少說話，但她的眼睛跟著文字走。出院前的最後一天，她握著Mei的手說：「你有一把善良的聲音。」Mei從未想過聲音也可以是善良的。此後，Mei再也沒有輕率地說話。"},{"title":"#79","vocab":["custodian","sunrise","admired","crooked","straightened"],"en":"The class was assigned to write a one-page essay about a person they admired. Most students chose athletes or celebrities. Ben chose the school custodian, Mr. Lin, who arrived before sunrise every day, fixed broken things quietly, and left after sunset. Ben spent a week following Mr. Lin's schedule and taking notes. The essay described small moments: the way he straightened a crooked picture frame, the way he swept the steps in the rain. The teacher read it aloud without saying whose it was. The class was very quiet at the end.","zh":"班上被要求寫一篇關於他們欽佩的人的一頁短文。大多數學生選擇了運動員或名人。Ben選擇了學校的管理員林先生，他每天日出前到達，靜靜地修好壞掉的東西，日落後才離開。Ben花了一週時間跟著林先生的行程並記筆記。文章描述了細小的時刻：他把歪斜的相框扶正的方式，他在雨中打掃台階的方式。老師沒有說是誰寫的就大聲朗讀了它。班上在最後非常安靜。"},{"title":"#80","vocab":["notebook","poems","hesitated","silently","audience"],"en":"Zoe had kept a secret for three years: a small notebook filled with poems written in both Chinese and English. No one had ever read them. One afternoon, Zoe's English teacher asked students to bring in a piece of their own writing. Zoe hesitated at home that evening, then packed the notebook. The teacher read one poem silently, then looked up and said, \"May I share this with the class?\" Zoe nodded. The room was very still when the last line was read. Afterward, three classmates quietly asked Zoe to write something for them. Some things find their audience when the time is right.","zh":"Zoe保守了一個秘密三年：一個裝滿中英雙語詩歌的小筆記本。從未有人讀過它們。一天下午，Zoe的英語老師請學生帶來自己的一篇文章。Zoe那天晚上在家猶豫了，然後把筆記本裝進了包。老師默默地讀了一首詩，然後抬起頭說：「我可以和班上分享嗎？」Zoe點了點頭。最後一行被讀出時，教室非常安靜。事後，三個同學悄悄地請Zoe為他們寫點什麼。有些東西在時機成熟時自然會找到它的讀者。"},{"title":"#81","vocab":["debate","technology","opposing","isolated","margin"],"en":"Last spring, Jack's school sent five students to a regional debate competition in Alishan. Jack was one of them. The topic was whether technology does more harm than good. Jack's team argued in favor of technology, using examples from medicine, education, and communication. The opposing team was strong and well-prepared. During the final round, Jack made an unexpected point about how technology helped isolated communities during natural disasters. The judges nodded. Jack's team won by a narrow margin. But more than the trophy, Jack carried home the lesson that a single, well-timed idea can change the direction of an entire argument.","zh":"去年春天，Jack的學校選送了五名學生去Alishan參加地區辯論比賽。Jack是其中之一。主題是科技是否弊大於利。Jack的隊伍支持科技，以醫學、教育和通訊為例。對方隊伍強大且準備充分。在最後一輪，Jack提出了一個意想不到的論點：科技如何在自然災害中幫助了孤立的社區。評審點頭。Jack的隊伍以微弱優勢獲勝。但比起獎盃，Jack更帶回了一個教訓：一個時機恰當的想法，可以改變整個論點的走向。"},{"title":"#82","vocab":["volunteered","restless","distracted","satisfaction","borrowed"],"en":"During the summer holiday, Nina volunteered at a community library in Penghu that served children from low-income families. Nina's job was to run a reading hour every Tuesday and Thursday. At first, the children were restless and distracted. Nina tried reading in different voices, using props, and asking questions. Slowly, the children began to lean in. One boy, who had never checked out a book before, borrowed three on the last day. Nina walked home that evening feeling something that no exam cted as one of the top twenty nationwide. It was displayed at an exhibition in Sun Moon Lake where government officials saw it. One official stopped and took a photograph. Max never found out what happened next, but felt certain that the image had traveled further than they had.","zh":"Max和兩個同學參加了全國環保海報比賽。他們的設計展示了一隻被塑膠廢物纏住的海龜，配上文字：「這片海洋不再屬於他們了。」他們為此工作了一個月，研究海洋汙染的事實，並測試了不同的視覺方法。海報被選為全國前二十名之一，在Sun Moon Lake的一個展覽中展出，政府官員看到了它。一位官員停下來拍了照片。Max從未知道接下來發生了什麼，但確信那張圖像比他們自己走得更遠。"},{"title":"#88","vocab":["hospitalized","bedside","encyclopedia","discharge","carelessly"],"en":"In the spring of fifth grade, Mia's grandmother was hospitalized for a month. Every day after school, Mia sat by her bedside and read to her from a nature encyclopedia — not because Grandma asked, but because Mia did not know what else to offer. Grandma rarely spoke during these visits, but her eyes followed the words. On the last day before discharge, she held Mia's hand and said, \"You have a kind voice.\" Mia had never thought of a voice as something that could be kind. After that, Mia never spoke carelessly again.","zh":"在五年級的春天，Mia的奶奶住院了一個月。每天放學後，Mia坐在她的床邊，從一本自然百科全書讀給她聽——不是因為奶奶要求，而是因為Mia不知道還能給予什麼。奶奶在這些探訪中很少說話，但她的眼睛跟著文字走。出院前的最後一天，她握著Mia的手說：「你有一把善良的聲音。」Mia從未想過聲音也可以是善良的。此後，Mia再也沒有輕率地說話。"},{"title":"#89","vocab":["custodian","sunrise","admired","crooked","straightened"],"en":"The class was assigned to write a one-page essay about a person they admired. Most students chose athletes or celebrities. Alex chose the school custodian, Mr. Lin, who arrived before sunrise every day, fixed broken things quietly, and left after sunset. Alex spent a week following Mr. Lin's schedule and taking notes. The essay described small moments: the way he straightened a crooked picture frame, the way he swept the steps in the rain. The teacher read it aloud without saying whose it was. The class was very quiet at the end.","zh":"班上被要求寫一篇關於他們欽佩的人的一頁短文。大多數學生選擇了運動員或名人。Alex選擇了學校的管理員林先生，他每天日出前到達，靜靜地修好壞掉的東西，日落後才離開。Alex花了一週時間跟著林先生的行程並記筆記。文章描述了細小的時刻：他把歪斜的相框扶正的方式，他在雨中打掃台階的方式。老師沒有說是誰寫的就大聲朗讀了它。班上在最後非常安靜。"},{"title":"#90","vocab":["notebook","poems","hesitated","silently","audience"],"en":"Anna had kept a secret for three years: a small notebook filled with poems written in both Chinese and English. No one had ever read them. One afternoon, Anna's English teacher asked students to bring in a piece of their own writing. Anna hesitated at home that evening, then packed the notebook. The teacher read one poem silently, then looked up and said, \"May I share this with the class?\" Anna nodded. The room was very still when the last line was read. Afterward, three classmates quietly asked Anna to write something for them. Some things find their audience when the time is right.","zh":"Anna保守了一個秘密三年：一個裝滿中英雙語詩歌的小筆記本。從未有人讀過它們。一天下午，Anna的英語老師請學生帶來自己的一篇文章。Anna那天晚上在家猶豫了，然後把筆記本裝進了包。老師默默地讀了一首詩，然後抬起頭說：「我可以和班上分享嗎？」Anna點了點頭。最後一行被讀出時，教室非常安靜。事後，三個同學悄悄地請Anna為他們寫點什麼。有些東西在時機成熟時自然會找到它的讀者。"},{"title":"#91","vocab":["debate","technology","opposing","isolated","margin"],"en":"Last spring, Ren's school sent five students to a regional debate competition in Tainan. Ren was one of them. The topic was whether technology does more harm than good. Ren's team argued in favor of technology, using examples from medicine, education, and communication. The opposing team was strong and well-prepared. During the final round, Ren made an unexpected point about how technology helped isolated communities during natural disasters. The judges nodded. Ren's team won by a narrow margin. But more than the trophy, Ren carried home the lesson that a single, well-timed idea can change the direction of an entire argument.","zh":"去年春天，Ren的學校選送了五名學生去Tainan參加地區辯論比賽。Ren是其中之一。主題是科技是否弊大於利。Ren的隊伍支持科技，以醫學、教育和通訊為例。對方隊伍強大且準備充分。在最後一輪，Ren提出了一個意想不到的論點：科技如何在自然災害中幫助了孤立的社區。評審點頭。Ren的隊伍以微弱優勢獲勝。但比起獎盃，Ren更帶回了一個教訓：一個時機恰當的想法，可以改變整個論點的走向。"},{"title":"#92","vocab":["volunteered","restless","distracted","satisfaction","borrowed"],"en":"During the summer holiday, Amy volunteered at a community library in Taipei that served children from low-income families. Amy's job was to run a reading hour every Tuesday and Thursday. At first, the children were restless and distracted. Amy tried reading in different voices, using props, and asking questions. Slowly, the children began to lean in. One boy, who had never checked out a book before, borrowed three on the last day. Amy walked home that evening feeling something that no exam score had ever produced — a deep, quiet satisfaction that good work had been done.","zh":"暑假期間，Amy在Taipei一個服務低收入家庭兒童的社區圖書館當義工。Amy的任務是每週二和週四主持閱讀時間。起初，孩子們坐立不安、心不在焉。Amy嘗試用不同的聲音朗讀，使用道具，並提問。慢慢地，孩子們開始靠近了。一個從未借過書的男孩在最後一天借了三本。Amy那天晚上走回家，感受到了任何考試成績都無法帶來的東西——一種深沉、安靜的滿足感，因為做了一件好事。"},{"title":"#93","vocab":["terrifying","hesitated","directions","connected","strangers"],"en":"Leo had been studying English for six years, but speaking to a native speaker still felt terrifying. That changed one afternoon when a tourist in Alishan asked Leo for directions to the train station. Leo hesitated, then took a breath and answered slowly but clearly. The tourist smiled and said, \"Your English is great!\" Leo knew that wasn't entirely true — but it didn't matter. In that moment, language had stopped being a subject on a test and had become something alive, something that connected two strangers in the middle of a busy street.","zh":"Leo學英文已經六年了，但和母語使用者說話仍然讓人感到害怕。一天下午，在Alishan的一位遊客問Leo去火車站怎麼走，這一切都改變了。Leo猶豫了一下，然後深吸一口氣，慢慢但清楚地回答了。遊客微笑說：「你的英文很好！」Leo知道這並不完全正確——但這並不重要。在那一刻，語言不再是考試的科目，而是成了有生命的東西，讓兩個陌生人在繁忙的街道中間相連。"},{"title":"#94","vocab":["interview","occupation","economic","decades","conclusion"],"en":"For the fifth-grade graduation project, each student had to interview someone in their community and write a report. Emma chose to interview the oldest resident of the neighborhood — a ninety-two-year-old woman who had lived through the Japanese occupation, the post-war years, and Taiwan's rapid economic growth. She spoke quietly, but every sentence carried the weight of decades. Emma listened for three hours and took careful notes. The final report moved the teacher to tears. \"History,\" Emma wrote in the conclusion, \"is not dates in a textbook. It is the memory inside a living person.\"","zh":"為了五年級的畢業專題，每個學生必須採訪社區裡的一個人並寫一份報告。Emma選擇採訪了鄰里中最年長的居民——一位九十二歲的老太太，她經歷了日本殖民統治、戰後歲月和台灣的快速經濟成長。她說話輕聲細語，但每一句話都承載著數十年的分量。Emma聽了三個小時，認真地記了筆記。最終的報告讓老師感動落淚。「歷史，」Emma在結論中寫道，「不是課本上的日期，而是活著的人心中的記憶。」"},{"title":"#95","vocab":["streetlight","disappeared","darkness","deserved","private"],"en":"One night, Sam woke up at two in the morning with a strange feeling. Something outside was moving. Sam looked out the window and saw a fox sitting very still in the pale glow of a streetlight. Neither of them moved for a long time. Then the fox turned and disappeared into the darkness. Sam sat there for an hour, unable to sleep, not wanting to. Some moments, Sam thought, deserve to be felt completely before you let them go. Sam wrote about it the next morning and kept the entry private for years.","zh":"一天夜裡，Sam在凌晨兩點帶著奇怪的感覺醒來。外面有什麼東西在動。Sam望向窗外，看到一隻狐狸在路燈蒼白的光芒中一動不動地坐著。他們兩個都靜靜地待了很長時間。然後狐狸轉身，消失在黑暗中。Sam在那裡坐了一個小時，睡不著，也不想睡著。有些時刻，Sam想，值得在你放手之前完全地感受。Sam第二天早上把它寫了下來，這篇日記保密了很多年。"},{"title":"#96","vocab":["announced","script","revising","performance","communicate"],"en":"When the English teacher announced that the class would perform an original play in English at the end of term, panic spread through the room. Coco was chosen to write the script. It was the most difficult writing task Coco had ever faced — every word had to carry meaning, every scene had to move the story forward. Coco spent three weeks revising and revising. On the night of the performance, when the audience laughed at the right moments and fell silent at the right moments, Coco understood for the first time what it truly means to communicate across a language.","zh":"當英語老師宣布班上學期末將用英文演出一齣原創劇時，恐慌在教室裡蔓延開來。Coco被選中來寫劇本。這是Coco面對過的最困難的寫作任務——每個詞都必須承載意義，每個場景都必須推動故事前進。Coco花了三週時間一遍又一遍地修改。表演當晚，當觀眾在對的時刻
