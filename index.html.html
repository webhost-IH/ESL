ed to. The hardest one to write was to the English teacher, Mr. Chen. He had never given Kai top marks, but had left comments like \"almost\" and \"try again\" on every paper. At first those words had felt unkind. Now, looking back, Kai realized those two words had done more for Kai's English than any perfect score ever could have. The letter took four drafts to get right. Mr. Chen read it twice in the staffroom and folded it carefully into his jacket pocket. Kai never saw him read it, but heard from a classmate who had. Some things are better received without a witness.","zh":"Kai在小學的最後一個月花時間給每一位老師寫信——不是因為被要求，而是因為Kai想這樣做。最難寫的是給英語老師陳老師的信。他從未給過Kai最高分，但在每份作業上留下「幾乎了」和「再試試」這樣的評語。起初，這些話感覺不親切。現在回想起來，Kai意識到這兩個詞對Kai的英文的幫助，比任何完美分數都要多。這封信花了四稿才寫好。陳老師在教職員室讀了兩遍，小心地把它折起來放進了夾克口袋。Kai從未親眼看到他讀它，但從一個同學那裡聽說了。有些事在沒有見證者的情況下被接受，是更好的。"},{"title":"#56","vocab":["capsule","ceremony","archive","accurate","document"],"en":"A week before graduation, Tom's class held a time capsule ceremony. Each student placed an object inside a wooden box that would be sealed and stored in the school's archive for twenty years. Tom chose to put in a hand-drawn map of the school — not how it looked officially, but how Tom had experienced it: the corner near the water fountain where secrets were told, the classroom window that faced the mountains, the small garden no one was supposed to enter but everyone had. The map was not accurate. It was true. When the lid was hammered shut, Tom thought: in twenty years, whoever opens this will find not a document but a feeling — and that, Tom decided, was the most honest thing a person can leave behind.","zh":"畢業前一週，Tom的班舉行了時光膠囊典禮。每個學生把一件物品放入一個木箱，這個木箱將被密封，在學校的檔案館保存二十年。Tom選擇放入一張手繪的學校地圖——不是官方的樣子，而是Tom所體驗的：飲水機旁分享秘密的角落，朝著山脈的教室窗戶，那個不允許任何人進入但所有人都進過的小花園。這張地圖並不準確，但它是真實的。當蓋子被鎚下去時，Tom想：二十年後，打開這個的人會找到的不是一份文件，而是一種感覺——而Tom決定，這是一個人能留下的最誠實的東西。"},{"title":"#57","vocab":["workbooks","handwriting","unsteady","certain","distance"],"en":"The night before the last day of school, Lily could not sleep. Not from excitement, but from a strange quiet feeling that was hard to name. Lily got up and walked to the desk where all the old workbooks were stacked. Grade one, grade two, all the way to grade six. Lily opened the grade one book and looked at the handwriting inside — round, unsteady letters, pressing too hard on the pencil. Then Lily opened the grade six book and saw the handwriting there: lighter, faster, more certain. It was still the same hand. But the distance between those two pages felt like a country Lily had crossed without a map, one small step at a time, and had somehow arrived.","zh":"上學最後一天的前一晚，Lily睡不著。不是因為興奮，而是一種難以命名的奇怪平靜感。Lily起身走到桌旁，那裡疊放著所有的舊作業本。一年級、二年級，一直到六年級。Lily打開一年級的作業本，看著裡面的字跡——圓潤、不穩定的字母，鉛筆按得太用力。然後Lily打開六年級的作業本，看著那裡的字跡：更輕、更快、更確定。還是同一雙手。但那兩頁之間的距離感覺像是Lily在沒有地圖的情況下橫跨過的一個國家，每次一小步，卻不知怎麼地到達了。"},{"title":"#58","vocab":["assigned","community","presence","ritual","elderly"],"en":"Two months before graduation, Max was assigned a community service project. Most students chose something organized and safe. Max chose to spend twelve Saturday mornings at a care home for the elderly in Taichung. The first visit was awkward — Max did not know what to say or do. An old woman named Mrs. Huang asked Max to sit and simply stay. \"Old people don't need activity,\" she said. \"We need presence.\" Max came back the next Saturday, and the next. By the final visit, Max and Mrs. Huang had developed a ritual: Max would read the weather report aloud, and she would say whether she believed it. It was a small ritual. It was also, Max understood by then, a form of love.","zh":"畢業前兩個月，Max被分配了一個社區服務專題。大多數學生選擇了有組織且安全的事情。Max選擇在Taichung的一家老人護理院度過十二個星期六的早晨。第一次拜訪很尷尬——Max不知道說什麼或做什麼。一位名叫黃奶奶的老太太請Max坐下，只要陪著就好。「老人不需要活動，」她說。「我們需要陪伴。」Max下個星期六又回來了，然後又回來了。到最後一次拜訪時，Max和黃奶奶建立了一個習慣：Max大聲讀天氣預報，她說她是否相信。這是個小習慣。但到那時Max明白了，這也是一種愛的形式。"},{"title":"#59","vocab":["unusual","immigrated","conclusion","interview","assignment"],"en":"Near the end of sixth grade, Mia's teacher gave the class an unusual assignment: interview someone who had done something they were afraid to do, and write about what they learned. Mia chose to interview a neighbor who had immigrated to Taiwan from Vietnam twenty years ago, speaking no Chinese and knowing no one. The neighbor described arriving at the airport with one bag and an address written on a piece of paper. \"Were you afraid?\" Mia asked. \"Completely,\" the neighbor said. \"And then I wasn't.\" Mia asked what had changed. The neighbor smiled: \"I just did the next thing. And then the next.\" Mia wrote those words at the top of the report and could not find a better conclusion. Sometimes the entire answer fits in one short sentence.","zh":"六年級快結束時，Mia的老師給班上布置了一項不尋常的作業：採訪一個做過他們害怕做的事情的人，並寫下他們學到了什麼。Mia選擇採訪了一個二十年前從越南移民到台灣的鄰居，當時他不會說中文，也不認識任何人。鄰居描述了帶著一個包和一張寫著地址的紙條到達機場的情景。「你害怕嗎？」Mia問。「非常害怕，」鄰居說。「然後我就不害怕了。」Mia問是什麼改變了。鄰居微笑：「我只是做了下一件事，然後再下一件。」Mia把這些話寫在報告的最上面，找不到更好的結語。有時候，整個答案只需要一個短句。"},{"title":"#60","vocab":["personally","paused","certain","weight","continued"],"en":"It was the last English class of elementary school. The teacher asked everyone to write one sentence — just one — that described what English meant to them personally. The room was quiet for a long time. Some students wrote about travel, some about music, some about games. Alex wrote: \"English is the door I didn't know I wanted to open until it was already open.\" The teacher read all the sentences without names. When she read Alex's, she paused for a moment before continuing. After class, she told Alex quietly, \"Keep writing.\" Alex did not know exactly what that meant yet. But walking out of the school for the last time, Alex felt the weight of those two words in a pocket, small and certain, like a key.","zh":"這是小學最後一堂英語課。老師請每個人寫一句話——只一句——描述英文對他們個人的意義。教室安靜了很長時間。有些學生寫了旅行，有些寫了音樂，有些寫了遊戲。Alex寫道：「英文是那扇我在打開之前不知道自己想打開的門。」老師沒有說名字就讀了所有的句子。當她讀到Alex的那句時，她停頓了一下才繼續。課後，她悄悄告訴Alex：「繼續寫。」Alex還不確切知道這是什麼意思。但最後一次走出學校時，Alex感受到那兩個字在口袋裡的重量，細小而確定，像一把鑰匙。"},{"title":"#61","vocab":["elementary","ordinary","shaping","significant","argument"],"en":"On the last day of elementary school, Anna sat alone in the classroom for a few minutes after everyone had left. Six years had passed in this room. Anna thought about the first day — the nervous feeling of not knowing anyone, the strange smell of new textbooks, the way the teacher had written everyone's name on the board in colored chalk. So much had changed since then. Anna had failed a math test, lost a best friend over a silly argument, cried during a school play, and laughed until tears came during a class trip. None of it had seemed significant at the time. But sitting there now in the quiet, Anna understood that each of those small, ordinary moments had been quietly shaping the person now walking out the door.","zh":"小學最後一天，Anna在所有人都離開後獨自在教室裡坐了幾分鐘。六年在這個房間裡過去了。Anna想起了第一天——不認識任何人的緊張感，新課本奇特的氣味，老師用彩色粉筆把每個人的名字寫在黑板上的樣子。從那以後一切都改變了太多。Anna數學考試不及格，為了一件蠢事失去了最好的朋友，在學校話劇中哭泣，在班級郊遊時笑到流淚。當時每一件事看起來都不重要。但現在坐在安靜中，Anna明白了，每一個細小而平凡的時刻都在悄悄地塑造著現在走出門的那個人。"},{"title":"#62","vocab":["ceremony","perseverance","obvious","principal","attention"],"en":"Three weeks before graduation, Ren was asked to write a speech for the ceremony. The topic was: what did elementary school teach you that cannot be found in a textbook? Ren stared at the blank page for a long time. The obvious answers — friendship, effort, perseverance — felt too simple. Ren thought about the afternoon when the whole class had stayed late to help a classmate finish a project. No one had been asked to stay. No one had been given extra marks for staying. They had simply stayed because it was the right thing to do. That was the story Ren told at the ceremony. When the speech ended, several parents were wiping their eyes. The principal whispered to the English teacher, \"Where did that come from?\" The teacher smiled and said, \"From six years of paying attention.\"","zh":"畢業前三週，Ren被要求為典禮寫一篇演講。主題是：小學教了你什麼是課本裡找不到的？Ren對著空白的紙盯了很長時間。顯而易見的答案——友誼、努力、堅持——感覺太簡單了。Ren想到了那個整個班留下來幫助 Taidong拜訪一個表親。旅程花了四小時。Leo帶了一本書，但始終沒有打開。相反，Leo看著窗外的風景變化——稻田讓位給山脈，山脈讓位給海岸。一位坐在旁邊的奶奶給Leo一片鳳梨酥，問：「你是要去某個地方，還是從某個地方回來？」Leo在接下來的旅程中一直在思考這個問題。「兩者都是，」Leo最後決定。「我想它永遠都是兩者。」這是Leo在一個星期二下午有過的最富哲理的感受。"},{"title":"#65","vocab":["assigned","staffroom","comments","witness","drafts"],"en":"Emma spent the last month of elementary school writing letters to each teacher — not because it was assigned, but because Emma wanted to. The hardest one to write was to the English teacher, Mr. Chen. He had never given Emma top marks, but had left comments like \"almost\" and \"try again\" on every paper. At first those words had felt unkind. Now, looking back, Emma realized those two words had done more for Emma's English than any perfect score ever could have. The letter took four drafts to get right. Mr. Chen read it twice in the staffroom and folded it carefully into his jacket pocket. Emma never saw him read it, but heard from a classmate who had. Some things are better received without a witness.","zh":"Emma在小學的最後一個月花時間給每一位老師寫信——不是因為被要求，而是因為Emma想這樣做。最難寫的是給英語老師陳老師的信。他從未給過Emma最高分，但在每份作業上留下「幾乎了」和「再試試」這樣的評語。起初，這些話感覺不親切。現在回想起來，Emma意識到這兩個詞對Emma的英文的幫助，比任何完美分數都要多。這封信花了四稿才寫好。陳老師在教職員室讀了兩遍，小心地把它折起來放進了夾克口袋。Emma從未親眼看到他讀它，但從一個同學那裡聽說了。有些事在沒有見證者的情況下被接受，是更好的。"},{"title":"#66","vocab":["capsule","ceremony","archive","accurate","document"],"en":"A week before graduation, Sam's class held a time capsule ceremony. Each student placed an object inside a wooden box that would be sealed and stored in the school's archive for twenty years. Sam chose to put in a hand-drawn map of the school — not how it looked officially, but how Sam had experienced it: the corner near the water fountain where secrets were told, the classroom window that faced the mountains, the small garden no one was supposed to enter but everyone had. The map was not accurate. It was true. When the lid was hammered shut, Sam thought: in twenty years, whoever opens this will find not a document but a feeling — and that, Sam decided, was the most honest thing a person can leave behind.","zh":"畢業前一週，Sam的班舉行了時光膠囊典禮。每個學生把一件物品放入一個木箱，這個木箱將被密封，在學校的檔案館保存二十年。Sam選擇放入一張手繪的學校地圖——不是官方的樣子，而是Sam所體驗的：飲水機旁分享秘密的角落，朝著山脈的教室窗戶，那個不允許任何人進入但所有人都進過的小花園。這張地圖並不準確，但它是真實的。當蓋子被鎚下去時，Sam想：二十年後，打開這個的人會找到的不是一份文件，而是一種感覺——而Sam決定，這是一個人能留下的最誠實的東西。"},{"title":"#67","vocab":["workbooks","handwriting","unsteady","certain","distance"],"en":"The night before the last day of school, Coco could not sleep. Not from excitement, but from a strange quiet feeling that was hard to name. Coco got up and walked to the desk where all the old workbooks were stacked. Grade one, grade two, all the way to grade six. Coco opened the grade one book and looked at the handwriting inside — round, unsteady letters, pressing too hard on the pencil. Then Coco opened the grade six book and saw the handwriting there: lighter, faster, more certain. It was still the same hand. But the distance between those two pages felt like a country Coco had crossed without a map, one small step at a time, and had somehow arrived.","zh":"上學最後一天的前一晚，Coco睡不著。不是因為興奮，而是一種難以命名的奇怪平靜感。Coco起身走到桌旁，那裡疊放著所有的舊作業本。一年級、二年級，一直到六年級。Coco打開一年級的作業本，看著裡面的字跡——圓潤、不穩定的字母，鉛筆按得太用力。然後Coco打開六年級的作業本，看著那裡的字跡：更輕、更快、更確定。還是同一雙手。但那兩頁之間的距離感覺像是Coco在沒有地圖的情況下橫跨過的一個國家，每次一小步，卻不知怎麼地到達了。"},{"title":"#68","vocab":["assigned","community","presence","ritual","elderly"],"en":"Two months before graduation, Tim was assigned a community service project. Most students chose something organized and safe. Tim chose to spend twelve Saturday mornings at a care home for the elderly in Sun Moon Lake. The first visit was awkward — Tim did not know what to say or do. An old woman named Mrs. Huang asked Tim to sit and simply stay. \"Old people don't need activity,\" she said. \"We need presence.\" Tim came back the next Saturday, and the next. By the final visit, Tim and Mrs. Huang had developed a ritual: Tim would read the weather report aloud, and she would say whether she believed it. It was a small ritual. It was also, Tim understood by then, a form of love.","zh":"畢業前兩個月，Tim被分配了一個社區服務專題。大多數學生選擇了有組織且安全的事情。Tim選擇在Sun Moon Lake的一家老人護理院度過十二個星期六的早晨。第一次拜訪很尷尬——Tim不知道說什麼或做什麼。一位名叫黃奶奶的老太太請Tim坐下，只要陪著就好。「老人不需要活動，」她說。「我們需要陪伴。」Tim下個星期六又回來了，然後又回來了。到最後一次拜訪時，Tim和黃奶奶建立了一個習慣：Tim大聲讀天氣預報，她說她是否相信。這是個小習慣。但到那時Tim明白了，這也是一種愛的形式。"},{"title":"#69","vocab":["unusual","immigrated","conclusion","interview","assignment"],"en":"Near the end of sixth grade, Mei's teacher gave the class an unusual assignment: interview someone who had done something they were afraid to do, and write about what they learned. Mei chose to interview a neighbor who had immigrated to Taiwan from Vietnam twenty years ago, speaking no Chinese and knowing no one. The neighbor described arriving at the airport with one bag and an address written on a piece of paper. \"Were you afraid?\" Mei asked. \"Completely,\" the neighbor said. \"And then I wasn't.\" Mei asked what had changed. The neighbor smiled: \"I just did the next thing. And then the next.\" Mei wrote those words at the top of the report and could not find a better conclusion. Sometimes the entire answer fits in one short sentence.","zh":"六年級快結束時，Mei的老師給班上布置了一項不尋常的作業：採訪一個做過他們害怕做的事情的人，並寫下他們學到了什麼。Mei選擇採訪了一個二十年前從越南移民到台灣的鄰居，當時他不會說中文，也不認識任何人。鄰居描述了帶著一個包和一張寫著地址的紙條到達機場的情景。「你害怕嗎？」Mei問。「非常害怕，」鄰居說。「然後我就不害怕了。」Mei問是什麼改變了。鄰居微笑：「我只是做了下一件事，然後再下一件。」Mei把這些話寫在報告的最上面，找不到更好的結語。有時候，整個答案只需要一個短句。"},{"title":"#70","vocab":["personally","paused","certain","weight","continued"],"en":"It was the last English class of elementary school. The teacher asked everyone to write one sentence — just one — that described what English meant to them personally. The room was quiet for a long time. Some students wrote about travel, some about music, some about games. Ben wrote: \"English is the door I didn't know I wanted to open until it was already open.\" The teacher read all the sentences without names. When she read Ben's, she paused for a moment before continuing. After class, she told Ben quietly, \"Keep writing.\" Ben did not know exactly what that meant yet. But walking out of the school for the last time, Ben felt the weight of those two words in a pocket, small and certain, like a key.","zh":"這是小學最後一堂英語課。老師請每個人寫一句話——只一句——描述英文對他們個人的意義。教室安靜了很長時間。有些學生寫了旅行，有些寫了音樂，有些寫了遊戲。Ben寫道：「英文是那扇我在打開之前不知道自己想打開的門。」老師沒有說名字就讀了所有的句子。當她讀到Ben的那句時，她停頓了一下才繼續。課後，她悄悄告訴Ben：「繼續寫。」Ben還不確切知道這是什麼意思。但最後一次走出學校時，Ben感受到那兩個字在口袋裡的重量，細小而確定，像一把鑰匙。"},{"title":"#71","vocab":["elementary","ordinary","shaping","significant","argument"],"en":"On the last day of elementary school, Zoe sat alone in the classroom for a few minutes after everyone had left. Six years had passed in this room. Zoe thought about the first day — the nervous feeling of not knowing anyone, the strange smell of new textbooks, the way the teacher had written everyone's name on the board in colored chalk. So much had changed since then. Zoe had failed a math test, lost a best friend over a silly argument, cried during a school play, and laughed until tears came during a class trip. None of it had seemed significant at the time. But sitting there now in the quiet, Zoe understood that each of those small, ordinary moments had been quietly shaping the person now walking out the door.","zh":"小學最後一天，Zoe在所有人都離開後獨自在教室裡坐了幾分鐘。六年在這個房間裡過去了。Zoe想起了第一天——不認識任何人的緊張感，新課本奇特的氣味，老師用彩色粉筆把每個人的名字寫在黑板上的樣子。從那以後一切都改變了太多。Zoe數學考試不及格，為了一件蠢事失去了最好的朋友，在學校話劇中哭泣，在班級郊遊時笑到流淚。當時每一件事看起來都不重要。但現在坐在安靜中，Zoe明白了，每一個細小而平凡的時刻都在悄悄地塑造著現在走出門的那個人。"},{"title":"#72","vocab":["ceremony","perseverance","obvious","principal","attention"],"en":"Three weeks before graduation, Jack was asked to write a speech for the ceremony. The topic was: what did elementary school teach you that cannot be found in a textbook? Jack stared at the blank page for a long time. The obvious answers — friendship, effort, perseverance — felt too simple. Jack thought about the afternoon when the whole class had stayed late to help a classmate finish a project. No one had been asked to stay. No one had been given extra marks for staying. They had simply stayed because it was the right thing to do. That was the story Jack told at the ceremony. When the speech ended, several parents were wiping their eyes. The principal whispered to the English teacher, \"Where did that come from?\" The teacher smiled and said, \"From six years of paying attention.\"","zh":"畢業前三週，Jack被要求為典禮寫一篇演講。主題是：小學教了你什麼是課本裡找不到的？Jack對著空白的紙盯了很長時間。顯而易見的答案——友誼、努力、堅持——感覺太簡單了。Jack想到了那個整個班留下來幫助一個同學完成專題的下午。沒有人被要求留下。沒有人因為留下而得到額外的分數。他們只是留了下來，因為這是對的事。這就是Jack在典禮上講述的故事。演講結束時，幾位家長在擦眼淚。校長悄聲對英語老師說：「這是哪裡來的？」老師微笑說：「來自六年的用心。」"},{"title":"#73","vocab":["organized","research","unexpected","hardship","lifetime"],"en":"In the final semester, the school organized a project called \"Roots.\" Each student had to research their family's history and present it to the class. Nina had always thought of family history as boring — dates and names on a page. But when Nina sat down with Grandpa and asked him about his childhood, something unexpected happened. Grandpa began to cry, quietly, while describing how he had walked three hours to school as a boy because there was no bus. \"We didn't think of it as hardship,\" Grandpa said. \"We just thought of it as morning.\" Nina wrote that sentence down immediately. At the presentation, Nina read it aloud. Several classmates asked if they could write it down too. Some truths, Nina discovered, are so simple that they take a lifetime to understand.","zh":"最後一學期，學校組織了一個名為「根」的專題。每個學生必須研究家族歷史並向全班展示。Nina一直認為家族歷史很無聊——紙上的日期和名字。但當Nina坐下來問爺爺他的童年時，出乎意料的事情發生了。爺爺開始默默地哭泣，描述他小時候因為沒有巴士而步行三個小時去上學的情況。「我們沒有把它當作艱辛，」爺爺說。「我們只是把它當作早晨。」Nina立刻把這句話寫了下來。在展示時，Nina大聲朗讀了它。幾個同學問他們是否也能把它寫下來。有些真理，Nina發現，是如此簡單，以至於需要一輩子才能理解。"},{"title":"#74","vocab":["landscape","philosophical","journey","pineapple","mountains"],"en":"The summer before junior high school, Ruby traveled alone on a train for the first time, visiting a cousin in Alishan. The journey took four hours. Ruby had brought a book but never opened it. Instead, Ruby watched the landscape change outside the wind w it looked officially, but how Tom had experienced it: the corner near the water fountain where secrets were told, the classroom window that faced the mountains, the small garden no one was supposed to enter but everyone had. The map was not accurate. It was true. When the lid was hammered shut, Tom thought: in twenty years, whoever opens this will find not a document but a feeling — and that, Tom decided, was the most honest thing a person can leave behind.","zh":"畢業前一週，Tom的班舉行了時光膠囊典禮。每個學生把一件物品放入一個木箱，這個木箱將被密封，在學校的檔案館保存二十年。Tom選擇放入一張手繪的學校地圖——不是官方的樣子，而是Tom所體驗的：飲水機旁分享秘密的角落，朝著山脈的教室窗戶，那個不允許任何人進入但所有人都進過的小花園。這張地圖並不準確，但它是真實的。當蓋子被鎚下去時，Tom想：二十年後，打開這個的人會找到的不是一份文件，而是一種感覺——而Tom決定，這是一個人能留下的最誠實的東西。"},{"title":"#77","vocab":["workbooks","handwriting","unsteady","certain","distance"],"en":"The night before the last day of school, Lily could not sleep. Not from excitement, but from a strange quiet feeling that was hard to name. Lily got up and walked to the desk where all the old workbooks were stacked. Grade one, grade two, all the way to grade six. Lily opened the grade one book and looked at the handwriting inside — round, unsteady letters, pressing too hard on the pencil. Then Lily opened the grade six book and saw the handwriting there: lighter, faster, more certain. It was still the same hand. But the distance between those two pages felt like a country Lily had crossed without a map, one small step at a time, and had somehow arrived.","zh":"上學最後一天的前一晚，Lily睡不著。不是因為興奮，而是一種難以命名的奇怪平靜感。Lily起身走到桌旁，那裡疊放著所有的舊作業本。一年級、二年級，一直到六年級。Lily打開一年級的作業本，看著裡面的字跡——圓潤、不穩定的字母，鉛筆按得太用力。然後Lily打開六年級的作業本，看著那裡的字跡：更輕、更快、更確定。還是同一雙手。但那兩頁之間的距離感覺像是Lily在沒有地圖的情況下橫跨過的一個國家，每次一小步，卻不知怎麼地到達了。"},{"title":"#78","vocab":["assigned","community","presence","ritual","elderly"],"en":"Two months before graduation, Max was assigned a community service project. Most students chose something organized and safe. Max chose to spend twelve Saturday mornings at a care home for the elderly in Kenting. The first visit was awkward — Max did not know what to say or do. An old woman named Mrs. Huang asked Max to sit and simply stay. \"Old people don't need activity,\" she said. \"We need presence.\" Max came back the next Saturday, and the next. By the final visit, Max and Mrs. Huang had developed a ritual: Max would read the weather report aloud, and she would say whether she believed it. It was a small ritual. It was also, Max understood by then, a form of love.","zh":"畢業前兩個月，Max被分配了一個社區服務專題。大多數學生選擇了有組織且安全的事情。Max選擇在Kenting的一家老人護理院度過十二個星期六的早晨。第一次拜訪很尷尬——Max不知道說什麼或做什麼。一位名叫黃奶奶的老太太請Max坐下，只要陪著就好。「老人不需要活動，」她說。「我們需要陪伴。」Max下個星期六又回來了，然後又回來了。到最後一次拜訪時，Max和黃奶奶建立了一個習慣：Max大聲讀天氣預報，她說她是否相信。這是個小習慣。但到那時Max明白了，這也是一種愛的形式。"},{"title":"#79","vocab":["unusual","immigrated","conclusion","interview","assignment"],"en":"Near the end of sixth grade, Mia's teacher gave the class an unusual assignment: interview someone who had done something they were afraid to do, and write about what they learned. Mia chose to interview a neighbor who had immigrated to Taiwan from Vietnam twenty years ago, speaking no Chinese and knowing no one. The neighbor described arriving at the airport with one bag and an address written on a piece of paper. \"Were you afraid?\" Mia asked. \"Completely,\" the neighbor said. \"And then I wasn't.\" Mia asked what had changed. The neighbor smiled: \"I just did the next thing. And then the next.\" Mia wrote those words at the top of the report and could not find a better conclusion. Sometimes the entire answer fits in one short sentence.","zh":"六年級快結束時，Mia的老師給班上布置了一項不尋常的作業：採訪一個做過他們害怕做的事情的人，並寫下他們學到了什麼。Mia選擇採訪了一個二十年前從越南移民到台灣的鄰居，當時他不會說中文，也不認識任何人。鄰居描述了帶著一個包和一張寫著地址的紙條到達機場的情景。「你害怕嗎？」Mia問。「非常害怕，」鄰居說。「然後我就不害怕了。」Mia問是什麼改變了。鄰居微笑：「我只是做了下一件事，然後再下一件。」Mia把這些話寫在報告的最上面，找不到更好的結語。有時候，整個答案只需要一個短句。"},{"title":"#80","vocab":["personally","paused","certain","weight","continued"],"en":"It was the last English class of elementary school. The teacher asked everyone to write one sentence — just one — that described what English meant to them personally. The room was quiet for a long time. Some students wrote about travel, some about music, some about games. Alex wrote: \"English is the door I didn't know I wanted to open until it was already open.\" The teacher read all the sentences without names. When she read Alex's, she paused for a moment before continuing. After class, she told Alex quietly, \"Keep writing.\" Alex did not know exactly what that meant yet. But walking out of the school for the last time, Alex felt the weight of those two words in a pocket, small and certain, like a key.","zh":"這是小學最後一堂英語課。老師請每個人寫一句話——只一句——描述英文對他們個人的意義。教室安靜了很長時間。有些學生寫了旅行，有些寫了音樂，有些寫了遊戲。Alex寫道：「英文是那扇我在打開之前不知道自己想打開的門。」老師沒有說名字就讀了所有的句子。當她讀到Alex的那句時，她停頓了一下才繼續。課後，她悄悄告訴Alex：「繼續寫。」Alex還不確切知道這是什麼意思。但最後一次走出學校時，Alex感受到那兩個字在口袋裡的重量，細小而確定，像一把鑰匙。"},{"title":"#81","vocab":["elementary","ordinary","shaping","significant","argument"],"en":"On the last day of elementary school, Anna sat alone in the classroom for a few minutes after everyone had left. Six years had passed in this room. Anna thought about the first day — the nervous feeling of not knowing anyone, the strange smell of new textbooks, the way the teacher had written everyone's name on the board in colored chalk. So much had changed since then. Anna had failed a math test, lost a best friend over a silly argument, cried during a school play, and laughed until tears came during a class trip. None of it had seemed significant at the time. But sitting there now in the quiet, Anna understood that each of those small, ordinary moments had been quietly shaping the person now walking out the door.","zh":"小學最後一天，Anna在所有人都離開後獨自在教室裡坐了幾分鐘。六年在這個房間裡過去了。Anna想起了第一天——不認識任何人的緊張感，新課本奇特的氣味，老師用彩色粉筆把每個人的名字寫在黑板上的樣子。從那以後一切都改變了太多。Anna數學考試不及格，為了一件蠢事失去了最好的朋友，在學校話劇中哭泣，在班級郊遊時笑到流淚。當時每一件事看起來都不重要。但現在坐在安靜中，Anna明白了，每一個細小而平凡的時刻都在悄悄地塑造著現在走出門的那個人。"},{"title":"#82","vocab":["ceremony","perseverance","obvious","principal","attention"],"en":"Three weeks before graduation, Ren was asked to write a speech for the ceremony. The topic was: what did elementary school teach you that cannot be found in a textbook? Ren stared at the blank page for a long time. The obvious answers — friendship, effort, perseverance — felt too simple. Ren thought about the afternoon when the whole class had stayed late to help a classmate finish a project. No one had been asked to stay. No one had been given extra marks for staying. They had simply stayed because it was the right thing to do. That was the story Ren told at the ceremony. When the speech ended, several parents were wiping their eyes. The principal whispered to the English teacher, \"Where did that come from?\" The teacher smiled and said, \"From six years of paying attention.\"","zh":"畢業前三週，Ren被要求為典禮寫一篇演講。主題是：小學教了你什麼是課本裡找不到的？Ren對著空白的紙盯了很長時間。顯而易見的答案——友誼、努力、堅持——感覺太簡單了。Ren想到了那個整個班留下來幫助一個同學完成專題的下午。沒有人被要求留下。沒有人因為留下而得到額外的分數。他們只是留了下來，因為這是對的事。這就是Ren在典禮上講述的故事。演講結束時，幾位家長在擦眼淚。校長悄聲對英語老師說：「這是哪裡來的？」老師微笑說：「來自六年的用心。」"},{"title":"#83","vocab":["organized","research","unexpected","hardship","lifetime"],"en":"In the final semester, the school organized a project called \"Roots.\" Each student had to research their family's history and present it to the class. Amy had always thought of family history as boring — dates and names on a page. But when Amy sat down with Grandpa and asked him about his childhood, something unexpected happened. Grandpa began to cry, quietly, while describing how he had walked three hours to school as a boy because there was no bus. \"We didn't think of it as hardship,\" Grandpa said. \"We just thought of it as morning.\" Amy wrote that sentence down immediately. At the presentation, Amy read it aloud. Several classmates asked if they could write it down too. Some truths, Amy discovered, are so simple that they take a lifetime to understand.","zh":"最後一學期，學校組織了一個名為「根」的專題。每個學生必須研究家族歷史並向全班展示。Amy一直認為家族歷史很無聊——紙上的日期和名字。但當Amy坐下來問爺爺他的童年時，出乎意料的事情發生了。爺爺開始默默地哭泣，描述他小時候因為沒有巴士而步行三個小時去上學的情況。「我們沒有把它當作艱辛，」爺爺說。「我們只是把它當作早晨。」Amy立刻把這句話寫了下來。在展示時，Amy大聲朗讀了它。幾個同學問他們是否也能把它寫下來。有些真理，Amy發現，是如此簡單，以至於需要一輩子才能理解。"},{"title":"#84","vocab":["landscape","philosophical","journey","pineapple","mountains"],"en":"The summer before junior high school, Leo traveled alone on a train for the first time, visiting a cousin in Tainan. The journey took four hours. Leo had brought a book but never opened it. Instead, Leo watched the landscape change outside the window — rice fields giving way to mountains, mountains giving way to coast. A grandmother sitting nearby offered Leo a slice of pineapple cake and asked, \"Are you going somewhere or coming from somewhere?\" Leo thought about the question for the rest of the journey. \"Both,\" Leo finally decided. \"I think it's always both.\" It was the most philosophical Leo had ever felt on a Tuesday afternoon.","zh":"國中入學前的暑假，Leo第一次獨自乘火車，去Tainan拜訪一個表親。旅程花了四小時。Leo帶了一本書，但始終沒有打開。相反，Leo看著窗外的風景變化——稻田讓位給山脈，山脈讓位給海岸。一位坐在旁邊的奶奶給Leo一片鳳梨酥，問：「你是要去某個地方，還是從某個地方回來？」Leo在接下來的旅程中一直在思考這個問題。「兩者都是，」Leo最後決定。「我想它永遠都是兩者。」這是Leo在一個星期二下午有過的最富哲理的感受。"},{"title":"#85","vocab":["assigned","staffroom","comments","witness","drafts"],"en":"Emma spent the last month of elementary school writing letters to each teacher — not because it was assigned, but because Emma wanted to. The hardest one to write was to the English teacher, Mr. Chen. He had never given Emma top marks, but had left comments like \"almost\" and \"try again\" on every paper. At first those words had felt unkind. Now, looking back, Emma realized those two words had done more for Emma's English than any perfect score ever could have. The letter took four drafts to get right. Mr. Chen read it twice in the staffroom and folded it carefully into his jacket pocket. Emma never saw him read it, but heard from a classmate who had. Some things are better received without a witness.","zh":"Emma在小學的最後一個月花時間給每一位老師寫信——不是因為被要求，而是因為Emma想這樣做。最難寫的是給英語老師陳老師的信。他從未給過Emma最高分，但在每份作業上留下「幾乎了」和「再試試」這樣的評語。起初，這些話感覺不親切。現在回想起來，Emma意識到這兩個詞對Emma的英文的幫助，比任何完美分數都要多。這封信花了四稿才寫好。陳老師在教 本，看著那裡的字跡：更輕、更快、更確定。還是同一雙手。但那兩頁之間的距離感覺像是Coco在沒有地圖的情況下橫跨過的一個國家，每次一小步，卻不知怎麼地到達了。"},{"title":"#88","vocab":["assigned","community","presence","ritual","elderly"],"en":"Two months before graduation, Tim was assigned a community service project. Most students chose something organized and safe. Tim chose to spend twelve Saturday mornings at a care home for the elderly in Taidong. The first visit was awkward — Tim did not know what to say or do. An old woman named Mrs. Huang asked Tim to sit and simply stay. \"Old people don't need activity,\" she said. \"We need presence.\" Tim came back the next Saturday, and the next. By the final visit, Tim and Mrs. Huang had developed a ritual: Tim would read the weather report aloud, and she would say whether she believed it. It was a small ritual. It was also, Tim understood by then, a form of love.","zh":"畢業前兩個月，Tim被分配了一個社區服務專題。大多數學生選擇了有組織且安全的事情。Tim選擇在Taidong的一家老人護理院度過十二個星期六的早晨。第一次拜訪很尷尬——Tim不知道說什麼或做什麼。一位名叫黃奶奶的老太太請Tim坐下，只要陪著就好。「老人不需要活動，」她說。「我們需要陪伴。」Tim下個星期六又回來了，然後又回來了。到最後一次拜訪時，Tim和黃奶奶建立了一個習慣：Tim大聲讀天氣預報，她說她是否相信。這是個小習慣。但到那時Tim明白了，這也是一種愛的形式。"},{"title":"#89","vocab":["unusual","immigrated","conclusion","interview","assignment"],"en":"Near the end of sixth grade, Mei's teacher gave the class an unusual assignment: interview someone who had done something they were afraid to do, and write about what they learned. Mei chose to interview a neighbor who had immigrated to Taiwan from Vietnam twenty years ago, speaking no Chinese and knowing no one. The neighbor described arriving at the airport with one bag and an address written on a piece of paper. \"Were you afraid?\" Mei asked. \"Completely,\" the neighbor said. \"And then I wasn't.\" Mei asked what had changed. The neighbor smiled: \"I just did the next thing. And then the next.\" Mei wrote those words at the top of the report and could not find a better conclusion. Sometimes the entire answer fits in one short sentence.","zh":"六年級快結束時，Mei的老師給班上布置了一項不尋常的作業：採訪一個做過他們害怕做的事情的人，並寫下他們學到了什麼。Mei選擇採訪了一個二十年前從越南移民到台灣的鄰居，當時他不會說中文，也不認識任何人。鄰居描述了帶著一個包和一張寫著地址的紙條到達機場的情景。「你害怕嗎？」Mei問。「非常害怕，」鄰居說。「然後我就不害怕了。」Mei問是什麼改變了。鄰居微笑：「我只是做了下一件事，然後再下一件。」Mei把這些話寫在報告的最上面，找不到更好的結語。有時候，整個答案只需要一個短句。"},{"title":"#90","vocab":["personally","paused","certain","weight","continued"],"en":"It was the last English class of elementary school. The teacher asked everyone to write one sentence — just one — that described what English meant to them personally. The room was quiet for a long time. Some students wrote about travel, some about music, some about games. Ben wrote: \"English is the door I didn't know I wanted to open until it was already open.\" The teacher read all the sentences without names. When she read Ben's, she paused for a moment before continuing. After class, she told Ben quietly, \"Keep writing.\" Ben did not know exactly what that meant yet. But walking out of the school for the last time, Ben felt the weight of those two words in a pocket, small and certain, like a key.","zh":"這是小學最後一堂英語課。老師請每個人寫一句話——只一句——描述英文對他們個人的意義。教室安靜了很長時間。有些學生寫了旅行，有些寫了音樂，有些寫了遊戲。Ben寫道：「英文是那扇我在打開之前不知道自己想打開的門。」老師沒有說名字就讀了所有的句子。當她讀到Ben的那句時，她停頓了一下才繼續。課後，她悄悄告訴Ben：「繼續寫。」Ben還不確切知道這是什麼意思。但最後一次走出學校時，Ben感受到那兩個字在口袋裡的重量，細小而確定，像一把鑰匙。"},{"title":"#91","vocab":["elementary","ordinary","shaping","significant","argument"],"en":"On the last day of elementary school, Zoe sat alone in the classroom for a few minutes after everyone had left. Six years had passed in this room. Zoe thought about the first day — the nervous feeling of not knowing anyone, the strange smell of new textbooks, the way the teacher had written everyone's name on the board in colored chalk. So much had changed since then. Zoe had failed a math test, lost a best friend over a silly argument, cried during a school play, and laughed until tears came during a class trip. None of it had seemed significant at the time. But sitting there now in the quiet, Zoe understood that each of those small, ordinary moments had been quietly shaping the person now walking out the door.","zh":"小學最後一天，Zoe在所有人都離開後獨自在教室裡坐了幾分鐘。六年在這個房間裡過去了。Zoe想起了第一天——不認識任何人的緊張感，新課本奇特的氣味，老師用彩色粉筆把每個人的名字寫在黑板上的樣子。從那以後一切都改變了太多。Zoe數學考試不及格，為了一件蠢事失去了最好的朋友，在學校話劇中哭泣，在班級郊遊時笑到流淚。當時每一件事看起來都不重要。但現在坐在安靜中，Zoe明白了，每一個細小而平凡的時刻都在悄悄地塑造著現在走出門的那個人。"},{"title":"#92","vocab":["ceremony","perseverance","obvious","principal","attention"],"en":"Three weeks before graduation, Jack was asked to write a speech for the ceremony. The topic was: what did elementary school teach you that cannot be found in a textbook? Jack stared at the blank page for a long time. The obvious answers — friendship, effort, perseverance — felt too simple. Jack thought about the afternoon when the whole class had stayed late to help a classmate finish a project. No one had been asked to stay. No one had been given extra marks for staying. They had simply stayed because it was the right thing to do. That was the story Jack told at the ceremony. When the speech ended, several parents were wiping their eyes. The principal whispered to the English teacher, \"Where did that come from?\" The teacher smiled and said, \"From six years of paying attention.\"","zh":"畢業前三週，Jack被要求為典禮寫一篇演講。主題是：小學教了你什麼是課本裡找不到的？Jack對著空白的紙盯了很長時間。顯而易見的答案——友誼、努力、堅持——感覺太簡單了。Jack想到了那個整個班留下來幫助一個同學完成專題的下午。沒有人被要求留下。沒有人因為留下而得到額外的分數。他們只是留了下來，因為這是對的事。這就是Jack在典禮上講述的故事。演講結束時，幾位家長在擦眼淚。校長悄聲對英語老師說：「這是哪裡來的？」老師微笑說：「來自六年的用心。」"},{"title":"#93","vocab":["organized","research","unexpected","hardship","lifetime"],"en":"In the final semester, the school organized a project called \"Roots.\" Each student had to research their family's history and present it to the class. Nina had always thought of family history as boring — dates and names on a page. But when Nina sat down with Grandpa and asked him about his childhood, something unexpected happened. Grandpa began to cry, quietly, while describing how he had walked three hours to school as a boy because there was no bus. \"We didn't think of it as hardship,\" Grandpa said. \"We just thought of it as morning.\" Nina wrote that sentence down immediately. At the presentation, Nina read it aloud. Several classmates asked if they could write it down too. Some truths, Nina discovered, are so simple that they take a lifetime to understand.","zh":"最後一學期，學校組織了一個名為「根」的專題。每個學生必須研究家族歷史並向全班展示。Nina一直認為家族歷史很無聊——紙上的日期和名字。但當Nina坐下來問爺爺他的童年時，出乎意料的事情發生了。爺爺開始默默地哭泣，描述他小時候因為沒有巴士而步行三個小時去上學的情況。「我們沒有把它當作艱辛，」爺爺說。「我們只是把它當作早晨。」Nina立刻把這句話寫了下來。在展示時，Nina大聲朗讀了它。幾個同學問他們是否也能把它寫下來。有些真理，Nina發現，是如此簡單，以至於需要一輩子才能理解。"},{"title":"#94","vocab":["landscape","philosophical","journey","pineapple","mountains"],"en":"The summer before junior high school, Ruby traveled alone on a train for the first time, visiting a cousin in Taichung. The journey took four hours. Ruby had brought a book but never opened it. Instead, Ruby watched the landscape change outside the window — rice fields giving way to mountains, mountains giving way to coast. A grandmother sitting nearby offered Ruby a slice of pineapple cake and asked, \"Are you going somewhere or coming from somewhere?\" Ruby thought about the question for the rest of the journey. \"Both,\" Ruby finally decided. \"I think it's always both.\" It was the most philosophical Ruby had ever felt on a Tuesday afternoon.","zh":"國中入學前的暑假，Ruby第一次獨自乘火車，去Taichung拜訪一個表親。旅程花了四小時。Ruby帶了一本書，但始終沒有打開。相反，Ruby看著窗外的風景變化——稻田讓位給山脈，山脈讓位給海岸。一位坐在旁邊的奶奶給Ruby一片鳳梨酥，問：「你是要去某個地方，還是從某個地方回來？」Ruby在接下來的旅程中一直在思考這個問題。「兩者都是，」Ruby最後決定。「我想它永遠都是兩者。」這是Ruby在一個星期二下午有過的最富哲理的感受。"},{"title":"#95","vocab":["assigned","staffroom","comments","witness","drafts"],"en":"Kai spent the last month of elementary school writing letters to each teacher — not because it was assigned, but because Kai wanted to. The hardest one to write was to the English teacher, Mr. Chen. He had never given Kai top marks, but had left comments like \"almost\" and \"try again\" on every paper. At first those words had felt unkind. Now, looking back, Kai realized those two words had done more for Kai's English than any perfect score ever could have. The letter took four drafts to get right. Mr. Chen read it twice in the staffroom and folded it carefully into his jacket pocket. Kai never saw him read it, but heard from a classmate who had. Some things are better received without a witness.","zh":"Kai在小學的最後一個月花時間給每一位老師寫信——不是因為被要求，而是因為Kai想這樣做。最難寫的是給英語老師陳老師的信。他從未給過Kai最高分，但在每份作業上留下「幾乎了」和「再試試」這樣的評語。起初，這些話感覺不親切。現在回想起來，Kai意識到這兩個詞對Kai的英文的幫助，比任何完美分數都要多。這封信花了四稿才寫好。陳老師在教職員室讀了兩遍，小心地把它折起來放進了夾克口袋。Kai從未親眼看到他讀它，但從一個同學那裡聽說了。有些事在沒有見證者的情況下被接受，是更好的。"},{"title":"#96","vocab":["capsule","ceremony","archive","accurate","document"],"en":"A week before graduation, Tom's class held a time capsule ceremony. Each student placed an object inside a wooden box that would be sealed and stored in the school's archive for twenty years. Tom chose to put in a hand-drawn map of the school — not how it looked officially, but how Tom had experienced it: the corner near the water fountain where secrets were told, the classroom window that faced the mountains, the small garden no one was supposed to enter but everyone had. The map was not accurate. It was true. When the lid was hammered shut, Tom thought: in twenty years, whoever opens this will find not a document but a feeling — and that, Tom decided, was the most honest thing a person can leave behind.","zh":"畢業前一週，Tom的班舉行了時光膠囊典禮。每個學生把一件物品放入一個木箱，這個木箱將被密封，在學校的檔案館保存二十年。Tom選擇放入一張手繪的學校地圖——不是官方的樣子，而是Tom所體驗的：飲水機旁分享秘密的角落，朝著山脈的教室窗戶，那個不允許任何人進入但所有人都進過的小花園。這張地圖並不準確，但它是真實的。當蓋子被鎚下去時，Tom想：二十年後，打開這個的人會找到的不是一份文件，而是一種感覺——而Tom決定，這是一個人能留下的最誠實的東西。"},{"title":"#97","vocab":["workbooks","handwriting","unsteady","certain","distance"],"en":"The night before the last day of school, Lily could not sleep. Not from excitement, but from a strange quiet feeling that was hard to name. Lily got up and walked to the desk where all the old workbooks were stacked. Grade one, grade two, all the way to grade six. Lily opened the grade one book and looked at the handwriting inside — round, unsteady letters, pressing too hard on the penc // ═══════════════════════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════════════════════
const STORE_KEY = 'englishApp_v2';

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function saveState(s) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch(e) {}
}

function defaultState() {
  return {
    grade: null, sem: null,
    lessonIdx: 0, articleIdx: 0,
    completedArticles: [],  // [{date,grade,sem,lesson,artIdx,title}]
    loginDates: [],         // ['YYYY-MM-DD', ...]
    currentStreak: 0,
    bestStreak: 0
  };
}

let state = loadState() || defaultState();

// ═══════════════════════════════════════════════════════
// DATE UTILS
// ═══════════════════════════════════════════════════════
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function calcStreak(dates) {
  if (!dates.length) return 0;
  const unique = [...new Set(dates)].sort().reverse();
  const today = todayStr();
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
  
  if (unique[0] !== today && unique[0] !== yStr) return 0;
  
  let streak = 0, cur = new Date(unique[0]);
  for (const d of unique) {
    const dd = new Date(d);
    const diff = Math.round((cur - dd) / 86400000);
    if (diff <= 1) { streak++; cur = dd; }
    else break;
  }
  return streak;
}

function recordLogin() {
  const t = todayStr();
  if (!state.loginDates.includes(t)) {
    state.loginDates.push(t);
    state.currentStreak = calcStreak(state.loginDates);
    if (state.currentStreak > state.bestStreak) state.bestStreak = state.currentStreak;
    saveState(state);
  }
}

// UI HELPERS
// ═══════════════════════════════════════════════════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  closeMenu();
  if (id === 'progressPage') renderProgress();
}

let menuOpen = false;
function toggleMenu() {
  menuOpen = !menuOpen;
  document.getElementById('menuOverlay').classList.toggle('show', menuOpen);
}
function closeMenu() {
  menuOpen = false;
  document.getElementById('menuOverlay').classList.remove('show');
}

function menuAction(act) {
  closeMenu();
  if (act === 'home') {
    if (state.grade && state.sem) {
      showPage('learnPage');
    } else {
      showPage('setupPage');
    }
  }
  else if (act === 'progress') { showPage('progressPage'); }
  else if (act === 'reset') { showPage('setupPage'); }
  else if (act === 'clearAll') {
    if (confirm('確定要清除所有學習紀錄嗎？')) {
      state = defaultState();
      saveState(state);
      showToast('已清除所有紀錄');
      showPage('setupPage');
      updateTopBar();
    }
  }
}

let toastTimer;
function showToast(msg, dur=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), dur);
}

// SETUP PAGE
// ═══════════════════════════════════════════════════════
let _grade=null, _sem=null;

function pickGrade(g) {
  _grade = g;
  document.querySelectorAll('.g-btn').forEach((b,i) => b.classList.toggle('on', i+1===g));
  checkGo();
}
function pickSem(s) {
  _sem = s;
  document.querySelectorAll('.s-btn').forEach((b,i) => b.classList.toggle('on', i+1===s));
  checkGo();
}
function checkGo() {
  document.getElementById('goBtn').disabled = !(_grade && _sem);
}
function goLearn() {
  state.grade = _grade;
  state.sem = _sem;
  // reset position if grade/sem changed
  state.lessonIdx = 0;
  state.articleIdx = 0;
  saveState(state);
  initLearnPage();
  showPage('learnPage');
}

// ═══════════════════════════════════════════════════════
// LEARN PAGE
// ═══════════════════════════════════════════════════════
function getCurrentData() {
  // Returns flat array of 100 articles for current grade/sem
  return DB[String(state.grade)][String(state.sem)];
}

function initLearnPage() {
  // Reset lessonIdx since we no longer use it as lesson selector
  state.lessonIdx = 0;
  const articles = getCurrentData();
  buildArticleSelect(articles);
  renderArticle();
  updateTopBar();
}

function buildArticleSelect(articles) {
  const aSel = document.getElementById('articleSel');
  aSel.innerHTML = '';
  for (let g = 0; g < 10; g++) {
    const from = g * 10 + 1, to = from + 9;
    const grp = document.createElement('optgroup');
    grp.label = '第 ' + from + '–' + to + ' 篇';
    for (let i = g*10; i < g*10+10 && i < articles.length; i++) {
      const o = document.createElement('option');
      o.value = i;
      o.textContent = articles[i].title;
      grp.appendChild(o);
    }
    aSel.appendChild(grp);
  }
  aSel.value = state.articleIdx;
  updateNavBtns();
  renderVocab();
}

function onLessonChange() {
  // No longer used (lesson selector removed), kept for compatibility
}

function updateArticleSelect() {
  buildArticleSelect(getCurrentData());
}

function onArticleChange() {
  state.articleIdx = parseInt(document.getElementById('articleSel').value);
  saveState(state);
  stopSpeak();
  renderArticle();
  updateNavBtns();
}

function navigate(dir) {
  const articles = getCurrentData();
  let ai = state.articleIdx + dir;
  if (ai < 0) { showToast('已經是第一篇了 📖'); return; }
  if (ai >= articles.length) { showToast('已經是最後一篇了 🎉！'); return; }
  state.articleIdx = ai;
  saveState(state);
  stopSpeak();
  document.getElementById('articleSel').value = ai;
  renderArticle();
  updateNavBtns();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function updateNavBtns() {
  const total = getCurrentData().length;
  document.getElementById('prevBtn').disabled = state.articleIdx === 0;
  document.getElementById('nextBtn').disabled = state.articleIdx >= total - 1;
}

function renderVocab() {
  const articles = getCurrentData();
  const art = articles[state.articleIdx];
  const chips = document.getElementById('vocabChips');
  chips.innerHTML = '';
  (art.vocab || []).forEach(w => {
    const c = document.createElement('span');
    c.className = 'vc';
    c.textContent = w;
    c.onclick = () => speakWord(w);
    chips.appendChild(c);
  });
}

function countWords(text) {
  return text.trim().split(/\s+/).length;
}

function highlightWords(text, vocabWords) {
  // Wrap every real word with a span that has data-word for tooltip
  // Vocab words also get class="hw" for yellow highlight + click-to-speak
  const tokenRe = /([a-zA-Z][a-zA-Z''\-]*[a-zA-Z]|[a-zA-Z])|([^a-zA-Z]+)/g;
  let m, html = '';
  while ((m = tokenRe.exec(text)) !== null) {
    if (m[2] !== undefined) {
      // Not a word (punctuation, space, dash) — output as-is
      html += m[0];
    } else {
      const word = m[0];
      const clean = word.replace(/[^a-zA-Z]/g,'').toLowerCase();
      const isVocab = vocabWords.some(v => v.toLowerCase() === clean);
      const safe = word.replace(/'/g, "\\'");
      if (isVocab) {
        html += `<span class="hw word-span" data-word="${clean}" onclick="speakWord('${safe}')">${word}</span>`;
      } else {
        html += `<span class="word-span" data-word="${clean}">${word}</span>`;
      }
    }
  }
  return html;
}


function renderArticle() {
  const articles = getCurrentData();
  const art = articles[state.articleIdx];
  
  document.getElementById('artNum').textContent = `第 ${state.articleIdx + 1} 篇 / 共 100 篇`;
  document.getElementById('artTitle').textContent = art.title;
  
  const wc = countWords(art.en);
  document.getElementById('artWc').textContent = `${wc} 個英文字`;
  
  document.getElementById('artEn').innerHTML = highlightWords(art.en, art.vocab || []);
  document.getElementById('artZh').textContent = art.zh;
  injectTooltips();
  renderVocab();
  updateNavBtns();
}

function updateTopBar() {
  if (state.grade && state.sem) {
    const gNames = ['','一','二','三','四','五','六'];
    const sName = state.sem===1?'上':'下';
    document.getElementById('topSub').textContent = `${gNames[state.grade]}年級${sName}學期`;
  } else {
    document.getElementById('topSub').textContent = '';
  }
  document.getElementById('streakCount').textContent = state.currentStreak;
}

// ═══════════════════════════════════════════════════════
// DONE / PROGRESS
// ═══════════════════════════════════════════════════════
function markDone() {
  const t = todayStr();
  const art = getCurrentData()[state.articleIdx];
  
  // record completion
  state.completedArticles.push({
    date: t,
    grade: state.grade, sem: state.sem,
    lessonName: '',
    artIdx: state.articleIdx,
    title: art.title
  });
  
  // record login date for streak
  if (!state.loginDates.includes(t)) {
    state.loginDates.push(t);
    state.currentStreak = calcStreak(state.loginDates);
    if (state.currentStreak > state.bestStreak) state.bestStreak = state.currentStreak;
  }
  
  saveState(state);
  document.getElementById('streakCount').textContent = state.currentStreak;
  
  // auto-advance
  showToast(`✅ 完成！🔥 連勝 ${state.currentStreak} 天！`);
  setTimeout(() => navigate(1), 400);
}

// ═══════════════════════════════════════════════════════
// PROGRESS PAGE
// ═══════════════════════════════════════════════════════
function renderProgress() {
  document.getElementById('bigStreak').textContent = state.currentStreak;
  document.getElementById('bestStreak').textContent = `最高紀錄：${state.bestStreak} 天`;
  document.getElementById('statArticles').textContent = state.completedArticles.length;
  document.getElementById('statDays').textContent = new Set(state.loginDates).size;
  
  // count completed lessons (lesson counted once per sem)
  const lessonSet = new Set(state.completedArticles.map(c=>`${c.grade}-${c.sem}-${c.lessonName}`));
  document.getElementById('statLessons').textContent = lessonSet.size;
  
  const gNames = ['','一','二','三','四','五','六'];
  document.getElementById('statGrade').textContent = state.grade ? `${gNames[state.grade]}年` : '—';
  
  // calendar
  renderCalendar();
  // history
  renderHistory();
}

function renderCalendar() {
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
  const todayD = now.getDate();
  const doneDates = new Set(state.loginDates.filter(d => d.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)).map(d => parseInt(d.split('-')[2])));
  
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  
  // headers
  ['日','一','二','三','四','五','六'].forEach(h => {
    const d = document.createElement('div');
    d.className = 'cal-day-header'; d.textContent = h;
    grid.appendChild(d);
  });
  
  // empty cells
  for (let i=0; i<firstDay; i++) {
    const d = document.createElement('div'); d.className='cal-day';
    grid.appendChild(d);
  }
  
  // days
  for (let d=1; d<=daysInMonth; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day';
    if (doneDates.has(d)) el.classList.add('done');
    if (d === todayD) el.classList.add('today');
    el.textContent = d;
    grid.appendChild(el);
  }
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const recent = [...state.completedArticles].reverse().slice(0, 15);
  
  if (!recent.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:.85rem;padding:20px;font-weight:700">還沒有完成紀錄，快去學習吧！🚀</div>';
    return;
  }
  
  const gNames = ['','一','二','三','四','五','六'];
  list.innerHTML = recent.map(c => `
    <div class="history-item">
      <div class="h-emoji">📖</div>
      <div class="h-info">
        <div class="h-title">${c.title}</div>
        <div class="h-meta">${c.lessonName} · ${c.date}</div>
      </div>
      <div class="h-badge">${gNames[c.grade]}年${c.sem===1?'上':'下'}</div>
    </div>
  `).join('');
}

function getTranslation(word) {
  const w = word.toLowerCase().replace(/[^a-z]/g,'');
  if (!w || w.length === 0) return null;
  return DICT[w] || null;
}


// ── Inject tooltip element on every word-span ──
function injectTooltips() {
  document.querySelectorAll('.word-span[data-word]').forEach(el => {
    if (el.querySelector('.word-tip')) return; // already done
    const w = el.getAttribute('data-word');
    const tr = getTranslation(w);
    if (!tr) return; // no translation, show nothing
    const tip = document.createElement('span');
    tip.className = 'word-tip';
    tip.textContent = tr;
    el.appendChild(tip);
  });
}


function speakWord(w) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(w);
  u.lang='en-US'; u.rate=0.8;
  u.volume = parseFloat(document.getElementById('vol').value);
  window.speechSynthesis.speak(u);
}

// ── Word-by-word highlight using onboundary (真正同步) ──
let _hlTimer = null;

function buildWordSpans(text, vocabWords) {
  // Split into real word-tokens vs punctuation/symbols
  // A real word must contain at least one letter
  const tokenRe = /([a-zA-Z][a-zA-Z''\-]*[a-zA-Z]|[a-zA-Z])|([^a-zA-Z]+)/g;
  let m;
  const tokens = [];
  while ((m = tokenRe.exec(text)) !== null) {
    if (m[1] !== undefined) {
      tokens.push({ text: m[0], isWord: true });
    } else {
      tokens.push({ text: m[0], isWord: false });
    }
  }

  let html = '';
  let wordIdx = 0;
  tokens.forEach(tok => {
    if (!tok.isWord) {
      html += tok.text;   // punctuation, spaces, dashes → plain text, no span
      return;
    }
    const clean = tok.text.replace(/[^a-zA-Z]/g, '').toLowerCase();
    const isVocab = vocabWords.some(v => v.toLowerCase() === clean);
    const safeWord = tok.text.replace(/'/g, "\'");
    if (isVocab) {
      html += `<span class="hw word-span" id="ws-${wordIdx}" data-word="${clean}" onclick="speakWord('${safeWord}')">${tok.text}</span>`;
    } else {
      html += `<span class="word-span" id="ws-${wordIdx}" data-word="${clean}">${tok.text}</span>`;
    }
    wordIdx++;
  });
  return { html, wordCount: wordIdx };
}


// Map charIndex → wordIdx (only real words, same tokeniser as buildWordSpans)
function buildCharMap(text) {
  const map = {};
  const tokenRe = /([a-zA-Z][a-zA-Z''\-]*[a-zA-Z]|[a-zA-Z])|([^a-zA-Z]+)/g;
  let m, wi = 0;
  while ((m = tokenRe.exec(text)) !== null) {
    if (m[1] !== undefined) {        // real word
      map[m.index] = wi++;
    }
    // non-word tokens: no entry, no counter increment
  }
  return map;
}


function setHighlight(wordIdx) {
  document.querySelectorAll('.word-span.reading').forEach(el => el.classList.remove('reading'));
  const el = document.getElementById('ws-' + wordIdx);
  if (el) {
    el.classList.add('reading');
  }
}

function playArt(rate = 0.95) {
  stopSpeak();

  const artList = getCurrentData();
  const art     = artList[state.articleIdx];
  const text    = art.en;

  // 1. Render word spans immediately (all visible at once)
  const { html, wordCount } = buildWordSpans(text, art.vocab || []);
  document.getElementById('artEn').innerHTML = html;
  injectTooltips();

  // 2. Build char→word index map for onboundary sync
  const charMap = buildCharMap(text);

  // 3. Prepare utterance
  const u = new SpeechSynthesisUtterance(text);
  u.lang   = 'en-US';
  u.rate   = rate;
  u.volume = parseFloat(document.getElementById('vol').value);

  // 4. onboundary fires at the exact character position being spoken
  u.onboundary = (e) => {
    if (e.name !== 'word') return;
    const wi = charMap[e.charIndex];
    if (wi !== undefined) {
      setHighlight(wi);
      // Update progress bar
      const pct = Math.round(((wi + 1) / wordCount) * 100);
      const bar   = document.getElementById('readBar');
      const pctEl = document.getElementById('readPct');
      if (bar)   bar.style.width = pct + '%';
      if (pctEl) pctEl.textContent = pct + '%';
    }
  };

  u.onstart = () => {
    document.getElementById('stopBtn').disabled = false;
    document.getElementById('spkBadge').classList.remove('hidden');
    document.getElementById('playBtn').disabled = true;
    document.getElementById('slowBtn').disabled = true;
    const wrap = document.getElementById('readProgressWrap');
    if (wrap) wrap.style.display = 'block';
    const bar = document.getElementById('readBar');
    if (bar) bar.style.width = '0%';
  };

  u.onend = () => {
    document.querySelectorAll('.word-span.reading').forEach(el => el.classList.remove('reading'));
    const bar   = document.getElementById('readBar');
    const pctEl = document.getElementById('readPct');
    if (bar)   bar.style.width = '100%';
    if (pctEl) pctEl.textContent = '100% ✅';
    setTimeout(() => {
      const wrap = document.getElementById('readProgressWrap');
      if (wrap) wrap.style.display = 'none';
      resetAudio();
      renderArticle(); injectTooltips(); // restore normal vocab highlights
    }, 1200);
  };

  u.onerror = () => {
    resetAudio();
    renderArticle();
  };

  window.speechSynthesis.speak(u);
}

function stopSpeak() {
  window.speechSynthesis.cancel();
  clearTimeout(_hlTimer);
  document.querySelectorAll('.word-span.reading').forEach(el => el.classList.remove('reading'));
  const wrap = document.getElementById('readProgressWrap');
  if (wrap) wrap.style.display='none';
  resetAudio();
}

function resetAudio() {
  document.getElementById('stopBtn').disabled=true;
  document.getElementById('spkBadge').classList.add('hidden');
  document.getElementById('playBtn').disabled=false;
  document.getElementById('slowBtn').disabled=false;
}

// volume display
document.getElementById('vol').addEventListener('input', function() {
  document.getElementById('volPct').textContent = Math.round(this.value*100)+'%';
});

  recordLogin();

    _grade = state.grade; _sem = state.sem;
