<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>英文樂園 🌈</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#2196F3;--primary-dark:#1565C0;--primary-light:#E3F2FD;
  --accent:#FF6F00;--accent-light:#FFF3E0;
  --green:#43A047;--green-light:#E8F5E9;
  --red:#E53935;--red-light:#FFEBEE;
  --gold:#F9A825;--gold-light:#FFFDE7;
  --purple:#7B1FA2;--purple-light:#F3E5F5;
  --bg:#F0F7FF;--card:#FFFFFF;
  --text:#1A237E;--muted:#78909C;
  --border:rgba(33,150,243,0.15);
  --shadow:0 4px 20px rgba(21,101,192,0.12);
  --r:18px;--r-sm:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);
  max-width:520px;margin:0 auto;
  box-shadow:0 0 40px rgba(0,0,0,0.08);
  min-height:100vh}

/* ── TOP BAR ── */
.topbar{
  background:linear-gradient(135deg,var(--primary-dark),var(--primary));
  padding:12px 16px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(21,101,192,0.3)
}
.topbar-title{font-family:'Fredoka One',cursive;font-size:1.25rem;color:#fff;
  flex:1;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.topbar-sub{font-size:.72rem;color:rgba(255,255,255,.75);font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.menu-btn{width:38px;height:38px;border-radius:50%;border:none;
  background:rgba(255,255,255,.2);color:#fff;font-size:1.2rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s;flex-shrink:0}
.menu-btn:hover{background:rgba(255,255,255,.3)}
.streak-pill{display:flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.2);border-radius:50px;
  padding:5px 10px;font-size:.78rem;font-weight:800;color:#fff;
  cursor:pointer;flex-shrink:0}
.streak-pill .fire{font-size:1rem}

/* ── PAGES ── */
.page{display:none}
.page.active{display:block}

/* ── SETUP PAGE ── */
#setupPage{background:linear-gradient(160deg,#E3F2FD,#F3E5F5)}
.setup-scroll{padding:20px 16px;
  display:flex;flex-direction:column;gap:16px}
.setup-card{background:#fff;border-radius:var(--r);padding:20px;
  box-shadow:var(--shadow);animation:popUp .4s cubic-bezier(.34,1.56,.64,1) both}
@keyframes popUp{from{opacity:0;transform:scale(.92) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.setup-ttl{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--text);
  margin-bottom:14px;display:flex;align-items:center;gap:6px}
.setup-hero{text-align:center;padding:24px 0 8px;animation:popUp .5s ease both}
.setup-hero h1{font-family:'Fredoka One',cursive;font-size:2.2rem;color:var(--text);
  text-shadow:3px 3px 0 rgba(33,150,243,.2)}
.setup-hero p{color:var(--muted);font-weight:700;font-size:.9rem;margin-top:6px}
.grade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.g-btn{background:var(--primary-light);border:2px solid rgba(33,150,243,.3);
  border-radius:14px;padding:12px 4px;cursor:pointer;font-family:'Nunito',sans-serif;
  font-weight:800;font-size:.82rem;color:var(--primary-dark);
  transition:all .2s;text-align:center;line-height:1.3}
.g-btn small{display:block;font-size:.66rem;color:#5c85c9;margin-top:2px;font-weight:700}
.g-btn:active{transform:scale(.96)}
.g-btn.on{background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  border-color:var(--primary-dark);color:#fff;
  box-shadow:0 4px 14px rgba(21,101,192,.35)}
.g-btn.on small{color:rgba(255,255,255,.8)}
.sem-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.s-btn{background:var(--purple-light);border:2px solid rgba(123,31,162,.25);
  border-radius:14px;padding:13px;cursor:pointer;font-family:'Nunito',sans-serif;
  font-weight:800;font-size:.9rem;color:var(--purple);
  transition:all .2s;text-align:center}
.s-btn:active{transform:scale(.96)}
.s-btn.on{background:linear-gradient(135deg,var(--purple),#4a148c);
  border-color:#4a148c;color:#fff;box-shadow:0 4px 14px rgba(74,20,140,.35)}
.go-btn{width:100%;padding:15px;
  background:linear-gradient(135deg,var(--accent),#E65100);
  color:#fff;border:none;border-radius:16px;
  font-family:'Fredoka One',cursive;font-size:1.2rem;
  cursor:pointer;transition:all .2s;
  box-shadow:0 5px 18px rgba(230,81,0,.4);letter-spacing:.5px}
.go-btn:active{transform:scale(.97)}
.go-btn:disabled{background:linear-gradient(135deg,#BDBDBD,#9E9E9E);
  box-shadow:none;cursor:not-allowed}

/* ── LEARN PAGE ── */
#learnPage{background:var(--bg)}
.learn-scroll{padding:14px 14px 80px;
  display:flex;flex-direction:column;gap:12px}

/* lesson selector */
.lesson-bar{background:#fff;border-radius:var(--r-sm);padding:10px 12px;
  box-shadow:var(--shadow);display:flex;align-items:center;gap:8px}
.lesson-bar label{font-weight:800;font-size:.8rem;color:var(--muted);white-space:nowrap}
.lesson-select{flex:1;border:2px solid var(--border);border-radius:10px;
  padding:7px 10px;font-family:'Nunito',sans-serif;font-weight:700;
  font-size:.82rem;color:var(--text);background:#fff;
  outline:none;cursor:pointer}
.lesson-select:focus{border-color:var(--primary)}

/* article selector */
.article-bar{background:#fff;border-radius:var(--r-sm);padding:10px 12px;
  box-shadow:var(--shadow);display:flex;align-items:center;gap:8px}
.article-bar label{font-weight:800;font-size:.8rem;color:var(--muted);white-space:nowrap}
.article-select{flex:1;border:2px solid var(--border);border-radius:10px;
  padding:7px 10px;font-family:'Nunito',sans-serif;font-weight:700;
  font-size:.82rem;color:var(--text);background:#fff;
  outline:none;cursor:pointer}
.article-select:focus{border-color:var(--green)}
.art-nav{display:flex;gap:6px}
.nav-btn{width:34px;height:34px;border-radius:10px;border:2px solid var(--border);
  background:#fff;cursor:pointer;font-size:1rem;display:flex;
  align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.nav-btn:hover{background:var(--primary-light);border-color:var(--primary)}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}

/* vocab strip */
.vocab-strip{background:var(--gold-light);border:2px solid var(--gold);
  border-radius:var(--r-sm);padding:10px 12px}
.vocab-strip-ttl{font-weight:900;font-size:.73rem;color:var(--accent);
  margin-bottom:8px;letter-spacing:.3px}
.vocab-chips{display:flex;flex-wrap:wrap;gap:6px}
.vc{background:#fff;border:2px solid var(--gold);border-radius:50px;
  padding:4px 12px;font-weight:800;font-size:.78rem;color:var(--accent);
  cursor:pointer;transition:all .2s;white-space:nowrap}
.vc:hover,.vc:active{background:var(--gold);color:#fff;transform:scale(1.05)}

/* article card */
.article-card{background:#fff;border-radius:var(--r);
  box-shadow:var(--shadow)}
.art-header{background:linear-gradient(135deg,#FFF8E1,#FFF3CD);
  padding:14px 16px;border-bottom:2px solid #FFE082}
.art-num{font-size:.7rem;font-weight:800;color:var(--muted);margin-bottom:3px}
.art-title{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--accent)}
.art-wc{display:inline-block;background:var(--green-light);border:1.5px solid #81C784;
  border-radius:50px;padding:2px 10px;font-size:.68rem;font-weight:800;
  color:var(--green);margin-top:4px}
.art-body{padding:16px}
.art-en{font-size:.98rem;line-height:1.95;color:#1A237E;font-weight:600;
  margin-bottom:12px;overflow:visible;white-space:normal;word-wrap:break-word}
.art-en .hw{background:linear-gradient(135deg,#FFF59D,#FFF176);
  border-radius:5px;padding:1px 5px;font-weight:900;color:#E65100;
  cursor:pointer;border-bottom:2px solid var(--gold);
  display:inline;transition:all .15s}
.art-en .hw:hover{background:var(--gold);color:#fff}
.art-divider{height:1px;background:linear-gradient(90deg,transparent,#FFE082,transparent);
  margin:0 0 12px}
.art-zh{font-size:.88rem;line-height:1.85;color:var(--muted);font-weight:600}

/* audio controls */
.audio-card{background:#fff;border-radius:var(--r-sm);
  box-shadow:var(--shadow);padding:12px 14px}
.audio-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.aud-btn{display:flex;align-items:center;gap:6px;padding:10px 16px;
  border-radius:50px;border:none;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;
  transition:all .2s;white-space:nowrap}
.aud-btn:active{transform:scale(.95)}
.aud-btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.aud-play{background:linear-gradient(135deg,#00897B,#00574B);color:#fff;
  box-shadow:0 3px 10px rgba(0,87,75,.3)}
.aud-slow{background:linear-gradient(135deg,var(--primary-dark),#003C8F);color:#fff;
  box-shadow:0 3px 10px rgba(0,60,143,.25)}
.aud-stop{background:linear-gradient(135deg,var(--red),#8D0000);color:#fff;
  box-shadow:0 3px 10px rgba(141,0,0,.25)}
.spk-badge{display:inline-flex;align-items:center;gap:5px;
  background:var(--green-light);border:1.5px solid #81C784;border-radius:50px;
  padding:4px 10px;font-size:.72rem;font-weight:800;color:var(--green)}
.spk-dot{width:7px;height:7px;background:var(--green);border-radius:50%;
  animation:blink .7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.vol-row{display:flex;align-items:center;gap:7px;margin-top:8px;
  font-size:.78rem;font-weight:800;color:var(--muted)}
input[type=range]{width:90px;accent-color:var(--primary)}

/* done btn */
.done-btn{width:100%;padding:14px;
  background:linear-gradient(135deg,var(--green),#1B5E20);
  color:#fff;border:none;border-radius:16px;
  font-family:'Fredoka One',cursive;font-size:1.1rem;
  cursor:pointer;transition:all .2s;
  box-shadow:0 4px 14px rgba(27,94,32,.35);letter-spacing:.5px}
.done-btn:active{transform:scale(.97)}

/* ── PROGRESS PAGE ── */
#progressPage{background:linear-gradient(160deg,#E8F5E9,#E3F2FD)}
.prog-scroll{padding:16px 16px 80px}

.streak-hero{background:linear-gradient(135deg,#FF6F00,#E65100);
  border-radius:var(--r);padding:24px;text-align:center;color:#fff;
  margin-bottom:14px;box-shadow:0 6px 22px rgba(230,81,0,.4)}
.streak-fire{font-size:3rem;animation:bounce .8s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.streak-number{font-family:'Fredoka One',cursive;font-size:3.5rem;line-height:1;
  text-shadow:3px 3px 0 rgba(0,0,0,.2)}
.streak-label{font-weight:800;font-size:.9rem;opacity:.9;margin-top:4px}
.streak-best{font-size:.78rem;opacity:.8;margin-top:8px;font-weight:700}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:#fff;border-radius:var(--r-sm);padding:14px;
  box-shadow:var(--shadow);text-align:center}
.stat-icon{font-size:1.6rem;margin-bottom:4px}
.stat-val{font-family:'Fredoka One',cursive;font-size:1.6rem;color:var(--text)}
.stat-lbl{font-size:.72rem;font-weight:700;color:var(--muted);margin-top:2px}

.calendar-card{background:#fff;border-radius:var(--r);padding:16px;
  box-shadow:var(--shadow);margin-bottom:14px}
.cal-ttl{font-family:'Fredoka One',cursive;font-size:.95rem;color:var(--text);
  margin-bottom:12px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:.68rem;font-weight:700;color:var(--muted)}
.cal-day.done{background:linear-gradient(135deg,var(--green),#2E7D32);color:#fff;
  box-shadow:0 2px 6px rgba(46,125,50,.3)}
.cal-day.today{border:2px solid var(--primary)}
.cal-day-header{text-align:center;font-size:.62rem;font-weight:900;
  color:var(--muted);padding:2px 0}

.history-card{background:#fff;border-radius:var(--r);padding:16px;
  box-shadow:var(--shadow)}
.history-ttl{font-family:'Fredoka One',cursive;font-size:.95rem;color:var(--text);
  margin-bottom:10px}
.history-item{display:flex;align-items:center;gap:10px;
  padding:8px 0;border-bottom:1px solid var(--border)}
.history-item:last-child{border-bottom:none}
.h-emoji{font-size:1.2rem;flex-shrink:0}
.h-info{flex:1;min-width:0}
.h-title{font-weight:800;font-size:.82rem;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-meta{font-size:.7rem;color:var(--muted);font-weight:700}
.h-badge{background:var(--green-light);border:1.5px solid #81C784;
  border-radius:50px;padding:2px 8px;font-size:.68rem;font-weight:800;color:var(--green)}

/* ── MENU OVERLAY ── */
.menu-overlay{display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.45);backdrop-filter:blur(4px)}
.menu-overlay.show{display:flex;align-items:flex-start;justify-content:flex-end;
  padding:60px 12px 0}
.menu-panel{background:#fff;border-radius:var(--r);
  box-shadow:0 8px 30px rgba(0,0,0,.2);width:220px;
  animation:slideIn .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px) scale(.95)}
  to{opacity:1;transform:translateY(0) scale(1)}}
.menu-item{display:flex;align-items:center;gap:12px;padding:14px 16px;
  cursor:pointer;font-weight:800;font-size:.88rem;color:var(--text);
  border-bottom:1px solid var(--border);transition:background .15s}
.menu-item:last-child{border-bottom:none}
.menu-item:hover{background:var(--primary-light)}
.menu-item .mi-icon{font-size:1.2rem;flex-shrink:0}
.menu-item.danger{color:var(--red)}
.menu-item.danger:hover{background:var(--red-light)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#1A237E;color:#fff;border-radius:50px;padding:10px 20px;
  font-weight:800;font-size:.85rem;z-index:999;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.3)}
.toast.show{transform:translateX(-50%) translateY(0)}


/* ── Word highlight while reading ── */
.word-span{display:inline;transition:background .1s,color .1s;border-radius:4px;padding:1px 2px}
.word-span.reading{
  text-decoration:underline !important;
  text-decoration-color:#FF8F00 !important;
  text-decoration-thickness:3px !important;
  text-underline-offset:3px !important;
  font-weight:700 !important;
}


/* ── Word tooltip: every word hover shows translation ── */
.word-span{position:relative;cursor:default}
.hw.word-span{cursor:pointer}
.word-tip{
  display:none;position:absolute;bottom:calc(100% + 7px);left:50%;
  transform:translateX(-50%);
  background:#1A237E;color:#fff;
  font-size:.73rem;font-weight:700;
  padding:4px 10px;border-radius:8px;white-space:nowrap;
  pointer-events:none;z-index:500;
  box-shadow:0 3px 12px rgba(0,0,0,.28);
  font-family:'Nunito',sans-serif;
  line-height:1.5;min-width:40px;text-align:center;
}
.word-tip.loading{opacity:.6}
.word-tip::after{
  content:'';position:absolute;top:100%;left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;border-top-color:#1A237E;
}
.word-span:hover .word-tip{display:block}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(33,150,243,.3);border-radius:4px}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-title">
    🌈 英文樂園
    <span class="topbar-sub" id="topSub"></span>
  </div>
  <div class="streak-pill" onclick="showPage('progressPage')" id="streakPill">
    <span class="fire">🔥</span>
    <span id="streakCount">0</span>天
  </div>
  <button class="menu-btn" onclick="toggleMenu()">⋮</button>
</div>

<!-- MENU OVERLAY -->
<div class="menu-overlay" id="menuOverlay" onclick="closeMenu()">
  <div class="menu-panel" onclick="event.stopPropagation()">
    <div class="menu-item" onclick="menuAction('home')">
      <span class="mi-icon">🏠</span> 回主頁繼續學習
    </div>
    <div class="menu-item" onclick="menuAction('progress')">
      <span class="mi-icon">📊</span> 學習進度紀錄
    </div>
    <div class="menu-item" onclick="menuAction('reset')">
      <span class="mi-icon">🔄</span> 重新選擇年級學期
    </div>
    <div class="menu-item danger" onclick="menuAction('clearAll')">
      <span class="mi-icon">🗑️</span> 清除所有紀錄
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ═══ SETUP PAGE ═══ -->
<div class="page" id="setupPage">
  <div class="setup-scroll">
    <div class="setup-hero" style="animation-delay:.05s">
      <h1>🌈 英文樂園</h1>
      <p>台灣108課綱 · 1,200篇英文文章 · 快樂學習！</p>
    </div>
    <div class="setup-card" style="animation-delay:.1s">
      <div class="setup-ttl">🏫 選擇年級</div>
      <div class="grade-grid">
        <button class="g-btn" onclick="pickGrade(1)">一年級<small>啟蒙 ~10字</small></button>
        <button class="g-btn" onclick="pickGrade(2)">二年級<small>啟蒙 ~20字</small></button>
        <button class="g-btn" onclick="pickGrade(3)">三年級<small>正式 ~40字</small></button>
        <button class="g-btn" onclick="pickGrade(4)">四年級<small>中年 ~60字</small></button>
        <button class="g-btn" onclick="pickGrade(5)">五年級<small>高年 ~80字</small></button>
        <button class="g-btn" onclick="pickGrade(6)">六年級<small>高年 ~100字</small></button>
      </div>
    </div>
    <div class="setup-card" style="animation-delay:.15s">
      <div class="setup-ttl">📅 選擇學期</div>
      <div class="sem-grid">
        <button class="s-btn" onclick="pickSem(1)">🌸 上學期</button>
        <button class="s-btn" onclick="pickSem(2)">🌻 下學期</button>
      </div>
    </div>
    <div class="setup-card" style="animation-delay:.2s">
      <button class="go-btn" id="goBtn" onclick="goLearn()" disabled>✨ 開始學習！</button>
    </div>
  </div>
</div>

<!-- ═══ LEARN PAGE ═══ -->
<div class="page" id="learnPage">
  <div class="learn-scroll" id="learnScroll">
    <!-- article selector -->
    <div class="article-bar">
      <label>📄 選文章</label>
      <select class="article-select" id="articleSel" onchange="onArticleChange()"></select>
      <div class="art-nav">
        <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>◀</button>
        <button class="nav-btn" id="nextBtn" onclick="navigate(1)">▶</button>
      </div>
    </div>
    <!-- vocab strip -->
    <div class="vocab-strip">
      <div class="vocab-strip-ttl">📝 本課核心單字（點擊聽發音）</div>
      <div class="vocab-chips" id="vocabChips"></div>
    </div>
    <!-- article -->
    <div class="article-card">
      <div class="art-header">
        <div class="art-num" id="artNum"></div>
        <div class="art-title" id="artTitle"></div>
        <div class="art-wc" id="artWc"></div>
      </div>
      <div class="art-body">
        <div class="art-en" id="artEn"></div>
        <div class="art-divider"></div>
        <div class="art-zh" id="artZh"></div>
      </div>
    </div>
    <!-- audio -->
    <div class="audio-card">
      <!-- reading progress bar -->
      <div id="readProgressWrap" style="display:none;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:.72rem;font-weight:800;color:var(--muted);margin-bottom:4px">
          <span>🎯 跟讀進度</span><span id="readPct">0%</span>
        </div>
        <div style="background:#F0F7FF;border-radius:50px;height:8px;overflow:hidden">
          <div id="readBar" style="height:100%;width:0%;background:linear-gradient(90deg,#43A047,#66BB6A);border-radius:50px;transition:width .3s"></div>
        </div>
      </div>
      <div class="audio-row">
        <button class="aud-btn aud-play" id="playBtn" onclick="playArt()">▶️ 跟讀</button>

"board game","laughed","Friendship","fun"],"en":"Leo and a friend played a board game after school. They laughed a lot. Friendship makes everything more fun.","zh":"Leo和一個朋友放學後玩了桌遊。他們笑了很多。友誼讓一切更有趣。"}]},"3":{"1":[{"title":"#1","vocab":["night market","local","snacks","travel","tasting"],"en":"Last weekend, Kai went to Jiufen with the family. They visited a night market and tried many local snacks. Kai loved the stinky tofu, even though it smelled strange at first. Dad said, \"That's the beauty of travel — tasting something new!\" Kai agreed and asked to come back next month.","zh":"上個週末，Kai和家人去了Jiufen。他們參觀了一個夜市，嚐試了許多當地小吃。Kai愛上了臭豆腐，雖然一開始聞起來很奇怪。爸爸說：「這就是旅行的美妙之處——嚐試新東西！」Kai同意了，並要求下個月再來。"},{"title":"#2","vocab":["injured","carefully","volunteer","healthy","kindness"],"en":"Tom found a small injured bird under the school tree. Tom carefully picked it up and brought it to the teacher. The teacher called a wildlife center, and a volunteer came to help. Three days later, the bird was healthy again. Tom felt proud because one small act of kindness made a real difference.","zh":"Tom在學校的樹下發現了一隻受傷的小鳥。Tom小心地把牠撿起來，帶去給老師。老師打電話給野生動物中心，一位義工來幫忙了。三天後，小鳥恢復健康。Tom感到驕傲，因為一個小小的善舉帶來了真實的改變。"},{"title":"#3","vocab":["evaporates","clouds","whispered","gentle","cycle"],"en":"In science class, Lily learned about the water cycle. Water evaporates from the ocean, forms clouds, and then falls as rain. Lily thought it was like magic. That afternoon, when it rained, Lily stood by the window and whispered, \"I know where you come from.\" The rain seemed to reply with a gentle drizzle.","zh":"在自然課上，Lily學到了關於水循環的知識。水從海洋蒸發，形成雲朵，然後以雨水的形式落下。Lily覺得這就像魔法一樣。那天下午下雨時，Lily站在窗邊低聲說：「我知道你從哪裡來。」雨水似乎用輕柔的細雨回應了。"},{"title":"#4","vocab":["planted","watered","shoot","patience","appeared"],"en":"Max decided to plant a seed in a small pot. Every morning before school, Max watered it and talked to it softly. Two weeks later, a tiny green shoot appeared. Max jumped with joy and called Mom. \"Plants grow when you give them love and patience,\" Mom said with a smile. Max never forgot those words.","zh":"Max決定在一個小花盆裡種下一顆種子。每天上學前，Max都給它澆水，並輕聲和它說話。兩週後，一株細小的綠芽出現了。Max高興地跳起來，叫了媽媽。「植物在你給它愛和耐心的時候就會生長，」媽媽微笑著說。Max永遠記住了這句話。"},{"title":"#5","vocab":["talent","nervous","traditional","audience","cheered"],"en":"The school held a talent show. Mia was nervous but decided to perform a traditional dance. Mia practiced for two weeks in the living room. On stage, the lights were bright and the audience was large. Mia took a deep breath and began. When the music ended, everyone cheered loudly. Mia bowed and felt incredible.","zh":"學校舉辦了才藝表演。Mia很緊張，但決定表演一支傳統舞蹈。Mia在客廳練習了兩週。在舞台上，燈光很亮，觀眾很多。Mia深吸一口氣，開始了。音樂結束時，大家大聲歡呼。Mia鞠了個躬，感覺非常好。"},{"title":"#6","vocab":["recycling","newspapers","sorted","reused","creativity"],"en":"Alex's class started a recycling project. Each student brought old newspapers and plastic bottles from home. They sorted everything carefully and learned which materials can be reused. Alex made a small toy car from an empty bottle. The teacher displayed it in the classroom. \"This is what creativity looks like,\" she said proudly.","zh":"Alex的班級開展了一個回收再利用專題。每個學生從家裡帶來了舊報紙和塑膠瓶。他們仔細地分類，並學到了哪些材料可以重複使用。Alex用一個空瓶子做了一輛小玩具車。老師把它展示在教室裡。「這就是創意的樣子，」她驕傲地說。"},{"title":"#7","vocab":["typhoon","cancelled","powerful","respect","prepared"],"en":"During a typhoon warning, school was cancelled. Anna stayed home and looked out the window. The wind bent the trees sideways and rain covered the streets. Anna felt a mix of excitement and worry. That night, Anna wrote in a diary: \"Nature is powerful. We should respect it and always be prepared.\"","zh":"在颱風警報期間，學校停課了。Anna待在家裡，看著窗外。風把樹吹得橫斜，雨水覆蓋了街道。Anna感到既興奮又擔心。那天晚上，Anna在日記裡寫道：「大自然是有力量的。我們應該尊重它，並時刻做好準備。」"},{"title":"#8","vocab":["reading club","inspired","list","countries","someday"],"en":"Ren joined the school reading club. Every two weeks, members chose a book and shared their thoughts. One month, they read a story about a girl who traveled the world alone. Ren was inspired and made a list of ten countries to visit someday. The teacher said, \"Books open doors that walls can never close.\"","zh":"Ren加入了學校讀書俱樂部。每兩週，成員選一本書並分享他們的想法。有一個月，他們讀了一個關於獨自環遊世界的女孩的故事。Ren受到啟發，列了一份想去的十個國家的清單。老師說：「書籍打開了牆壁永遠關不了的門。」"},{"title":"#9","vocab":["janitor","hallway","mop","warmly","atmosphere"],"en":"One morning, Amy arrived at school early and noticed the janitor cleaning the hallway alone. Amy picked up a mop and helped without being asked. Other students saw this and joined in. In ten minutes, the whole floor was clean. The janitor smiled warmly. Small acts of helping, Amy realized, can change the mood of an entire day.","zh":"一天早上，Amy早早到了學校，注意到清潔工獨自一人在清掃走廊。Amy拿起一把拖把，不需要別人要求就幫忙了。其他同學看到了，也加入進來。十分鐘內，整個地板都乾淨了。清潔工溫暖地微笑著。Amy意識到，小小的幫忙可以改變一整天的氛圍。"},{"title":"#10","vocab":["panicked","advice","calm","trusted","explained"],"en":"Leo got lost during a school trip to Taidong. At first, Leo panicked. Then Leo remembered the teacher's advice: stay calm, find a safe place, and ask a trusted adult for help. Leo walked to a nearby store and explained the situation. The store owner called the school. Twenty minutes later, the class found Leo safe and sound.","zh":"Leo在Taidong的學校郊遊中迷路了。起初，Leo很慌張。然後Leo想起了老師的建議：保持冷靜，找一個安全的地方，向可信賴的大人求助。Leo走到附近的一家店，說明了情況。店主打電話給學校。二十分鐘後，全班找到了Leo，安然無恙。"},{"title":"#11","vocab":["night market","local","snacks","travel","tasting"],"en":"Last weekend, Emma went to Yilan with the family. They visited a night market and tried many local snacks. Emma loved the stinky tofu, even though it smelled strange at first. Dad said, \"That's the beauty of travel — tasting something new!\" Emma agreed and asked to come back next month.","zh":"上個週末，Emma和家人去了Yilan。他們參觀了一個夜市，嚐試了許多當地小吃。Emma愛上了臭豆腐，雖然一開始聞起來很奇怪。爸爸說：「這就是旅行的美妙之處——嚐試新東西！」Emma同意了，並要求下個月再來。"},{"title":"#12","vocab":["injured","carefully","volunteer","healthy","kindness"],"en":"Sam found a small injured bird under the school tree. Sam carefully picked it up and brought it to the teacher. The teacher called a pot. Every morning before school, Max watered it and talked to it softly. Two weeks later, a tiny green shoot appeared. Max jumped with joy and called Mom. \"Plants grow when you give them love and patience,\" Mom said with a smile. Max never forgot those words.","zh":"Max決定在一個小花盆裡種下一顆種子。每天上學前，Max都給它澆水，並輕聲和它說話。兩週後，一株細小的綠芽出現了。Max高興地跳起來，叫了媽媽。「植物在你給它愛和耐心的時候就會生長，」媽媽微笑著說。Max永遠記住了這句話。"},{"title":"#25","vocab":["talent","nervous","traditional","audience","cheered"],"en":"The school held a talent show. Mia was nervous but decided to perform a traditional dance. Mia practiced for two weeks in the living room. On stage, the lights were bright and the audience was large. Mia took a deep breath and began. When the music ended, everyone cheered loudly. Mia bowed and felt incredible.","zh":"學校舉辦了才藝表演。Mia很緊張，但決定表演一支傳統舞蹈。Mia在客廳練習了兩週。在舞台上，燈光很亮，觀眾很多。Mia深吸一口氣，開始了。音樂結束時，大家大聲歡呼。Mia鞠了個躬，感覺非常好。"},{"title":"#26","vocab":["recycling","newspapers","sorted","reused","creativity"],"en":"Alex's class started a recycling project. Each student brought old newspapers and plastic bottles from home. They sorted everything carefully and learned which materials can be reused. Alex made a small toy car from an empty bottle. The teacher displayed it in the classroom. \"This is what creativity looks like,\" she said proudly.","zh":"Alex的班級開展了一個回收再利用專題。每個學生從家裡帶來了舊報紙和塑膠瓶。他們仔細地分類，並學到了哪些材料可以重複使用。Alex用一個空瓶子做了一輛小玩具車。老師把它展示在教室裡。「這就是創意的樣子，」她驕傲地說。"},{"title":"#27","vocab":["typhoon","cancelled","powerful","respect","prepared"],"en":"During a typhoon warning, school was cancelled. Anna stayed home and looked out the window. The wind bent the trees sideways and rain covered the streets. Anna felt a mix of excitement and worry. That night, Anna wrote in a diary: \"Nature is powerful. We should respect it and always be prepared.\"","zh":"在颱風警報期間，學校停課了。Anna待在家裡，看著窗外。風把樹吹得橫斜，雨水覆蓋了街道。Anna感到既興奮又擔心。那天晚上，Anna在日記裡寫道：「大自然是有力量的。我們應該尊重它，並時刻做好準備。」"},{"title":"#28","vocab":["reading club","inspired","list","countries","someday"]  prepared.\"","zh":"在颱風警報期間，學校停課了。Anna待在家裡，看著窗外。風把樹吹得橫斜，雨水覆蓋了街道。Anna感到既興奮又擔心。那天晚上，Anna在日記裡寫道：「大自然是有力量的。我們應該尊重它，並時刻做好準備。」"},{"title":"#48","vocab":["reading club","inspired","list","countries","someday"],"en":"Ren joined the school reading club. Every two weeks, members chose a book and shared their thoughts. One month, they read a story about a girl who traveled the world alone. Ren was inspired and made a list of ten countries to visit someday. The teacher said, \"Books open doors that walls can never close.\"","zh":"Ren加入了學校讀書俱樂部。每兩週，成員選一本書並分享他們的想法。有一個月，他們讀了一個關於獨自環遊世界的女孩的故事。Ren受到啟發，列了一份想去的十個國家的清單。老師說：「書籍打開了牆壁永遠關不了的門。」"},{"title":"#49","vocab":["janitor","hallway","mop","warmly","atmosphere"],"en":"One morning, Amy arrived at school early and noticed the janitor cleaning the hallway alone. Amy picked up a mop and helped without being asked. Other students saw this and joined in. In ten minutes, the whole floor was clean. The janitor smiled warmly. Small acts of helping, Amy realized, can change the mood of an entire day.","zh":"一天早上，Amy早早到了學校，注意到清潔工獨自一人在清掃走廊。Amy拿起一把拖把，不需要別人要求就幫忙了。其他同學看到了，也加入進來。十分鐘內，整個地板都乾淨了。清潔工溫暖地微笑著。Amy意識到，小小的幫忙可以改變一整天的氛圍。"},{"title":"#50","vocab":["panicked","advice","calm","trusted","explained"],"en":"Leo got lost during a school trip to Sun Moon Lake. At first, Leo panicked. Then Leo remembered the teacher's advice: stay calm, find a safe place, and ask a trusted adult for help. Leo walked to a nearby store and explained the situation. The store owner called the school. Twenty minutes later, the class found Leo safe and sound.","zh":"Leo在Sun Moon Lake的學校郊遊中迷路了。起初，Leo很慌張。然後Leo想起了老師的建議：保持冷靜，找一個安全的地方，向可信賴的大人求助。Leo走到附近的一家店，說明了情況。店主打電話給學校。二十分鐘後，全班找到了Leo，安然無恙。"},{"title":"#51","vocab":["night market","local","snacks","travel","tasting"],"en":"Last weekend, Emma went to Kaohsiung with the family. They visited a night market and tried many local snacks. Emma loved the stinky tofu, even though it smelled strange at first. Dad said, \"That's the beauty o weekend, Emma went to Yilan with the family. They visited a night market and tried many local snacks. Emma loved the stinky tofu, even though it smelled strange at first. Dad said, \"That's the beauty of travel — tasting something new!\" Emma agreed and asked to come back next month.","zh":"上個週末，Emma和家人去了Yilan。他們參觀了一個夜市，嚐試了許多當地小吃。Emma愛上了臭豆腐，雖然一開始聞起來很奇怪。爸爸說：「這就是旅行的美妙之處——嚐試新東西！」Emma同意了，並要求下個月再來。"},{"title":"#72","vocab":["injured","carefully","volunteer","healthy","kindness"],"en":"Sam found a small injured bird under the school tree. Sam carefully picked it up and brought it to the teacher. The teacher called a wildlife center, and a volunteer came to help. Three days later, the bird was healthy again. Sam felt proud because one small act of kindness made a real difference.","zh":"Sam在學校的樹下發現了一隻受傷的小鳥。Sam小心地把牠撿起來，帶去給老師。老師打電話給野生動物中心，一位義工來幫忙了。三天後，小鳥恢復健康。Sam感到驕傲，因為一個小小的善舉帶來了真實的改變。"},{"title":"#73","vocab":["evaporates","clouds","whispered","gentle","cycle"],"en":"In science class, Coco learned about the water cycle. Water evaporates from the ocean, forms clouds, and then falls as rain. Coco thought it was like magic. That afternoon, when it rained, Coco stood by the window and whispered, \"I know where you come from.\" The rain seemed to reply with a gentle drizzle.","zh":"在自然課上，Coco學到了關於水循環的知識。水從海洋蒸發，形成雲朵，然後以雨水的形式落下。Coco覺得這就像魔法一樣。那天下午下雨時，Coco站在窗邊低聲說：「我知道你從哪裡來。」雨水似乎用輕柔的細雨回應了。"},{"title":"#74","vocab":["planted","watered","shoot","patience","appeared"],"en":"Tim decided to plant a seed in a small pot. Every morning before school, Tim watered it and talked to it softly. Two weeks later, a tiny green shoot appeared. Tim jumped with joy and called Mom. \"Plants grow when you give them love and patience,\" Mom said with a smile. Tim never forgot those words.","zh":"Tim決定在一個小花盆裡種下一顆種子。每天上學前，Tim都給它澆水，並輕聲和它說話。兩週後，一株細小的綠芽出現了。Tim高興地跳起來，叫了媽媽。「植物在你給它愛和耐心的時候就會生長，」媽媽微笑著說。Tim永遠記住了這句話。"},{"title":"#75","vocab":["talent","nervous","traditional","audience","cheered"],"en":"The school held 種子。每天上學前，Tim都給它澆水，並輕聲和它說話。兩週後，一株細小的綠芽出現了。Tim高興地跳起來，叫了媽媽。「植物在你給它愛和耐心的時候就會生長，」媽媽微笑著說。Tim永遠記住了這句話。"},{"title":"#95","vocab":["talent","nervous","traditional","audience","cheered"],"en":"The school held a talent show. Mei was nervous but decided to perform a traditional dance. Mei practiced for two weeks in the living room. On stage, the lights were bright and the audience was large. Mei took a deep breath and began. When the music ended, everyone cheered loudly. Mei bowed and felt incredible.","zh":"學校舉辦了才藝表演。Mei很緊張，但決定表演一支傳統舞蹈。Mei在客廳練習了兩週。在舞台上，燈光很亮，觀眾很多。Mei深吸一口氣，開始了。音樂結束時，大家大聲歡呼。Mei鞠了個躬，感覺非常好。"},{"title":"#96","vocab":["recycling","newspapers","sorted","reused","creativity"],"en":"Ben's class started a recycling project. Each student brought old newspapers and plastic bottles from home. They sorted everything carefully and learned which materials can be reused. Ben made a small toy car from an empty bottle. The teacher displayed it in the classroom. \"This is what creativity looks like,\" she said proudly.","zh":"Ben的班級開展了一個回收再利用專題。每個學生從家裡帶來了舊報紙和塑膠瓶。他們仔細地分類，並學到了哪些材料可以重複使用。Ben用一個空瓶子做了一輛小玩具車。老師把它展示在教室裡。「這就是創意的樣子，」她驕傲地說。"},{"title":"#97","vocab":["typhoon","cancelled","powerful","respect","prepared"],"en":"During a typhoon warning, school was cancelled. Zoe stayed home and looked out the window. The wind bent the trees sideways and rain covered the streets. Zoe felt a mix of excitement and worry. That night, Zoe wrote in a diary: \"Nature is powerful. We should respect it and always be prepared.\"","zh":"在颱風警報期間，學校停課了。Zoe待在家裡，看著窗外。風把樹吹得橫斜，雨水覆蓋了街道。Zoe感到既興奮又擔心。那天晚上，Zoe在日記裡寫道：「大自然是有力量的。我們應該尊重它，並時刻做好準備。」"},{"title":"#98","vocab":["reading club","inspired","list","countries","someday"],"en":"Jack joined the school reading club. Every two weeks, members chose a book and shared their thoughts. One month, they read a story about a girl who traveled the world alone. Jack was inspired and made a list of ten countries to visit someday. The teacher said, \"Books open doors that wall  shared their thoughts. One month, they read a story about a girl who traveled the world alone. Zoe was inspired and made a list of ten countries to visit someday. The teacher said, \"Books open doors that walls can never close.\"","zh":"Zoe加入了學校讀書俱樂部。每兩週，成員選一本書並分享他們的想法。有一個月，他們讀了一個關於獨自環遊世界的女孩的故事。Zoe受到啟發，列了一份想去的十個國家的清單。老師說：「書籍打開了牆壁永遠關不了的門。」"},{"title":"#19","vocab":["janitor","hallway","mop","warmly","atmosphere"],"en":"One morning, Jack arrived at school early and noticed the janitor cleaning the hallway alone. Jack picked up a mop and helped without being asked. Other students saw this and joined in. In ten minutes, the whole floor was clean. The janitor smiled warmly. Small acts of helping, Jack realized, can change the mood of an entire day.","zh":"一天早上，Jack早早到了學校，注意到清潔工獨自一人在清掃走廊。Jack拿起一把拖把，不需要別人要求就幫忙了。其他同學看到了，也加入進來。十分鐘內，整個地板都乾淨了。清潔工溫暖地微笑著。Jack意識到，小小的幫忙可以改變一整天的氛圍。"},{"title":"#20","vocab":["panicked","advice","calm","trusted","explained"],"en":"Nina got lost during a school trip to Hsinchu. At first, Nina panicked. Then Nina remembered the teacher's advice: stay calm, find a safe place, and ask a trusted adult for help. Nina walked to a nearby store and explained the situation. The store owner called the school. Twenty minutes later, the class found Nina safe and sound.","zh":"Nina在Hsinchu的學校郊遊中迷路了。起初，Nina很慌張。然後Nina想起了老師的建議：保持冷靜，找一個安全的地方，向可信賴的大人求助。Nina走到附近的一家店，說明了情況。店主打電話給學校。二十分鐘後，全班找到了Nina，安然無恙。"},{"title":"#21","vocab":["night market","local","snacks","travel","tasting"],"en":"Last weekend, Ruby went to Tainan with the family. They visited a night market and tried many local snacks. Ruby loved the stinky tofu, even though it smelled strange at first. Dad said, \"That's the beauty of travel — tasting something new!\" Ruby agreed and asked to come back next month.","zh":"上個週末，Ruby和家人去了Tainan。他們參觀了一個夜市，嚐試了許多當地小吃。Ruby愛上了臭豆腐，雖然一開始聞起來很奇怪。爸爸說：「這就是旅行的美妙之處——嚐試新東西！」Ruby同意了，並要求下個月再來。"},{"title":"#22","vocab":["injured","carefully","volunteer","healthy","kindness"],"en":"K back next month.","zh":"上個週末，Ruby和家人去了Sun Moon Lake。他們參觀了一個夜市，嚐試了許多當地小吃。Ruby愛上了臭豆腐，雖然一開始聞起來很奇怪。爸爸說：「這就是旅行的美妙之處——嚐試新東西！」Ruby同意了，並要求下個月再來。"},{"title":"#42","vocab":["injured","carefully","volunteer","healthy","kindness"],"en":"Kai found a small injured bird under the school tree. Kai carefully picked it up and brought it to the teacher. The teacher called a wildlife center, and a volunteer came to help. Three days later, the bird was healthy again. Kai felt proud because one small act of kindness made a real difference.","zh":"Kai在學校的樹下發現了一隻受傷的小鳥。Kai小心地把牠撿起來，帶去給老師。老師打電話給野生動物中心，一位義工來幫忙了。三天後，小鳥恢復健康。Kai感到驕傲，因為一個小小的善舉帶來了真實的改變。"},{"title":"#43","vocab":["evaporates","clouds","whispered","gentle","cycle"],"en":"In science class, Tom learned about the water cycle. Water evaporates from the ocean, forms clouds, and then falls as rain. Tom thought it was like magic. That afternoon, when it rained, Tom stood by the window and whispered, \"I know where you come from.\" The rain seemed to reply with a gentle drizzle.","zh":"在自然課上，Tom學到了關於水循環的知識。水從海洋蒸發，形成雲朵，然後以雨水的形式落下。Tom覺得這就像魔法一樣。那天下午下雨時，Tom站在窗邊低聲說：「我知道你從哪裡來。」雨水似乎用輕柔的細雨回應了。"},{"title":"#44","vocab":["planted","watered","shoot","patience","appeared"],"en":"Lily decided to plant a seed in a small pot. Every morning before school, Lily watered it and talked to it softly. Two weeks later, a tiny green shoot appeared. Lily jumped with joy and called Mom. \"Plants grow when you give them love and patience,\" Mom said with a smile. Lily never forgot those words.","zh":"Lily決定在一個小花盆裡種下一顆種子。每天上學前，Lily都給它澆水，並輕聲和它說話。兩週後，一株細小的綠芽出現了。Lily高興地跳起來，叫了媽媽。「植物在你給它愛和耐心的時候就會生長，」媽媽微笑著說。Lily永遠記住了這句話。"},{"title":"#45","vocab":["talent","nervous","traditional","audience","cheered"],"en":"The school held a talent show. Max was nervous but decided to perform a traditional dance. Max practiced for two weeks in the living room. On stage, the lights were bright and the audience was large. Max took a deep breath and began. When the music ended, everyone cheered  a traditional dance. Max practiced for two weeks in the living room. On stage, the lights were bright and the audience was large. Max took a deep breath and began. When the music ended, everyone cheered loudly. Max bowed and felt incredible.","zh":"學校舉辦了才藝表演。Max很緊張，但決定表演一支傳統舞蹈。Max在客廳練習了兩週。在舞台上，燈光很亮，觀眾很多。Max深吸一口氣，開始了。音樂結束時，大家大聲歡呼。Max鞠了個躬，感覺非常好。"},{"title":"#66","vocab":["recycling","newspapers","sorted","reused","creativity"],"en":"Mia's class started a recycling project. Each student brought old newspapers and plastic bottles from home. They sorted everything carefully and learned which materials can be reused. Mia made a small toy car from an empty bottle. The teacher displayed it in the classroom. \"This is what creativity looks like,\" she said proudly.","zh":"Mia的班級開展了一個回收再利用專題。每個學生從家裡帶來了舊報紙和塑膠瓶。他們仔細地分類，並學到了哪些材料可以重複使用。Mia用一個空瓶子做了一輛小玩具車。老師把它展示在教室裡。「這就是創意的樣子，」她驕傲地說。"},{"title":"#67","vocab":["typhoon","cancelled","powerful","respect","prepared"],"en":"During a typhoon warning, school was cancelled. Alex stayed home and looked out the window. The wind bent the trees sideways and rain covered the streets. Alex felt a mix of excitement and worry. That night, Alex wrote in a diary: \"Nature is powerful. We should respect it and always be prepared.\"","zh":"在颱風警報期間，學校停課了。Alex待在家裡，看著窗外。風把樹吹得橫斜，雨水覆蓋了街道。Alex感到既興奮又擔心。那天晚上，Alex在日記裡寫道：「大自然是有力量的。我們應該尊重它，並時刻做好準備。」"},{"title":"#68","vocab":["reading club","inspired","list","countries","someday"],"en":"Anna joined the school reading club. Every two weeks, members chose a book and shared their thoughts. One month, they read a story about a girl who traveled the world alone. Anna was inspired and made a list of ten countries to visit someday. The teacher said, \"Books open doors that walls can never close.\"","zh":"Anna加入了學校讀書俱樂部。每兩週，成員選一本書並分享他們的想法。有一個月，他們讀了一個關於獨自環遊世界的女孩的故事。Anna受到啟發，列了一份想去的十個國家的清單。老師說：「書籍打開了牆壁永遠關不了的門。」"},{"title":"#69","vocab":["janitor","hallway","mop","warmly","atmosphere"],"en":"One morning, Ren arrived at sch 樂部。每兩週，成員選一本書並分享他們的想法。有一個月，他們讀了一個關於獨自環遊世界的女孩的故事。Anna受到啟發，列了一份想去的十個國家的清單。老師說：「書籍打開了牆壁永遠關不了的門。」"},{"title":"#89","vocab":["janitor","hallway","mop","warmly","atmosphere"],"en":"One morning, Ren arrived at school early and noticed the janitor cleaning the hallway alone. Ren picked up a mop and helped without being asked. Other students saw this and joined in. In ten minutes, the whole floor was clean. The janitor smiled warmly. Small acts of helping, Ren realized, can change the mood of an entire day.","zh":"一天早上，Ren早早到了學校，注意到清潔工獨自一人在清掃走廊。Ren拿起一把拖把，不需要別人要求就幫忙了。其他同學看到了，也加入進來。十分鐘內，整個地板都乾淨了。清潔工溫暖地微笑著。Ren意識到，小小的幫忙可以改變一整天的氛圍。"},{"title":"#90","vocab":["panicked","advice","calm","trusted","explained"],"en":"Amy got lost during a school trip to Kaohsiung. At first, Amy panicked. Then Amy remembered the teacher's advice: stay calm, find a safe place, and ask a trusted adult for help. Amy walked to a nearby store and explained the situation. The store owner called the school. Twenty minutes later, the class found Amy safe and sound.","zh":"Amy在Kaohsiung的學校郊遊中迷路了。起初，Amy很慌張。然後Amy想起了老師的建議：保持冷靜，找一個安全的地方，向可信賴的大人求助。Amy走到附近的一家店，說明了情況。店主打電話給學校。二十分鐘後，全班找到了Amy，安然無恙。"},{"title":"#91","vocab":["night market","local","snacks","travel","tasting"],"en":"Last weekend, Leo went to Taichung with the family. They visited a night market and tried many local snacks. Leo loved the stinky tofu, even though it smelled strange at first. Dad said, \"That's the beauty of travel — tasting something new!\" Leo agreed and asked to come back next month.","zh":"上個週末，Leo和家人去了Taichung。他們參觀了一個夜市，嚐試了許多當地小吃。Leo愛上了臭豆腐，雖然一開始聞起來很奇怪。爸爸說：「這就是旅行的美妙之處——嚐試新東西！」Leo同意了，並要求下個月再來。"},{"title":"#92","vocab":["injured","carefully","volunteer","healthy","kindness"],"en":"Emma found a small injured bird under the school tree. Emma carefully picked it up and brought it to the teacher. The teacher called a wildlife center, and a volunteer came to help. Three days later, the bird was healthy again. Emma felt proud because one small a ed to a nearby store and explained the situation. The store owner called the school. Twenty minutes later, the class found Nina safe and sound.","zh":"Nina在Jiufen的學校郊遊中迷路了。起初，Nina很慌張。然後Nina想起了老師的建議：保持冷靜，找一個安全的地方，向可信賴的大人求助。Nina走到附近的一家店，說明了情況。店主打電話給學校。二十分鐘後，全班找到了Nina，安然無恙。"}]},"4":{"1":[{"title":"#1","vocab":["electricity","experiment","connected","engineer","planted"],"en":"Last month, Leo's class went on a field trip to a science museum in Alishan. The guide showed them how electricity works and let them try a fun experiment. Leo and a partner connected wires to make a small light bulb glow. \"We did it!\" they shouted. On the bus ride home, Leo kept thinking about becoming an engineer someday. That single afternoon had planted a seed that would take years to grow.","zh":"上個月，Leo的班去Alishan的科學博物館進行了一次校外教學。導覽員向他們展示了電是如何運作的，並讓他們嘗試了一個有趣的實驗。Leo和一個夥伴連接電線，讓一個小燈泡發光。「我們做到了！」他們大喊。在回家的巴士上，Leo一直在想著有一天成為一名工程師。那個下午種下了一顆需要多年才能發芽的種子。"},{"title":"#2","vocab":["competition","traditional","specialty","recipe","aroma"],"en":"Emma signed up for the school cooking competition. The task was to make a traditional Taiwanese dish. Emma chose to prepare braised pork rice, which was Grandpa's specialty. For two weeks, Emma practiced the recipe at home every evening. On competition day, the aroma filled the entire hall. The judges tasted it and smiled. Emma did not win first place, but Grandpa watched from the back and wiped a small tear from his eye.","zh":"Emma報名了學校的烹飪比賽。任務是做一道台灣傳統料理。Emma選擇了爺爺的拿手菜——滷肉飯。兩週來，Emma每天晚上在家練習食譜。比賽當天，香味瀰漫了整個大廳。評審品嚐後微笑了。Emma沒有得第一名，但爺爺在後面看著，悄悄擦了擦眼淚。"},{"title":"#3","vocab":["stray","frightened","shelter","volunteer","carrier"],"en":"A stray dog appeared near Sam's school one morning. It was thin and looked frightened. Sam asked the teacher what to do. Together, they contacted the local animal shelter. A volunteer arrived and gently placed the dog in a carrier. \"Animals cannot speak,\" the volunteer said, \"so humans must speak for them.\" Sam thought about those words for a long time and later decided to volunteer at the shelter every other Saturday.","zh":"一天早上，一隻流浪狗出現在Sam的學校附近。牠又瘦又看起來很害怕。Sam問老師該怎麼辦。他們一起聯繫了當地的動物收容所。一位義工到來，輕輕地將狗放入了籠子裡。「動物不會說話，」義工說，「所以人類必須替牠們說話。」Sam思考了這句話很久，後來決定每隔一個星期六去收容所當義工。"},{"title":"#4","vocab":["rooftop","responsible","harvested","patience","teamwork"],"en":"This year, Coco's school started a garden project on the rooftop. Each class was responsible for one section. Coco's class chose to grow tomatoes and sweet potatoes. They learned about soil quality, sunlight, and watering schedules. Three months later, they harvested enough vegetables to cook a meal for the whole class. The teacher said, \"You didn't just grow food. You grew patience, teamwork, and pride.\" Everyone agreed.","zh":"今年，Coco的學校在屋頂啟動了一個花園專題。每個班負責一個區域。Coco的班選擇種植番茄和地瓜。他們學到了關於土壤質量、陽光和澆水時間的知識。三個月後，他們收穫了足夠的蔬菜，為全班做了一頓飯。老師說：「你們不只是種了食物，也培育了耐心、團隊合作和驕傲感。」大家都同意。"},{"title":"#5","vocab":["afraid","announced","rehearsed","conquered","fear"],"en":"Tim had always been afraid of speaking in front of the class. When the teacher announced a speech competition, Tim's heart sank. But a classmate said, \"I'll practice with you every day after school.\" They rehearsed in the park, in the hallway, even during lunch. On competition day, Tim's voice shook at first but grew stronger with each sentence. The class clapped. Tim did not win, but had conquered something far more important: fear.","zh":"Tim一直害怕在班上發言。當老師宣布演講比賽時，Tim心沉了下去。但一個同學說：「我每天放學後都和你練習。」他們在公園裡、走廊上、甚至午餐時間都在排練。比賽那天，Tim的聲音起初顫抖，但每一句話都越來越有力量。全班鼓掌了。Tim沒有贏，但征服了一件更重要的事：恐懼。"},{"title":"#6","vocab":["flooded","donation","blankets","affected","handwritten"],"en":"During a heavy rainstorm, the river near Jiufen flooded a small community. Mei's class organized a donation drive, collecting clothes, food, and blankets. Mei wrote a letter to include with each package: \"We don't know you, but we care about you.\" A month later, a class from the affected area sent a handwritten thank-you card. Mei framed it and hung it above the desk. Some things are more valuable than any grade.","zh":"一場大暴雨後，Jiufen附近的河流淹沒了一個小社區。Mei的班組織了捐贈活動，收集了衣服、食物和毛毯。Mei寫了一封信附在每個包裹裡：「我們不認識你，但我們關心你。」一個月後，受災地區的一個班寄來了一張手寫感謝卡。Mei把它裱起來，掛在書桌上方。有些東西比任何成績都更有價值。"},{"title":"#7","vocab":["Japanese","illustrations","translated","international","treasures"],"en":"Ben discovered that the school library had books in Japanese, French, and Arabic. Curious, Ben checked out a simple Japanese picture book. Although Ben could not read the words, the illustrations told a clear story about a lonely moon. Ben showed it to the librarian, who translated a few lines. From that day, Ben visited the international section every week, slowly collecting words from different languages like rare treasures.","zh":"Ben發現學校圖書館有日文、法文和阿拉伯文的書。出於好奇，Ben借了一本簡單的日文圖畫書。雖然Ben看不懂文字，但插圖清楚地講述了一個關於孤獨月亮的故事。Ben把它給圖書館員看，圖書館員翻譯了幾行。從那天起，Ben每週都去國際書區，慢慢地收集不同語言的詞彙，就像珍稀的寶藏一樣。"},{"title":"#8","vocab":["struggling","hesitation","groceries","praise","audience"],"en":"One winter morning, Zoe found an elderly neighbor struggling to carry groceries up the stairs. Without hesitation, Zoe helped carry every bag. The old man said, \"Young people today don't stop to help.\" Zoe smiled and said nothing. That evening at dinner, Mom said, \"I heard what you did.\" Zoe felt a quiet warmth — not from praise, but from knowing that kindness given without an audience is the truest kind.","zh":"一個冬天的早晨，Zoe看到一位年邁的鄰居在樓梯上費力地提著雜貨。Zoe毫不猶豫地幫忙提了每一個袋子。老人說：「現在的年輕人不會停下來幫忙了。」Zoe微笑著，什麼也沒說。那天晚上吃飯時，媽媽說：「我聽說了你做的事。」Zoe感到一陣靜靜的溫暖——不是來自讚美，而是知道不需要觀眾的善意才是最真實的善意。"},{"title":"#9","vocab":["exhibition","inspired","composition","stranger","effective"],"en":"For the art exhibition, Jack decided to create a painting inspired by Taichung. Jack spent three weekends mixing colors and adjusting the composition. On exhibition day, a visitor stopped in front of Jack's painting for a long time. \"What does this mean to you?\" the visitor asked. Jack explained, and the visitor listened carefully. \"Art that makes a stranger stop and ask questions is art that works,\" the visitor said. Jack never forgot those words.","zh":"為了藝術展覽，Jack決定創作一幅以Taichung為靈感的畫。Jack花了三個週末調色和調整構圖。展覽當天，一位訪客在Jack的畫前停留了很長時間。「這對你意味著什麼？」訪客問。Jack解釋了，訪客認真地聽著。「能讓陌生人停下來發問的藝術，才是真正有效的藝術，」訪客說。Jack永遠記住了這句話。"},{"title":"#10","vocab":["cleanup","pollution","proposed","principal","reduced"],"en":"Nina joined an environmental cleanup on the beach near Hsinchu. In two hours, the group collected twelve bags of trash. Nina was shocked by the amount of plastic. Back at school, Nina gave a short presentation about ocean pollution and proposed a \"no single-use plastic\" week for the whole school. The principal agreed to try it. Three months later, the school had reduced its plastic waste by forty percent. One voice, Nina learned, can echo farther than expected.","zh":"Nina參加了在Hsinchu附近海灘進行的環境清潔活動。兩小時內，小組收集了十二袋垃圾。Nina對塑膠的數量感到震驚。回到學校後，Nina做了一個關於海洋汙染的簡短報告，並提議全校進行一週「不使用一次性塑膠」活動。校長同意嘗試。三個月後，學校減少了百分之四十的塑膠廢物。Nina學到了，一個聲音可以傳得比預期的更遠。"},{"title":"#11","vocab":["electricity","experiment","connected","engineer","planted"],"en":"Last month, Ruby's class went on a field trip to a science museum in Tainan. The guide showed them how electricity works and let them try a fun experiment. Ruby and a partner connected wires to make a small light bulb glow. \"We did it!\" they shouted. On the bus ride home, Ruby kept thinking about becoming an engineer someday. That single afternoon had planted a seed that would take years to grow.","zh":"上個月，Ruby的班去Tainan的科學博物館進行了一次校外教學。導覽員向他們展示了電是如何運作的，並讓他們嘗試了一個有趣的實驗。Ruby和一個夥伴連接電線，讓一個小燈泡發光。「我們做到了！」他們大喊。在回家的巴士上，Ruby一直在想著有一天成為一名工程師。那個下午種下了一顆需要多年才能發芽的種子。"},{"title":"#12","vocab":["competition","traditional","specialty","recipe","aroma"],"en":"Kai signed up for the school cooking competition. The task was to make a traditional Taiwanese dish. Kai chose to prepare braised pork rice, which was Grandpa's specialty. For two weeks, Kai practiced the recipe at home every evening. On competition day, the aroma filled the entire hall. The judges tasted it and smiled. Kai did not win first place, but Grandpa watched from the back and wiped a small tear from his eye.","zh":"Kai報名了學校的烹飪比賽。任務是做一道台灣傳統料理。Kai選擇了爺爺的拿手菜——滷肉飯。兩週來，Kai每天晚上在家練習食譜。比賽當天，香味瀰漫了整個大廳。評審品嚐後微笑了。Kai沒有得第一名，但爺爺在後面看著，悄悄擦了擦眼淚。"},{"title":"#13","vocab":["stray","frightened","shelter","volunteer","carrier"],"en":"A stray dog appeared near Tom's school one morning. It was thin and looked frightened. Tom asked the teacher what to do. Together, they contacted the local animal shelter. A volunteer arrived and gently placed the dog in a carrier. \"Animals cannot speak,\" the volunteer said, \"so humans must speak for them.\" Tom thought about those words for a long time and later decided to volunteer at the shelter every other Saturday.","zh":"一天早上，一隻流浪狗出現在Tom的學校附近。牠又瘦又看起來很害怕。Tom問老師該怎麼辦。他們一起聯繫了當地的動物收容所。一位義工到來，輕輕地將狗放入了籠子裡。「動物不會說話，」義工說，「所以人類必須替牠們說話。」Tom思考了這句話很久，後來決定每隔一個星期六去收容所當義工。"},{"title":"#14","vocab":["rooftop","responsible","harvested","patience","teamwork"],"en":"This year, Lily's school started a garden project on the rooftop. Each class was responsible for one section. Lily's class chose to grow tomatoes and sweet potatoes. They learned about soil quality, sunlight, and watering schedules. Three months later, they harvested enough vegetables to cook a meal for the whole class. The teacher said, \"You didn't just grow food. You grew patience, teamwork, and pride.\" Everyone agreed.","zh":"今年，Lily的學校在屋頂啟動了一個花園專題。每個班負責一個區域。Lily的班選擇種植番茄和地瓜。他們學到了關於土壤質量、陽光和澆水時間的知識。三個月後，他們收穫了足夠的蔬菜，為全班做了一頓飯。老師說：「你們不只是種了食物，也培育了耐心、團隊合作和驕傲感。」大家都同意。"},{"title":"#15","vocab":["afraid","announced","rehearsed","conquered","fear"],"en":"Max had always been afraid of speaking in front of the class. When the teacher announced a speech competition, Max's heart sank. But a classmate said, \"I'll practice with you every day after school.\" They rehearsed in the park, in the hallway, even during lunch. On competition day, Max's voice shook at first but grew stronger ranslated a few lines. From that day, Ben visited the international section every week, slowly collecting words from different languages like rare treasures.","zh":"Ben發現學校圖書館有日文、法文和阿拉伯文的書。出於好奇，Ben借了一本簡單的日文圖畫書。雖然Ben看不懂文字，但插圖清楚地講述了一個關於孤獨月亮的故事。Ben把它給圖書館員看，圖書館員翻譯了幾行。從那天起，Ben每週都去國際書區，慢慢地收集不同語言的詞彙，就像珍稀的寶藏一樣。"},{"title":"#28","vocab":["struggling","hesitation","groceries","praise","audience"],"en":"One winter morning, Zoe found an elderly neighbor struggling to carry groceries up the stairs. Without hesitation, Zoe helped carry every bag. The old man said, \"Young people today don't stop to help.\" Zoe smiled and said nothing. That evening at dinner, Mom said, \"I heard what you did.\" Zoe felt a quiet warmth — not from praise, but from knowing that kindness given without an audience is the truest kind.","zh":"一個冬天的早晨，Zoe看到一位年邁的鄰居在樓梯上費力地提著雜貨。Zoe毫不猶豫地幫忙提了每一個袋子。老人說：「現在的年輕人不會停下來幫忙了。」Zoe微笑著，什麼也沒說。那天晚上吃飯時，媽媽說：「我聽說了你做的事。」Zoe感到一陣靜靜的溫暖——不是來自讚美，而是知道不需要觀眾的善意才是最真實的善意。"},{"title":"#29","vocab":["exhibition","inspired","composition","stranger","effective"],"en":"For the art exhibition, Jack decided to create a painting inspired by Kenting. Jack spent three weekends mixing colors and adjusting the composition. On exhibition day, a visitor stopped in front of Jack's painting for a long time. \"What does this mean to you?\" the visitor asked. Jack explained, and the visitor listened carefully. \"Art that makes a stranger stop and ask questions is art that works,\" the visitor said. Jack never forgot those words.","zh":"為了藝術展覽，Jack決定創作一幅以Kenting為靈感的畫。Jack花了三個週末調色和調整構圖。展覽當天，一位訪客在Jack的畫前停留了很長時間。「這對你意味著什麼？」訪客問。Jack解釋了，訪客認真地聽著。「能讓陌生人停下來發問的藝術，才是真正有效的藝術，」訪客說。Jack永遠記住了這句話。"},{"title":"#30","vocab":["cleanup","pollution","proposed","principal","reduced"],"en":"Nina joined an environmental cleanup on the beach near Jiufen. In two hours, the group collected twelve bags of trash. Nina was shocked by the amount of plastic. Back at school, Nina gave a short presentation about ocean pollution and proposed a \"no single-use plastic\" week for the whole school. The principal agreed to try it. Three months later, the school had reduced its plastic waste by forty percent. One voice, Nina learned, can echo farther than expected.","zh":"Nina參加了在Jiufen附近海灘進行的環境清潔活動。兩小時內，小組收集了十二袋垃圾。Nina對塑膠的數量感到震驚。回到學校後，Nina做了一個關於海洋汙染的簡短報告，並提議全校進行一週「不使用一次性塑膠」活動。校長同意嘗試。三個月後，學校減少了百分之四十的塑膠廢物。Nina學到了，一個聲音可以傳得比預期的更遠。"},{"title":"#31","vocab":["electricity","experiment","connected","engineer","planted"],"en":"Last month, Ruby's class went on a field trip to a science museum in Sun Moon Lake. The guide showed them how electricity works and let them try a fun experiment. Ruby and a partner connected wires to make a small light bulb glow. \"We did it!\" they shouted. On the bus ride home, Ruby kept thinking about becoming an engineer someday. That single afternoon had planted a seed that would take years to grow.","zh":"上個月，Ruby的班去Sun Moon Lake的科學博物館進行了一次校外教學。導覽員向他們展示了電是如何運作的，並讓他們嘗試了一個有趣的實驗。Ruby和一個夥伴連接電線，讓一個小燈泡發光。「我們做到了！」他們大喊。在回家的巴士上，Ruby一直在想著有一天成為一名工程師。那個下午種下了一顆需要多年才能發芽的種子。"},{"title":"#32","vocab":["competition","traditional","specialty","recipe","aroma"],"en":"Kai signed up for the school cooking competition. The task was to make a traditional Taiwanese dish. Kai chose to prepare braised pork rice, which was Grandpa's specialty. For two weeks, Kai practiced the recipe at home every evening. On competition day, the aroma filled the entire hall. The judges tasted it and smiled. Kai did not win first place, but Grandpa watched from the back and wiped a small tear from his eye.","zh":"Kai報名了學校的烹飪比賽。任務是做一道台灣傳統料理。Kai選擇了爺爺的拿手菜——滷肉飯。兩週來，Kai每天晚上在家練習食譜。比賽當天，香味瀰漫了整個大廳。評審品嚐後微笑了。Kai沒有得第一名，但爺爺在後面看著，悄悄擦了擦眼淚。"},{"title":"#33","vocab":["stray","frightened","shelter","volunteer","carrier"],"en":"A stray dog appeared near Tom's school one morning. It was thin and looked frightened. Tom asked the teacher what to do. Together, they contacted the local animal shelter. A volunteer arrived and gently placed the dog in hey rehearsed in the park, in the hallway, even during lunch. On competition day, Tim's voice shook at first but grew stronger with each sentence. The class clapped. Tim did not win, but had conquered something far more important: fear.","zh":"Tim一直害怕在班上發言。當老師宣布演講比賽時，Tim心沉了下去。但一個同學說：「我每天放學後都和你練習。」他們在公園裡、走廊上、甚至午餐時間都在排練。比賽那天，Tim的聲音起初顫抖，但每一句話都越來越有力量。全班鼓掌了。Tim沒有贏，但征服了一件更重要的事：恐懼。"},{"title":"#46","vocab":["flooded","donation","blankets","affected","handwritten"],"en":"During a heavy rainstorm, the river near Hsinchu flooded a small community. Mei's class organized a donation drive, collecting clothes, food, and blankets. Mei wrote a letter to include with each package: \"We don't know you, but we care about you.\" A month later, a class from the affected area sent a handwritten thank-you card. Mei framed it and hung it above the desk. Some things are more valuable than any grade.","zh":"一場大暴雨後，Hsinchu附近的河流淹沒了一個小社區。Mei的班組織了捐贈活動，收集了衣服、食物和毛毯。Mei寫了一封信附在每個包裹裡：「我們不認識你，但我們關心你。」一個月後，受災地區的一個班寄來了一張手寫感謝卡。Mei把它裱起來，掛在書桌上方。有些東西比任何成績都更有價值。"},{"title":"#47","vocab":["Japanese","illustrations","translated","international","treasures"],"en":"Ben discovered that the school library had books in Japanese, French, and Arabic. Curious, Ben checked out a simple Japanese picture book. Although Ben could not read the words, the illustrations told a clear story about a lonely moon. Ben showed it to the librarian, who translated a few lines. From that day, Ben visited the international section every week, slowly collecting words from different languages like rare treasures.","zh":"Ben發現學校圖書館有日文、法文和阿拉伯文的書。出於好奇，Ben借了一本簡單的日文圖畫書。雖然Ben看不懂文字，但插圖清楚地講述了一個關於孤獨月亮的故事。Ben把它給圖書館員看，圖書館員翻譯了幾行。從那天起，Ben每週都去國際書區，慢慢地收集不同語言的詞彙，就像珍稀的寶藏一樣。"},{"title":"#48","vocab":["struggling","hesitation","groceries","praise","audience"],"en":"One winter morning, Zoe found an elderly neighbor struggling to carry groceries up the stairs. Without hesitation, Zoe helped carry every bag. The old man said, \"Young people today don't stop to help.\" Zoe smiled and said nothing. That evening at dinner, Mom said, \"I heard what you did.\" Zoe felt a quiet warmth — not from praise, but from knowing that kindness given without an audience is the truest kind.","zh":"一個冬天的早晨，Zoe看到一位年邁的鄰居在樓梯上費力地提著雜貨。Zoe毫不猶豫地幫忙提了每一個袋子。老人說：「現在的年輕人不會停下來幫忙了。」Zoe微笑著，什麼也沒說。那天晚上吃飯時，媽媽說：「我聽說了你做的事。」Zoe感到一陣靜靜的溫暖——不是來自讚美，而是知道不需要觀眾的善意才是最真實的善意。"},{"title":"#49","vocab":["exhibition","inspired","composition","stranger","effective"],"en":"For the art exhibition, Jack decided to create a painting inspired by Alishan. Jack spent three weekends mixing colors and adjusting the composition. On exhibition day, a visitor stopped in front of Jack's painting for a long time. \"What does this mean to you?\" the visitor asked. Jack explained, and the visitor listened carefully. \"Art that makes a stranger stop and ask questions is art that works,\" the visitor said. Jack never forgot those words.","zh":"為了藝術展覽，Jack決定創作一幅以Alishan為靈感的畫。Jack花了三個週末調色和調整構圖。展覽當天，一位訪客在Jack的畫前停留了很長時間。「這對你意味著什麼？」訪客問。Jack解釋了，訪客認真地聽著。「能讓陌生人停下來發問的藝術，才是真正有效的藝術，」訪客說。Jack永遠記住了這句話。"},{"title":"#50","vocab":["cleanup","pollution","proposed","principal","reduced"],"en":"Nina joined an environmental cleanup on the beach near Penghu. In two hours, the group collected twelve bags of trash. Nina was shocked by the amount of plastic. Back at school, Nina gave a short presentation about ocean pollution and proposed a \"no single-use plastic\" week for the whole school. The principal agreed to try it. Three months later, the school had reduced its plastic waste by forty percent. One voice, Nina learned, can echo farther than expected.","zh":"Nina參加了在Penghu附近海灘進行的環境清潔活動。兩小時內，小組收集了十二袋垃圾。Nina對塑膠的數量感到震驚。回到學校後，Nina做了一個關於海洋汙染的簡短報告，並提議全校進行一週「不使用一次性塑膠」活動。校長同意嘗試。三個月後，學校減少了百分之四十的塑膠廢物。Nina學到了，一個聲音可以傳得比預期的更遠。"},{"title":"#51","vocab":["electricity","experiment","connected","engineer","planted"],"en":"Last month, Ruby's class went on a field trip to a science museum in Taidong. The guide showed them how o. Together, they contacted the local animal shelter. A volunteer arrived and gently placed the dog in a carrier. \"Animals cannot speak,\" the volunteer said, \"so humans must speak for them.\" Sam thought about those words for a long time and later decided to volunteer at the shelter every other Saturday.","zh":"一天早上，一隻流浪狗出現在Sam的學校附近。牠又瘦又看起來很害怕。Sam問老師該怎麼辦。他們一起聯繫了當地的動物收容所。一位義工到來，輕輕地將狗放入了籠子裡。「動物不會說話，」義工說，「所以人類必須替牠們說話。」Sam思考了這句話很久，後來決定每隔一個星期六去收容所當義工。"},{"title":"#64","vocab":["rooftop","responsible","harvested","patience","teamwork"],"en":"This year, Coco's school started a garden project on the rooftop. Each class was responsible for one section. Coco's class chose to grow tomatoes and sweet potatoes. They learned about soil quality, sunlight, and watering schedules. Three months later, they harvested enough vegetables to cook a meal for the whole class. The teacher said, \"You didn't just grow food. You grew patience, teamwork, and pride.\" Everyone agreed.","zh":"今年，Coco的學校在屋頂啟動了一個花園專題。每個班負責一個區域。Coco的班選擇種植番茄和地瓜。他們學到了關於土壤質量、陽光和澆水時間的知識。三個月後，他們收穫了足夠的蔬菜，為全班做了一頓飯。老師說：「你們不只是種了食物，也培育了耐心、團隊合作和驕傲感。」大家都同意。"},{"title":"#65","vocab":["afraid","announced","rehearsed","conquered","fear"],"en":"Tim had always been afraid of speaking in front of the class. When the teacher announced a speech competition, Tim's heart sank. But a classmate said, \"I'll practice with you every day after school.\" They rehearsed in the park, in the hallway, even during lunch. On competition day, Tim's voice shook at first but grew stronger with each sentence. The class clapped. Tim did not win, but had conquered something far more important: fear.","zh":"Tim一直害怕在班上發言。當老師宣布演講比賽時，Tim心沉了下去。但一個同學說：「我每天放學後都和你練習。」他們在公園裡、走廊上、甚至午餐時間都在排練。比賽那天，Tim的聲音起初顫抖，但每一句話都越來越有力量。全班鼓掌了。Tim沒有贏，但征服了一件更重要的事：恐懼。"},{"title":"#66","vocab":["flooded","donation","blankets","affected","handwritten"],"en":"During a heavy rainstorm, the river near Jiufen flooded a small community. Mei's class organized a donation drive, collecting clothes, food, and blankets. Mei wrote a letter to include with each package: \"We don't know you, but we care about you.\" A month later, a class from the affected area sent a handwritten thank-you card. Mei framed it and hung it above the desk. Some things are more valuable than any grade.","zh":"一場大暴雨後，Jiufen附近的河流淹沒了一個小社區。Mei的班組織了捐贈活動，收集了衣服、食物和毛毯。Mei寫了一封信附在每個包裹裡：「我們不認識你，但我們關心你。」一個月後，受災地區的一個班寄來了一張手寫感謝卡。Mei把它裱起來，掛在書桌上方。有些東西比任何成績都更有價值。"},{"title":"#67","vocab":["Japanese","illustrations","translated","international","treasures"],"en":"Ben discovered that the school library had books in Japanese, French, and Arabic. Curious, Ben checked out a simple Japanese picture book. Although Ben could not read the words, the illustrations told a clear story about a lonely moon. Ben showed it to the librarian, who translated a few lines. From that day, Ben visited the international section every week, slowly collecting words from different languages like rare treasures.","zh":"Ben發現學校圖書館有日文、法文和阿拉伯文的書。出於好奇，Ben借了一本簡單的日文圖畫書。雖然Ben看不懂文字，但插圖清楚地講述了一個關於孤獨月亮的故事。Ben把它給圖書館員看，圖書館員翻譯了幾行。從那天起，Ben每週都去國際書區，慢慢地收集不同語言的詞彙，就像珍稀的寶藏一樣。"},{"title":"#68","vocab":["struggling","hesitation","groceries","praise","audience"],"en":"One winter morning, Zoe found an elderly neighbor struggling to carry groceries up the stairs. Without hesitation, Zoe helped carry every bag. The old man said, \"Young people today don't stop to help.\" Zoe smiled and said nothing. That evening at dinner, Mom said, \"I heard what you did.\" Zoe felt a quiet warmth — not from praise, but from knowing that kindness given without an audience is the truest kind.","zh":"一個冬天的早晨，Zoe看到一位年邁的鄰居在樓梯上費力地提著雜貨。Zoe毫不猶豫地幫忙提了每一個袋子。老人說：「現在的年輕人不會停下來幫忙了。」Zoe微笑著，什麼也沒說。那天晚上吃飯時，媽媽說：「我聽說了你做的事。」Zoe感到一陣靜靜的溫暖——不是來自讚美，而是知道不需要觀眾的善意才是最真實的善意。"},{"title":"#69","vocab":["exhibition","inspired","composition","stranger","effective"],"en":"For the art exhibition, Jack decided to create a painting inspired by Taichung. Jack spent three weekends mixing colors and adju anted"],"en":"Last month, Leo's class went on a field trip to a science museum in Taichung. The guide showed them how electricity works and let them try a fun experiment. Leo and a partner connected wires to make a small light bulb glow. \"We did it!\" they shouted. On the bus ride home, Leo kept thinking about becoming an engineer someday. That single afternoon had planted a seed that would take years to grow.","zh":"上個月，Leo的班去Taichung的科學博物館進行了一次校外教學。導覽員向他們展示了電是如何運作的，並讓他們嘗試了一個有趣的實驗。Leo和一個夥伴連接電線，讓一個小燈泡發光。「我們做到了！」他們大喊。在回家的巴士上，Leo一直在想著有一天成為一名工程師。那個下午種下了一顆需要多年才能發芽的種子。"},{"title":"#82","vocab":["competition","traditional","specialty","recipe","aroma"],"en":"Emma signed up for the school cooking competition. The task was to make a traditional Taiwanese dish. Emma chose to prepare braised pork rice, which was Grandpa's specialty. For two weeks, Emma practiced the recipe at home every evening. On competition day, the aroma filled the entire hall. The judges tasted it and smiled. Emma did not win first place, but Grandpa watched from the back and wiped a small tear from his eye.","zh":"Emma報名了學校的烹飪比賽。任務是做一道台灣傳統料理。Emma選擇了爺爺的拿手菜——滷肉飯。兩週來，Emma每天晚上在家練習食譜。比賽當天，香味瀰漫了整個大廳。評審品嚐後微笑了。Emma沒有得第一名，但爺爺在後面看著，悄悄擦了擦眼淚。"},{"title":"#83","vocab":["stray","frightened","shelter","volunteer","carrier"],"en":"A stray dog appeared near Sam's school one morning. It was thin and looked frightened. Sam asked the teacher what to do. Together, they contacted the local animal shelter. A volunteer arrived and gently placed the dog in a carrier. \"Animals cannot speak,\" the volunteer said, \"so humans must speak for them.\" Sam thought about those words for a long time and later decided to volunteer at the shelter every other Saturday.","zh":"一天早上，一隻流浪狗出現在Sam的學校附近。牠又瘦又看起來很害怕。Sam問老師該怎麼辦。他們一起聯繫了當地的動物收容所。一位義工到來，輕輕地將狗放入了籠子裡。「動物不會說話，」義工說，「所以人類必須替牠們說話。」Sam思考了這句話很久，後來決定每隔一個星期六去收容所當義工。"},{"title":"#84","vocab":["rooftop","responsible","harvested","patience","teamwork"],"en":"This year, Coco's school started a garden project on the rooftop. Each class was responsible for one section. Coco's class chose to grow tomatoes and sweet potatoes. They learned about soil quality, sunlight, and watering schedules. Three months later, they harvested enough vegetables to cook a meal for the whole class. The teacher said, \"You didn't just grow food. You grew patience, teamwork, and pride.\" Everyone agreed.","zh":"今年，Coco的學校在屋頂啟動了一個花園專題。每個班負責一個區域。Coco的班選擇種植番茄和地瓜。他們學到了關於土壤質量、陽光和澆水時間的知識。三個月後，他們收穫了足夠的蔬菜，為全班做了一頓飯。老師說：「你們不只是種了食物，也培育了耐心、團隊合作和驕傲感。」大家都同意。"},{"title":"#85","vocab":["afraid","announced","rehearsed","conquered","fear"],"en":"Tim had always been afraid of speaking in front of the class. When the teacher announced a speech competition, Tim's heart sank. But a classmate said, \"I'll practice with you every day after school.\" They rehearsed in the park, in the hallway, even during lunch. On competition day, Tim's voice shook at first but grew stronger with each sentence. The class clapped. Tim did not win, but had conquered something far more important: fear.","zh":"Tim一直害怕在班上發言。當老師宣布演講比賽時，Tim心沉了下去。但一個同學說：「我每天放學後都和你練習。」他們在公園裡、走廊上、甚至午餐時間都在排練。比賽那天，Tim的聲音起初顫抖，但每一句話都越來越有力量。全班鼓掌了。Tim沒有贏，但征服了一件更重要的事：恐懼。"},{"title":"#86","vocab":["flooded","donation","blankets","affected","handwritten"],"en":"During a heavy rainstorm, the river near Penghu flooded a small community. Mei's class organized a donation drive, collecting clothes, food, and blankets. Mei wrote a letter to include with each package: \"We don't know you, but we care about you.\" A month later, a class from the affected area sent a handwritten thank-you card. Mei framed it and hung it above the desk. Some things are more valuable than any grade.","zh":"一場大暴雨後，Penghu附近的河流淹沒了一個小社區。Mei的班組織了捐贈活動，收集了衣服、食物和毛毯。Mei寫了一封信附在每個包裹裡：「我們不認識你，但我們關心你。」一個月後，受災地區的一個班寄來了一張手寫感謝卡。Mei把它裱起來，掛在書桌上方。有些東西比任何成績都更有價值。"},{"title":"#87","vocab":["Japanese","illustrations","translated","international","treasures"],"en":"Ben discovered that the school library had effective"],"en":"For the art exhibition, Ren decided to create a painting inspired by Taidong. Ren spent three weekends mixing colors and adjusting the composition. On exhibition day, a visitor stopped in front of Ren's painting for a long time. \"What does this mean to you?\" the visitor asked. Ren explained, and the visitor listened carefully. \"Art that makes a stranger stop and ask questions is art that works,\" the visitor said. Ren never forgot those words.","zh":"為了藝術展覽，Ren決定創作一幅以Taidong為靈感的畫。Ren花了三個週末調色和調整構圖。展覽當天，一位訪客在Ren的畫前停留了很長時間。「這對你意味著什麼？」訪客問。Ren解釋了，訪客認真地聽著。「能讓陌生人停下來發問的藝術，才是真正有效的藝術，」訪客說。Ren永遠記住了這句話。"},{"title":"#100","vocab":["cleanup","pollution","proposed","principal","reduced"],"en":"Amy joined an environmental cleanup on the beach near Yilan. In two hours, the group collected twelve bags of trash. Amy was shocked by the amount of plastic. Back at school, Amy gave a short presentation about ocean pollution and proposed a \"no single-use plastic\" week for the whole school. The principal agreed to try it. Three months later, the school had reduced its plastic waste by forty percent. One voice, Amy learned, can echo farther than expected.","zh":"Amy參加了在Yilan附近海灘進行的環境清潔活動。兩小時內，小組收集了十二袋垃圾。Amy對塑膠的數量感到震驚。回到學校後，Amy做了一個關於海洋汙染的簡短報告，並提議全校進行一週「不使用一次性塑膠」活動。校長同意嘗試。三個月後，學校減少了百分之四十的塑膠廢物。Amy學到了，一個聲音可以傳得比預期的更遠。"}],"2":[{"title":"#1","vocab":["electricity","experiment","connected","engineer","planted"],"en":"Last month, Amy's class went on a field trip to a science museum in Hsinchu. The guide showed them how electricity works and let them try a fun experiment. Amy and a partner connected wires to make a small light bulb glow. \"We did it!\" they shouted. On the bus ride home, Amy kept thinking about becoming an engineer someday. That single afternoon had planted a seed that would take years to grow.","zh":"上個月，Amy的班去Hsinchu的科學博物館進行了一次校外教學。導覽員向他們展示了電是如何運作的，並讓他們嘗試了一個有趣的實驗。Amy和一個夥伴連接電線，讓一個小燈泡發光。「我們做到了！」他們大喊。在回家的巴士上，Amy一直在想著有一天成為一名工程師。那個下午種下了一顆需要多年才能發芽的種子。"},{"title":"#2","vocab":["competition","traditional","specialty","recipe","aroma"],"en":"Leo signed up for the school cooking competition. The task was to make a traditional Taiwanese dish. Leo chose to prepare braised pork rice, which was Grandpa's specialty. For two weeks, Leo practiced the recipe at home every evening. On competition day, the aroma filled the entire hall. The judges tasted it and smiled. Leo did not win first place, but Grandpa watched from the back and wiped a small tear from his eye.","zh":"Leo報名了學校的烹飪比賽。任務是做一道台灣傳統料理。Leo選擇了爺爺的拿手菜——滷肉飯。兩週來，Leo每天晚上在家練習食譜。比賽當天，香味瀰漫了整個大廳。評審品嚐後微笑了。Leo沒有得第一名，但爺爺在後面看著，悄悄擦了擦眼淚。"},{"title":"#3","vocab":["stray","frightened","shelter","volunteer","carrier"],"en":"A stray dog appeared near Emma's school one morning. It was thin and looked frightened. Emma asked the teacher what to do. Together, they contacted the local animal shelter. A volunteer arrived and gently placed the dog in a carrier. \"Animals cannot speak,\" the volunteer said, \"so humans must speak for them.\" Emma thought about those words for a long time and later decided to volunteer at the shelter every other Saturday.","zh":"一天早上，一隻流浪狗出現在Emma的學校附近。牠又瘦又看起來很害怕。Emma問老師該怎麼辦。他們一起聯繫了當地的動物收容所。一位義工到來，輕輕地將狗放入了籠子裡。「動物不會說話，」義工說，「所以人類必須替牠們說話。」Emma思考了這句話很久，後來決定每隔一個星期六去收容所當義工。"},{"title":"#4","vocab":["rooftop","responsible","harvested","patience","teamwork"],"en":"This year, Sam's school started a garden project on the rooftop. Each class was responsible for one section. Sam's class chose to grow tomatoes and sweet potatoes. They learned about soil quality, sunlight, and watering schedules. Three months later, they harvested enough vegetables to cook a meal for the whole class. The teacher said, \"You didn't just grow food. You grew patience, teamwork, and pride.\" Everyone agreed.","zh":"今年，Sam的學校在屋頂啟動了一個花園專題。每個班負責一個區域。Sam的班選擇種植番茄和地瓜。他們學到了關於土壤質量、陽光和澆水時間的知識。三個月後，他們收穫了足夠的蔬菜，為全班做了一頓飯。老師說：「你們不只是種了食物，也培育了耐心、團隊合作和驕傲感。」大家都同意。"},{"title":"#5","vocab":["afraid","announced","rehearsed","co ,"vocab":["Japanese","illustrations","translated","international","treasures"],"en":"Mia discovered that the school library had books in Japanese, French, and Arabic. Curious, Mia checked out a simple Japanese picture book. Although Mia could not read the words, the illustrations told a clear story about a lonely moon. Mia showed it to the librarian, who translated a few lines. From that day, Mia visited the international section every week, slowly collecting words from different languages like rare treasures.","zh":"Mia發現學校圖書館有日文、法文和阿拉伯文的書。出於好奇，Mia借了一本簡單的日文圖畫書。雖然Mia看不懂文字，但插圖清楚地講述了一個關於孤獨月亮的故事。Mia把它給圖書館員看，圖書館員翻譯了幾行。從那天起，Mia每週都去國際書區，慢慢地收集不同語言的詞彙，就像珍稀的寶藏一樣。"},{"title":"#18","vocab":["struggling","hesitation","groceries","praise","audience"],"en":"One winter morning, Alex found an elderly neighbor struggling to carry groceries up the stairs. Without hesitation, Alex helped carry every bag. The old man said, \"Young people today don't stop to help.\" Alex smiled and said nothing. That evening at dinner, Mom said, \"I heard what you did.\" Alex felt a quiet warmth — not from praise, but from knowing that kindness given without an audience is the truest kind.","zh":"一個冬天的早晨，Alex看到一位年邁的鄰居在樓梯上費力地提著雜貨。Alex毫不猶豫地幫忙提了每一個袋子。老人說：「現在的年輕人不會停下來幫忙了。」Alex微笑著，什麼也沒說。那天晚上吃飯時，媽媽說：「我聽說了你做的事。」Alex感到一陣靜靜的溫暖——不是來自讚美，而是知道不需要觀眾的善意才是最真實的善意。"},{"title":"#19","vocab":["exhibition","inspired","composition","stranger","effective"],"en":"For the art exhibition, Anna decided to create a painting inspired by Yilan. Anna spent three weekends mixing colors and adjusting the composition. On exhibition day, a visitor stopped in front of Anna's painting for a long time. \"What does this mean to you?\" the visitor asked. Anna explained, and the visitor listened carefully. \"Art that makes a stranger stop and ask questions is art that works,\" the visitor said. Anna never forgot those words.","zh":"為了藝術展覽，Anna決定創作一幅以Yilan為靈感的畫。Anna花了三個週末調色和調整構圖。展覽當天，一位訪客在Anna的畫前停留了很長時間。「這對你意味著什麼？」訪客問。Anna解釋了，訪客認真地聽著。「能讓陌生人停下來發問的藝術，才是真正有效的藝術，」訪客說。Anna永遠記住了這句話。"},{"title":"#20","vocab":["cleanup","pollution","proposed","principal","reduced"],"en":"Ren joined an environmental cleanup on the beach near Kenting. In two hours, the group collected twelve bags of trash. Ren was shocked by the amount of plastic. Back at school, Ren gave a short presentation about ocean pollution and proposed a \"no single-use plastic\" week for the whole school. The principal agreed to try it. Three months later, the school had reduced its plastic waste by forty percent. One voice, Ren learned, can echo farther than expected.","zh":"Ren參加了在Kenting附近海灘進行的環境清潔活動。兩小時內，小組收集了十二袋垃圾。Ren對塑膠的數量感到震驚。回到學校後，Ren做了一個關於海洋汙染的簡短報告，並提議全校進行一週「不使用一次性塑膠」活動。校長同意嘗試。三個月後，學校減少了百分之四十的塑膠廢物。Ren學到了，一個聲音可以傳得比預期的更遠。"},{"title":"#21","vocab":["electricity","experiment","connected","engineer","planted"],"en":"Last month, Amy's class went on a field trip to a science museum in Jiufen. The guide showed them how electricity works and let them try a fun experiment. Amy and a partner connected wires to make a small light bulb glow. \"We did it!\" they shouted. On the bus ride home, Amy kept thinking about becoming an engineer someday. That single afternoon had planted a seed that would take years to grow.","zh":"上個月，Amy的班去Jiufen的科學博物館進行了一次校外教學。導覽員向他們展示了電是如何運作的，並讓他們嘗試了一個有趣的實驗。Amy和一個夥伴連接電線，讓一個小燈泡發光。「我們做到了！」他們大喊。在回家的巴士上，Amy一直在想著有一天成為一名工程師。那個下午種下了一顆需要多年才能發芽的種子。"},{"title":"#22","vocab":["competition","traditional","specialty","recipe","aroma"],"en":"Leo signed up for the school cooking competition. The task was to make a traditional Taiwanese dish. Leo chose to prepare braised pork rice, which was Grandpa's specialty. For two weeks, Leo practiced the recipe at home every evening. On competition day, the aroma filled the entire hall. The judges tasted it and smiled. Leo did not win first place, but Grandpa watched from the back and wiped a small tear from his eye.","zh":"Leo報名了學校的烹飪比賽。任務是做一道台灣傳統料理。Leo選擇了爺爺的拿手菜——滷肉飯。兩週來，Leo每天晚上在家練習食譜。比賽當天，香味瀰漫了整個大廳。評審品嚐後微笑 為全班做了一頓飯。老師說：「你們不只是種了食物，也培育了耐心、團隊合作和驕傲感。」大家都同意。"},{"title":"#35","vocab":["afraid","announced","rehearsed","conquered","fear"],"en":"Lily had always been afraid of speaking in front of the class. When the teacher announced a speech competition, Lily's heart sank. But a classmate said, \"I'll practice with you every day after school.\" They rehearsed in the park, in the hallway, even during lunch. On competition day, Lily's voice shook at first but grew stronger with each sentence. The class clapped. Lily did not win, but had conquered something far more important: fear.","zh":"Lily一直害怕在班上發言。當老師宣布演講比賽時，Lily心沉了下去。但一個同學說：「我每天放學後都和你練習。」他們在公園裡、走廊上、甚至午餐時間都在排練。比賽那天，Lily的聲音起初顫抖，但每一句話都越來越有力量。全班鼓掌了。Lily沒有贏，但征服了一件更重要的事：恐懼。"},{"title":"#36","vocab":["flooded","donation","blankets","affected","handwritten"],"en":"During a heavy rainstorm, the river near Taichung flooded a small community. Max's class organized a donation drive, collecting clothes, food, and blankets. Max wrote a letter to include with each package: \"We don't know you, but we care about you.\" A month later, a class from the affected area sent a handwritten thank-you card. Max framed it and hung it above the desk. Some things are more valuable than any grade.","zh":"一場大暴雨後，Taichung附近的河流淹沒了一個小社區。Max的班組織了捐贈活動，收集了衣服、食物和毛毯。Max寫了一封信附在每個包裹裡：「我們不認識你，但我們關心你。」一個月後，受災地區的一個班寄來了一張手寫感謝卡。Max把它裱起來，掛在書桌上方。有些東西比任何成績都更有價值。"},{"title":"#37","vocab":["Japanese","illustrations","translated","international","treasures"],"en":"Mia discovered that the school library had books in Japanese, French, and Arabic. Curious, Mia checked out a simple Japanese picture book. Although Mia could not read the words, the illustrations told a clear story about a lonely moon. Mia showed it to the librarian, who translated a few lines. From that day, Mia visited the international section every week, slowly collecting words from different languages like rare treasures.","zh":"Mia發現學校圖書館有日文、法文和阿拉伯文的書。出於好奇，Mia借了一本簡單的日文圖畫書。雖然Mia看不懂文字，但插圖清楚地講述了一個關於孤獨月亮的故事。Mia把它給圖書館員看，圖書館員翻譯了幾行。從那天起，Mia每週都去國際書區，慢慢地收集不同語言的詞彙，就像珍稀的寶藏一樣。"},{"title":"#38","vocab":["struggling","hesitation","groceries","praise","audience"],"en":"One winter morning, Alex found an elderly neighbor struggling to carry groceries up the stairs. Without hesitation, Alex helped carry every bag. The old man said, \"Young people today don't stop to help.\" Alex smiled and said nothing. That evening at dinner, Mom said, \"I heard what you did.\" Alex felt a quiet warmth — not from praise, but from knowing that kindness given without an audience is the truest kind.","zh":"一個冬天的早晨，Alex看到一位年邁的鄰居在樓梯上費力地提著雜貨。Alex毫不猶豫地幫忙提了每一個袋子。老人說：「現在的年輕人不會停下來幫忙了。」Alex微笑著，什麼也沒說。那天晚上吃飯時，媽媽說：「我聽說了你做的事。」Alex感到一陣靜靜的溫暖——不是來自讚美，而是知道不需要觀眾的善意才是最真實的善意。"},{"title":"#39","vocab":["exhibition","inspired","composition","stranger","effective"],"en":"For the art exhibition, Anna decided to create a painting inspired by Taipei. Anna spent three weekends mixing colors and adjusting the composition. On exhibition day, a visitor stopped in front of Anna's painting for a long time. \"What does this mean to you?\" the visitor asked. Anna explained, and the visitor listened carefully. \"Art that makes a stranger stop and ask questions is art that works,\" the visitor said. Anna never forgot those words.","zh":"為了藝術展覽，Anna決定創作一幅以Taipei為靈感的畫。Anna花了三個週末調色和調整構圖。展覽當天，一位訪客在Anna的畫前停留了很長時間。「這對你意味著什麼？」訪客問。Anna解釋了，訪客認真地聽著。「能讓陌生人停下來發問的藝術，才是真正有效的藝術，」訪客說。Anna永遠記住了這句話。"},{"title":"#40","vocab":["cleanup","pollution","proposed","principal","reduced"],"en":"Ren joined an environmental cleanup on the beach near Alishan. In two hours, the group collected twelve bags of trash. Ren was shocked by the amount of plastic. Back at school, Ren gave a short presentation about ocean pollution and proposed a \"no single-use plastic\" week for the whole school. The principal agreed to try it. Three months later, the school had reduced its plastic waste by forty percent. One voice, Ren learned, can echo farther than expected.","zh":"Ren參加了在
